<!doctype html>
<html lang="en" data-theme="dark" data-section="cats">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cats: Alber</title>
  <meta name="description" content="Our cats: Loki, Mango, and Kimchi.">
  <link rel="canonical" href="https://alber.me/cats/">
  <link rel="stylesheet" href="/assets/css/pico.min.css">
  <link rel="stylesheet" href="/assets/css/custom.css">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><a href="/"><span class="site-logo" aria-label="alber.me"></span></a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <hgroup>
      <h1>Cats</h1>
      <p>Alexander &amp; Franziska Alber</p>
    </hgroup>

    <section>
      <hgroup>
        <h2>Loki</h2>
        <p class="project-meta">2021</p>
      </hgroup>
      <div class="project-gallery">
        <figure><img src="/assets/img/cats/loki/loki1.png" alt="Loki"></figure>
        <figure><img src="/assets/img/cats/loki/loki2.png" alt="Loki"></figure>
        <figure><img src="/assets/img/cats/loki/loki3.png" alt="Loki"></figure>
        <figure><img src="/assets/img/cats/loki/loki4.png" alt="Loki"></figure>
        <figure><img src="/assets/img/cats/loki/loki5.png" alt="Loki"></figure>
        <figure><img src="/assets/img/cats/loki/loki6.png" alt="Loki"></figure>
      </div>
    </section>

    <section>
      <hgroup>
        <h2>Mango</h2>
        <p class="project-meta">2024</p>
      </hgroup>
      <div class="project-gallery">
        <figure><img src="/assets/img/cats/mango/mango1.png" alt="Mango"></figure>
        <figure><img src="/assets/img/cats/mango/mango2.png" alt="Mango"></figure>
        <figure><img src="/assets/img/cats/mango/mango3.png" alt="Mango"></figure>
        <figure><img src="/assets/img/cats/mango/mango4.png" alt="Mango"></figure>
        <figure><img src="/assets/img/cats/mango/mango5.png" alt="Mango"></figure>
        <figure><img src="/assets/img/cats/mango/mango6.png" alt="Mango"></figure>
      </div>
    </section>

    <section>
      <hgroup>
        <h2>Kimchi</h2>
        <p class="project-meta">2021–2025</p>
      </hgroup>
      <div class="project-gallery">
        <figure><img src="/assets/img/cats/kimchi/kimchi1.png" alt="Kimchi"></figure>
        <figure><img src="/assets/img/cats/kimchi/kimchi2.png" alt="Kimchi"></figure>
        <figure><img src="/assets/img/cats/kimchi/kimchi3.png" alt="Kimchi"></figure>
        <figure><img src="/assets/img/cats/kimchi/kimchi4.png" alt="Kimchi"></figure>
        <figure><img src="/assets/img/cats/kimchi/kimchi5.png" alt="Kimchi"></figure>
        <figure><img src="/assets/img/cats/kimchi/kimchi6.png" alt="Kimchi"></figure>
      </div>
    </section>

  </main>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const imgs = Array.from(document.querySelectorAll('.project-gallery img'));
    let current = 0;

    function show(index) {
      current = (index + imgs.length) % imgs.length;
      lbImg.src = imgs[current].src;
      lbImg.alt = imgs[current].alt;
      lb.classList.add('active');
    }

    imgs.forEach((img, i) => img.addEventListener('click', () => show(i)));

    lb.addEventListener('click', e => {
      if (e.target !== lbImg) lb.classList.remove('active');
    });

    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('active')) return;
      if (e.key === 'Escape') lb.classList.remove('active');
      if (e.key === 'ArrowRight') show(current + 1);
      if (e.key === 'ArrowLeft')  show(current - 1);
    });
  </script>

  <footer class="container">
    <small>© 2026 Alexander and Franziska Alber · <a href="/">alber.me</a></small>
  </footer>
</body>
</html>
