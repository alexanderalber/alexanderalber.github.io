  <main>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useLayoutEffect } = React;

    const LANG = localStorage.getItem('lang') || 'de';

    /* ── Animations-Einstellungen (deine gewählten Werte) ── */
    const SQUEEZE_MS = 1000;  // Dauer, in der die Flasche die Saucenlinie zeichnet
    const FLIP_MS    = 600;   // Dauer der Spalten-Umsortierung
    const IDLE_MS    = 8000;  // Wartezeit ohne Interaktion bis zum Saucentropfen
    const FADE_MS    = 500;   // Aus-/Einblenden beim Übergang

    const MENUS = [
      { id: 'de_2026_07', labelDe: 'Deutschland Juli 2026', labelEn: 'Germany July 2026', file: '/assets/files/subway_de_2026_07.json' },
      { id: 'de_2026_06', labelDe: 'Deutschland Juni 2026', labelEn: 'Germany June 2026', file: '/assets/files/subway_de_2026_06.json' },
      { id: 'de_2026_05', labelDe: 'Deutschland Mai 2026', labelEn: 'Germany May 2026', file: '/assets/files/subway_de_2026_05.json' },
      { id: 'us_2026_05', labelDe: 'USA Mai 2026',         labelEn: 'USA May 2026',     file: '/assets/files/subway_us_2026_05.json' },
    ];

    const STRINGS = {
      de: {
        title: "Subwaysaucenguide",
        subtitle: "Welche Sauce passt zu welchem Sandwich?",
        menuLabel: "Menü:",
        colormapLabel: "Farbskala:",
        sortLabel: "Sortierung:",
        sortName: "Name",
        sortAvg: "Durchschnitt",
        source: m => `Subjektive Flavor-Pairing-Bewertung · Subway Menü: ${m.labelDe}`,
        methodology: "Berücksichtigt Geschmacksprofile (süß/sauer/scharf/umami), klassische Kombinationen und Saucenfunktion.",
        loading: "Lade Daten …",
        disclaimer: "Dieses Projekt steht in keiner Verbindung zu Subway IP LLC. Privates Hobbyprojekt, unkommerziell.",
      },
      en: {
        title: "Subway Sauce Guide",
        subtitle: "Which sauce goes with which sandwich?",
        menuLabel: "Menu:",
        colormapLabel: "Color scale:",
        sortLabel: "Sort:",
        sortName: "Name",
        sortAvg: "Avg",
        source: m => `Subjective flavor pairing assessment · Subway menu: ${m.labelEn}`,
        methodology: "Considers flavor profiles (sweet/sour/spicy/umami), classic combinations, and sauce function.",
        loading: "Loading data …",
        disclaimer: "This project is not affiliated with or endorsed by Subway IP LLC. Personal hobby project, non-commercial.",
      },
    };

    /* ── Colormaps (matplotlib diverging) ──────────────────────────────────
       neg = score −3 color, mid = score 0 color, pos = score +3 color      */
    const COLORMAPS = {
      hollywood:  { neg: [255, 140,  66], mid: [245, 245, 245], pos: [  0, 139, 139] },
      greyscale:  { neg: [  0,   0,   0], mid: [128, 128, 128], pos: [255, 255, 255] },
      tritanopia: { neg: [200,  85,  61], mid: [245, 245, 245], pos: [ 74, 172, 143] },
      rdbu:    { neg: [33,  102, 172], mid: [247, 247, 247], pos: [178,  24,  43] },
      rdylgn:  { neg: [215,  48,  39], mid: [255, 255, 191], pos: [ 26, 152,  80] },
      spectral:{ neg: [213,  62,  79], mid: [255, 255, 191], pos: [ 50, 136, 189] },
      puor:    { neg: [230,  97,   1], mid: [247, 247, 247], pos: [ 94,  60, 153] },
      brbg:    { neg: [140,  81,  10], mid: [245, 245, 245], pos: [  1, 102,  94] },
    };
    const CM_KEYS  = ['hollywood', 'greyscale', 'tritanopia', 'rdbu', 'rdylgn', 'spectral', 'puor', 'brbg'];
    const CM_NAMES = ['Hollywood', 'Greyscale', 'Tritanopia', 'RdBu', 'RdYlGn', 'Spectral', 'PuOr', 'BrBG'];

    function lerp(a, b, t) { return a + (b - a) * t; }

    function scoreToRgb(score, cmKey) {
      const { neg, mid, pos } = COLORMAPS[cmKey];
      const t  = score <= 0 ? (score + 3) / 3 : score / 3;
      const c1 = score <= 0 ? neg : mid;
      const c2 = score <= 0 ? mid : pos;
      return [
        Math.round(lerp(c1[0], c2[0], t)),
        Math.round(lerp(c1[1], c2[1], t)),
        Math.round(lerp(c1[2], c2[2], t)),
      ];
    }

    function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }

    function textColorForBg([r, g, b]) {
      return (0.299 * r + 0.587 * g + 0.114 * b) > 145 ? '#1e293b' : '#f1f5f9';
    }

    /* ── Tropfen-Pfad: Spitze oben, runder Bauch unten ── */
    function dropPath(x, y) {
      return `M${x},${y - 13} C ${x + 9},${y - 3} ${x + 8.5},${y + 4} ${x + 8.5},${y + 5}`
           + ` A 8.5 8.5 0 1 1 ${x - 8.5},${y + 5}`
           + ` C ${x - 9},${y - 3} ${x},${y - 13} Z`;
    }

    /* ── Layout constants ── */
    const LEFT = 182;  // sandwich label width
    const CW   = 42;   // cell width
    const CH   = 36;   // cell height
    const TOP  = 142;  // space above cells for rotated column headers
    const RPAD = 112;  // right pad (accommodates diagonal label overhang)
    const BPAD = 12;

    /* ── Animation #1: Squeeze-Flasche zeichnet die Saucenlinie ── */
    function SauceLoader({ fading, loadingText }) {
      const body = '#cbd5e1', cap = '#8b98a8', sauce = '#0e9a9a';
      return (
        <div style={{padding:'44px 0 60px', minHeight:210, animation: fading ? `sg-fade-out ${FADE_MS}ms ease forwards` : 'none'}}>
          <svg width={480} height={160} style={{maxWidth:'100%', display:'block', overflow:'visible'}}>
            {/* Saucenlinie – wird per stroke-dashoffset linear enthüllt */}
            <path
              d="M24,112 C 90,60 150,150 214,104 S 344,58 456,112"
              fill="none" stroke="#0e9a9a" strokeWidth={9}
              strokeLinecap="round" strokeLinejoin="round" pathLength={100}
              style={{strokeDasharray:100, strokeDashoffset:100, animation:`sg-draw ${SQUEEZE_MS}ms linear forwards`}}
            />
            {/* Flasche – Düsenspitze im lokalen Ursprung (0,0), fährt entlang derselben Kurve */}
            <g style={{transformBox:'view-box', transformOrigin:'0px 0px', animation:`sg-move ${SQUEEZE_MS}ms linear forwards`}}>
              <rect x={-16} y={-78} width={32} height={52} rx={9} fill={body}
                    style={{transformOrigin:'0px -26px', animation:'sg-squeeze 300ms ease-in-out infinite alternate'}}/>
              <rect x={-9} y={-84} width={18} height={8} rx={2} fill={cap}/>
              <rect x={-6} y={-26} width={12} height={15} rx={3} fill={cap}/>
              <path d="M-6,-12 L6,-12 L0,0 Z" fill={cap}/>
              <circle cx={0} cy={0} r={3.5} fill={sauce}/>
            </g>
            <text x={24} y={150} fontSize={13} fill="#64748b" fontFamily="inherit">{loadingText}</text>
          </svg>
        </div>
      );
    }

    /* ── Component ── */
    function SubwaySauces() {
      const t = STRINGS[LANG] || STRINGS.de;

      const [menu,     setMenu]     = useState(MENUS[0]);
      const [data,     setData]     = useState(null);
      const [colormap, setColormap] = useState('hollywood');
      const [sorted,   setSorted]   = useState(true);
      const [selected, setSelected] = useState(null);

      // Übergangsphase: 'squeeze' → 'fadeout' → 'fadein' → 'done'
      const [phase, setPhase] = useState('squeeze');
      const [drip,  setDrip]  = useState(null);

      const cellsSvgRef  = useRef(null);
      const prevOrderRef = useRef(null);
      const lastMoveRef  = useRef(0);

      // Menüwechsel: Flasche zeichnen (min. SQUEEZE_MS, wartet auf fetch) → ausblenden → Tabelle einblenden
      useEffect(() => {
        setData(null);
        setSelected(null);
        setDrip(null);
        setPhase('squeeze');

        let cancelled = false;
        const timers = [];
        const t0 = Date.now();

        fetch(menu.file)
          .then(r => r.json())
          .then(json => {
            if (cancelled) return;
            setData(json);
            const wait = Math.max(0, SQUEEZE_MS - (Date.now() - t0));
            timers.push(setTimeout(() => {
              if (cancelled) return;
              setPhase('fadeout');                         // 2) Flasche + Linie ausblenden
              timers.push(setTimeout(() => {
                if (cancelled) return;
                setPhase('fadein');                        // 3) Tabelle einblenden
                timers.push(setTimeout(() => {
                  if (!cancelled) setPhase('done');
                }, FADE_MS));
              }, FADE_MS));
            }, wait));
          });

        return () => { cancelled = true; timers.forEach(clearTimeout); };
      }, [menu]);

      const sandwiches = useMemo(() => data ? Object.keys(data.matrix) : [], [data]);
      const visibleSandwiches = selected ? sandwiches.filter(s => s === selected) : sandwiches;

      const sauces = useMemo(() => {
        if (!data || !sandwiches.length) return [];
        const base = Object.keys(data.matrix[sandwiches[0]]);
        const label = key => (LANG === 'en' && data.labels?.sauces?.en?.[key]) || key;
        if (!sorted) return [...base].sort((a, b) => label(a).localeCompare(label(b), LANG));
        const rows = visibleSandwiches.length ? visibleSandwiches : sandwiches;
        return [...base].sort((a, b) => {
          const avg = s => rows.reduce((acc, sw) => acc + data.matrix[sw][s], 0) / rows.length;
          return avg(b) - avg(a);
        });
      }, [data, sandwiches, visibleSandwiches, sorted]);

      // ── Animation #3: FLIP – Spalten gleiten an ihre neue Position ──
      useLayoutEffect(() => {
        const svg = cellsSvgRef.current;
        const cur = sauces;
        const prev = prevOrderRef.current;
        prevOrderRef.current = cur;
        if (!svg || !prev || prev.length !== cur.length) return;
        const oldIndex = {}; prev.forEach((k, i) => oldIndex[k] = i);
        let changed = false;
        cur.forEach((k, i) => { if (oldIndex[k] !== i) changed = true; });
        if (!changed) return;
        svg.querySelectorAll('[data-col]').forEach(node => {
          const k = node.getAttribute('data-col');
          const oi = oldIndex[k], ni = cur.indexOf(k);
          if (oi == null || oi === ni) return;
          const dx = (oi - ni) * CW;
          node.style.transition = 'none';
          node.style.transform = `translateX(${ni * CW + dx}px)`;
          node.getBoundingClientRect();               // reflow erzwingen
          requestAnimationFrame(() => {
            node.style.transition = `transform ${FLIP_MS}ms cubic-bezier(.4,0,.2,1)`;
            node.style.transform = `translateX(${ni * CW}px)`;
          });
        });
      }, [sauces]);

      // ── Animation #5: Idle-Tropfen ──
      useEffect(() => {
        if (phase !== 'done' || drip) return;   // nur wenn fertig & kein Tropfen aktiv
        let id = setTimeout(fire, IDLE_MS);
        function fire() {
          if (!data) return;
          const vs = selected ? sandwiches.filter(s => s === selected) : sandwiches;
          if (!vs.length || !sauces.length) return;
          const ci = Math.floor(Math.random() * sauces.length);
          const ri = Math.floor(Math.random() * vs.length);
          const score = data.matrix[vs[ri]][sauces[ci]];
          setDrip({
            key: Date.now(),
            x: ci * CW + CW / 2,
            y: TOP + ri * CH + CH - 3,
            color: rgbStr(scoreToRgb(score, colormap)),
          });
        }
        function onMove() {
          const n = Date.now();
          if (n - lastMoveRef.current < 400) return;
          lastMoveRef.current = n;
          clearTimeout(id);
          id = setTimeout(fire, IDLE_MS);
        }
        window.addEventListener('pointermove', onMove);
        return () => { clearTimeout(id); window.removeEventListener('pointermove', onMove); };
      }, [phase, drip, data, sauces, selected, colormap, sandwiches]);

      const sauceLabel = key =>
        (LANG === 'en' && data.labels?.sauces?.en?.[key]) || key;

      const svgW = LEFT + sauces.length * CW + RPAD;
      const svgH = TOP  + visibleSandwiches.length * CH + BPAD;

      const showLoader = phase === 'squeeze' || phase === 'fadeout' || !data;

      return (
        <div className="container" style={{paddingTop:'var(--pico-spacing)', paddingBottom:40}}>

          {/* ── Title ── */}
          <hgroup style={{marginBottom:20}}>
            <h1 style={{marginBottom:4}}>{t.title}</h1>
            <p style={{color:'#94a3b8', margin:0}}>{t.subtitle}</p>
          </hgroup>

          {/* ── Controls: row 0 – menu ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.menuLabel}</span>
            <div style={{display:'flex'}}>
              {MENUS.map(m => (
                <button
                  key={m.id}
                  className={'lang-seg' + (menu.id === m.id ? ' active' : '')}
                  onClick={() => setMenu(m)}
                  style={{minWidth:120}}
                >
                  {LANG === 'en' ? m.labelEn : m.labelDe}
                </button>
              ))}
            </div>
          </div>

          {/* ── Controls: row 1 – colormap ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.colormapLabel}</span>
            <div style={{display:'flex'}}>
              {CM_KEYS.map((k, i) => (
                <button
                  key={k}
                  className={'lang-seg' + (colormap === k ? ' active' : '')}
                  onClick={() => setColormap(k)}
                  style={{minWidth:70}}
                >
                  {CM_NAMES[i]}
                </button>
              ))}
            </div>
          </div>

          {/* ── Controls: row 2 – sort ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:20}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.sortLabel}</span>
            <div style={{display:'flex'}}>
              <button
                className={'lang-seg' + (!sorted ? ' active' : '')}
                onClick={() => setSorted(false)}
                style={{minWidth:64}}
              >
                {t.sortName}
              </button>
              <button
                className={'lang-seg' + (sorted ? ' active' : '')}
                onClick={() => setSorted(true)}
                style={{minWidth:64}}
              >
                {t.sortAvg}
              </button>
            </div>
          </div>

          {/* ── Heatmap-Bereich: Loader (squeeze/fadeout) oder Tabelle (fadein/done) ── */}
          {showLoader ? (
            <SauceLoader fading={phase === 'fadeout'} loadingText={t.loading} />
          ) : (
            <div style={{display:'flex', alignItems:'flex-start', animation: phase === 'fadein' ? `sg-fade-in ${FADE_MS}ms ease both` : 'none'}}>

              {/* ─ Left: sticky sandwich labels ─ */}
              <svg
                width={LEFT}
                height={svgH}
                style={{display:'block', fontFamily:'inherit', flexShrink:0}}
              >
                {visibleSandwiches.map((sandwich, ri) => {
                  const cy = TOP + ri * CH + CH / 2;
                  return (
                    <text
                      key={'row-' + ri}
                      x={LEFT - 8}
                      y={cy}
                      textAnchor="end"
                      dominantBaseline="middle"
                      fontSize={13}
                      fill="#cbd5e1"
                      style={{userSelect:'none', cursor:'pointer'}}
                      onClick={() => setSelected(selected === sandwich ? null : sandwich)}
                    >
                      {sandwich}
                    </text>
                  );
                })}
              </svg>

              {/* ─ Right: scrollable sauce labels + cells ─ */}
              <div style={{overflowX:'auto'}}>
                <svg
                  ref={cellsSvgRef}
                  width={sauces.length * CW + RPAD}
                  height={svgH}
                  style={{display:'block', fontFamily:'inherit'}}
                >
                  {/* ─ Eine <g data-col> pro Spalte: Label + Zellen, per translateX positioniert (FLIP) ─ */}
                  {sauces.map((sauce, ci) => (
                    <g
                      key={sauce}
                      data-col={sauce}
                      style={{transform:`translateX(${ci * CW}px)`, transition:`transform ${FLIP_MS}ms cubic-bezier(.4,0,.2,1)`}}
                    >
                      <text
                        transform={`translate(${CW / 2},${TOP - 2}) rotate(-45)`}
                        textAnchor="start"
                        dominantBaseline="auto"
                        fontSize={13}
                        fill="#94a3b8"
                        style={{userSelect:'none'}}
                      >
                        {sauceLabel(sauce)}
                      </text>
                      {visibleSandwiches.map((sandwich, ri) => {
                        const score = data.matrix[sandwich][sauce];
                        const rgb   = scoreToRgb(score, colormap);
                        const y = TOP + ri * CH;
                        return (
                          <g key={ri}>
                            <rect
                              x={1} y={y + 1}
                              width={CW - 2} height={CH - 2}
                              rx={3}
                              fill={rgbStr(rgb)}
                            />
                            <text
                              x={CW / 2}
                              y={y + CH / 2}
                              textAnchor="middle"
                              dominantBaseline="middle"
                              fontSize={11}
                              fontWeight={Math.abs(score) === 3 ? 700 : 400}
                              fill={textColorForBg(rgb)}
                              style={{pointerEvents:'none', userSelect:'none'}}
                            >
                              {score > 0 ? '+' + score : score}
                            </text>
                          </g>
                        );
                      })}
                    </g>
                  ))}

                  {/* ─ Idle-Tropfen ─ */}
                  {drip && (
                    <g
                      key={drip.key}
                      onAnimationEnd={() => setDrip(null)}
                      style={{animation:'sg-drip 1.9s cubic-bezier(.55,0,.85,.4) forwards'}}
                    >
                      <path d={dropPath(drip.x, drip.y)} fill={drip.color} stroke="rgba(0,0,0,.28)" strokeWidth={1}/>
                      <ellipse cx={drip.x - 2.6} cy={drip.y + 2} rx={1.8} ry={3} fill="rgba(255,255,255,.5)"/>
                    </g>
                  )}
                </svg>
              </div>

            </div>
          )}

          {/* ── Source note ── */}
          <p style={{marginTop:24, fontSize:11, color:'#64748b', lineHeight:1.7}}>
            {t.source(menu)}<br/>
            <em>{t.methodology}</em>
          </p>
