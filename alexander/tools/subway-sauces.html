<!doctype html>
<html lang="de" data-theme="dark" data-section="alexander">
<head>
  <meta charset="utf-8">
  <script>document.documentElement.lang=(new URLSearchParams(location.search).get('lang')||localStorage.getItem('lang')||'de');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="alternate" hreflang="de" href="https://alber.me/alexander/tools/subway-sauces.html">
  <link rel="alternate" hreflang="en" href="https://alber.me/alexander/tools/subway-sauces.html?lang=en">
  <link rel="alternate" hreflang="x-default" href="https://alber.me/alexander/tools/subway-sauces.html">
  <script>if(new URLSearchParams(location.search).get('lang')==='en')document.querySelector('link[rel=canonical]').href+='?lang=en';</script>
  <link rel="stylesheet" href="/assets/css/pico.min.css">
  <link rel="stylesheet" href="/assets/css/custom.css">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <script src="/assets/js/react.production.min.js"></script>
  <script src="/assets/js/react-dom.production.min.js"></script>
  <script src="/assets/js/babel.min.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Subway Saucen-Guide",
    "description": "Interaktive Heatmap für Subway-Sauce-Sandwich-Kombinationen. Bewertungsskala von −3 bis +3.",
    "url": "https://alber.me/alexander/tools/subway-sauces.html",
    "applicationCategory": "UtilityApplication",
    "inLanguage": "de",
    "author": {
      "@type": "Person",
      "name": "Alexander Alber",
      "url": "https://alber.me/alexander/"
    },
    "isAccessibleForFree": true,
    "browserRequirements": "Requires JavaScript"
  }
  </script>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><a href="/"><span class="site-logo" aria-label="alber.me"></span></a></li>
      </ul>
      <ul>
        <li><a href="/alexander/">About</a></li>
        <li><a href="/alexander/publications.html">Publications</a></li>
        <li><a href="/alexander/writing.html">Writing</a></li>
        <li><a href="/alexander/projects.html">Projects &amp; Art</a></li>
        <li><a href="/alexander/miscellaneous.html" aria-current="page">Miscellaneous</a></li>
        <li><a href="/alexander/cv.html">CV</a></li>
        <li class="lang-switcher">
          <button class="lang-seg" data-lang="en">EN</button><button class="lang-seg" data-lang="de">DE</button>
        </li>
      </ul>
    </nav>
  </header>

  <script>
    (function () {
      var urlLang = new URLSearchParams(location.search).get('lang');
      if (urlLang === 'en' || urlLang === 'de') { localStorage.setItem('lang', urlLang); }
      var l = localStorage.getItem('lang') || 'de';
      document.querySelectorAll('.lang-seg').forEach(function (btn) {
        if (btn.getAttribute('data-lang') === l) btn.classList.add('active');
        btn.onclick = function () { localStorage.setItem('lang', btn.getAttribute('data-lang')); location.reload(); };
      });
    })();
  </script>

  <main>
    <p class="container" style="margin-bottom:0;padding-top:var(--pico-spacing);">
      <a href="/alexander/miscellaneous.html">← Sonstiges</a>
    </p>
    <script>if((localStorage.getItem('lang')||'de')==='en')document.currentScript.previousElementSibling.querySelector('a').textContent='← Miscellaneous';</script>
    <div id="root"></div>
  </main>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const LANG = localStorage.getItem('lang') || 'de';

    const MENUS = [
      { id: 'de_2026_05', labelDe: 'Deutschland Mai 2026', labelEn: 'Germany May 2026', file: '/assets/files/subway_de.json' },
      { id: 'us_2026_05', labelDe: 'USA Mai 2026',         labelEn: 'USA May 2026',     file: '/assets/files/subway_us.json' },
    ];

    const STRINGS = {
      de: {
        title: "Subwaysaucenguide",
        subtitle: "Welche Sauce passt zu welchem Sandwich?",
        menuLabel: "Menü:",
        colormapLabel: "Farbskala:",
        sortLabel: "Sortierung:",
        sortName: "Name",
        sortAvg: "Durchschnitt",
        source: m => `Subjektive Flavor-Pairing-Bewertung · Subway Menü: ${m.labelDe}`,
        methodology: "Berücksichtigt Geschmacksprofile (süß/sauer/scharf/umami), klassische Kombinationen und Saucenfunktion.",
        loading: "Lade Daten …",
        disclaimer: "Dieses Projekt steht in keiner Verbindung zu Subway IP LLC. Privates Hobbyprojekt, unkommerziell.",
      },
      en: {
        title: "Subway Sauce Guide",
        subtitle: "Which sauce goes with which sandwich?",
        menuLabel: "Menu:",
        colormapLabel: "Color scale:",
        sortLabel: "Sort:",
        sortName: "Name",
        sortAvg: "Avg",
        source: m => `Subjective flavor pairing assessment · Subway menu: ${m.labelEn}`,
        methodology: "Considers flavor profiles (sweet/sour/spicy/umami), classic combinations, and sauce function.",
        loading: "Loading data …",
        disclaimer: "This project is not affiliated with or endorsed by Subway IP LLC. Personal hobby project, non-commercial.",
      },
    };

    /* ── Colormaps (matplotlib diverging) ──────────────────────────────────
       neg = score −3 color, mid = score 0 color, pos = score +3 color      */
    const COLORMAPS = {
      hollywood:  { neg: [255, 140,  66], mid: [245, 245, 245], pos: [  0, 139, 139] },
      greyscale:  { neg: [  0,   0,   0], mid: [128, 128, 128], pos: [255, 255, 255] },
      tritanopia: { neg: [200,  85,  61], mid: [245, 245, 245], pos: [ 74, 172, 143] },
      rdbu:    { neg: [33,  102, 172], mid: [247, 247, 247], pos: [178,  24,  43] },
      rdylgn:  { neg: [215,  48,  39], mid: [255, 255, 191], pos: [ 26, 152,  80] },
      spectral:{ neg: [213,  62,  79], mid: [255, 255, 191], pos: [ 50, 136, 189] },
      puor:    { neg: [230,  97,   1], mid: [247, 247, 247], pos: [ 94,  60, 153] },
      brbg:    { neg: [140,  81,  10], mid: [245, 245, 245], pos: [  1, 102,  94] },
    };
    const CM_KEYS  = ['hollywood', 'greyscale', 'tritanopia', 'rdbu', 'rdylgn', 'spectral', 'puor', 'brbg'];
    const CM_NAMES = ['Hollywood', 'Greyscale', 'Tritanopia', 'RdBu', 'RdYlGn', 'Spectral', 'PuOr', 'BrBG'];

    function lerp(a, b, t) { return a + (b - a) * t; }

    function scoreToRgb(score, cmKey) {
      const { neg, mid, pos } = COLORMAPS[cmKey];
      const t  = score <= 0 ? (score + 3) / 3 : score / 3;
      const c1 = score <= 0 ? neg : mid;
      const c2 = score <= 0 ? mid : pos;
      return [
        Math.round(lerp(c1[0], c2[0], t)),
        Math.round(lerp(c1[1], c2[1], t)),
        Math.round(lerp(c1[2], c2[2], t)),
      ];
    }

    function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }

    function textColorForBg([r, g, b]) {
      return (0.299 * r + 0.587 * g + 0.114 * b) > 145 ? '#1e293b' : '#f1f5f9';
    }

    /* ── Layout constants ── */
    const LEFT = 182;  // sandwich label width
    const CW   = 42;   // cell width
    const CH   = 36;   // cell height
    const TOP  = 142;  // space above cells for rotated column headers
    const RPAD = 112;  // right pad (accommodates diagonal label overhang)
    const BPAD = 12;

    /* ── Component ── */
    function SubwaySauces() {
      const t = STRINGS[LANG] || STRINGS.de;

      const [menu,     setMenu]     = useState(MENUS[0]);
      const [data,     setData]     = useState(null);
      const [colormap, setColormap] = useState('hollywood');
      const [sorted,   setSorted]   = useState(true);
      const [selected, setSelected] = useState(null);

      useEffect(() => {
        setData(null);
        setSelected(null);
        fetch(menu.file)
          .then(r => r.json())
          .then(setData);
      }, [menu]);

      const sandwiches = useMemo(() => data ? Object.keys(data.matrix) : [], [data]);
      const visibleSandwiches = selected ? sandwiches.filter(s => s === selected) : sandwiches;

      const sauces = useMemo(() => {
        if (!data || !sandwiches.length) return [];
        const base = Object.keys(data.matrix[sandwiches[0]]);
        const label = key => (LANG === 'en' && data.labels?.sauces?.en?.[key]) || key;
        if (!sorted) return [...base].sort((a, b) => label(a).localeCompare(label(b), LANG));
        const rows = visibleSandwiches.length ? visibleSandwiches : sandwiches;
        return [...base].sort((a, b) => {
          const avg = s => rows.reduce((acc, sw) => acc + data.matrix[sw][s], 0) / rows.length;
          return avg(b) - avg(a);
        });
      }, [data, sandwiches, visibleSandwiches, sorted]);

      const sauceLabel = key =>
        (LANG === 'en' && data.labels?.sauces?.en?.[key]) || key;

      const svgW = LEFT + sauces.length * CW + RPAD;
      const svgH = TOP  + visibleSandwiches.length * CH + BPAD;

      if (!data) {
        return (
          <div className="container" style={{paddingTop: 32}}>
            <p style={{color:'#94a3b8'}}>{t.loading}</p>
          </div>
        );
      }

      return (
        <div className="container" style={{paddingTop:'var(--pico-spacing)', paddingBottom:40}}>

          {/* ── Title ── */}
          <hgroup style={{marginBottom:20}}>
            <h1 style={{marginBottom:4}}>{t.title}</h1>
            <p style={{color:'#94a3b8', margin:0}}>{t.subtitle}</p>
          </hgroup>

          {/* ── Controls: row 0 – menu ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.menuLabel}</span>
            <div style={{display:'flex'}}>
              {MENUS.map(m => (
                <button
                  key={m.id}
                  className={'lang-seg' + (menu.id === m.id ? ' active' : '')}
                  onClick={() => setMenu(m)}
                  style={{minWidth:120}}
                >
                  {LANG === 'en' ? m.labelEn : m.labelDe}
                </button>
              ))}
            </div>
          </div>

          {/* ── Controls: row 1 – colormap ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.colormapLabel}</span>
            <div style={{display:'flex'}}>
              {CM_KEYS.map((k, i) => (
                <button
                  key={k}
                  className={'lang-seg' + (colormap === k ? ' active' : '')}
                  onClick={() => setColormap(k)}
                  style={{minWidth:70}}
                >
                  {CM_NAMES[i]}
                </button>
              ))}
            </div>
          </div>

          {/* ── Controls: row 2 – sort ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:20}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.sortLabel}</span>
            <div style={{display:'flex'}}>
              <button
                className={'lang-seg' + (!sorted ? ' active' : '')}
                onClick={() => setSorted(false)}
                style={{minWidth:64}}
              >
                {t.sortName}
              </button>
              <button
                className={'lang-seg' + (sorted ? ' active' : '')}
                onClick={() => setSorted(true)}
                style={{minWidth:64}}
              >
                {t.sortAvg}
              </button>
            </div>
          </div>

          {/* ── Heatmap ── */}
          <div style={{display:'flex', alignItems:'flex-start'}}>

            {/* ─ Left: sticky sandwich labels ─ */}
            <svg
              width={LEFT}
              height={svgH}
              style={{display:'block', fontFamily:'inherit', flexShrink:0}}
            >
              {visibleSandwiches.map((sandwich, ri) => {
                const cy = TOP + ri * CH + CH / 2;
                return (
                  <text
                    key={'row-' + ri}
                    x={LEFT - 8}
                    y={cy}
                    textAnchor="end"
                    dominantBaseline="middle"
                    fontSize={13}
                    fill="#cbd5e1"
                    style={{userSelect:'none', cursor:'pointer'}}
                    onClick={() => setSelected(selected === sandwich ? null : sandwich)}
                  >
                    {sandwich}
                  </text>
                );
              })}
            </svg>

            {/* ─ Right: scrollable sauce labels + cells ─ */}
            <div style={{overflowX:'auto'}}>
              <svg
                width={sauces.length * CW + RPAD}
                height={svgH}
                style={{display:'block', fontFamily:'inherit'}}
              >
                {/* ─ Sauce column labels ─ */}
                {sauces.map((sauce, ci) => {
                  const ax = ci * CW + CW / 2;
                  const ay = TOP - 2;
                  return (
                    <text
                      key={'col-' + ci}
                      transform={`translate(${ax},${ay}) rotate(-45)`}
                      textAnchor="start"
                      dominantBaseline="auto"
                      fontSize={13}
                      fill="#94a3b8"
                      style={{userSelect:'none'}}
                    >
                      {sauceLabel(sauce)}
                    </text>
                  );
                })}

                {/* ─ Cells ─ */}
                {visibleSandwiches.flatMap((sandwich, ri) =>
                  sauces.map((sauce, ci) => {
                    const score = data.matrix[sandwich][sauce];
                    const rgb   = scoreToRgb(score, colormap);
                    const x = ci * CW;
                    const y = TOP + ri * CH;
                    return (
                      <g key={ri + '-' + ci}>
                        <rect
                          x={x + 1} y={y + 1}
                          width={CW - 2} height={CH - 2}
                          rx={3}
                          fill={rgbStr(rgb)}
                        />
                        <text
                          x={x + CW / 2}
                          y={y + CH / 2}
                          textAnchor="middle"
                          dominantBaseline="middle"
                          fontSize={11}
                          fontWeight={Math.abs(score) === 3 ? 700 : 400}
                          fill={textColorForBg(rgb)}
                          style={{pointerEvents:'none', userSelect:'none'}}
                        >
                          {score > 0 ? '+' + score : score}
                        </text>
                      </g>
                    );
                  })
                )}
              </svg>
            </div>

          </div>

          {/* ── Source note ── */}
          <p style={{marginTop:24, fontSize:11, color:'#64748b', lineHeight:1.7}}>
            {t.source(menu)}<br/>
            <em>{t.methodology}</em>
          </p>
          <p style={{marginTop:8, fontSize:10, color:'#475569', lineHeight:1.6}}>
            {t.disclaimer}
          </p>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SubwaySauces/>);
  </script>
</body>
</html>
