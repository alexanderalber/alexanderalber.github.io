  <script type="application/ld+json">

    "@context": "https://schema.org",
    "@type": "WebApplication",

    },

    "browserRequirements": "Requires JavaScript"
  }

</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><a href="/"><span class="site-logo" aria-label="alber.me"></span></a></li>
      </ul>
      <ul>
        <li><a href="/alexander/">About</a></li>
        <li><a href="/alexander/publications.html">Publications</a></li>
        <li><a href="/alexander/writing.html">Writing</a></li>
        <li><a href="/alexander/projects.html">Projects &amp; Art</a></li>
        <li><a href="/alexander/miscellaneous.html" aria-current="page">Miscellaneous</a></li>
        <li><a href="/alexander/cv.html">CV</a></li>
        <li class="lang-switcher">
          <button class="lang-seg" data-lang="en">EN</button><button class="lang-seg" data-lang="de">DE</button>
        </li>
      </ul>
    </nav>
  </header>

  <script>
    (function () {
      var urlLang = new URLSearchParams(location.search).get('lang');
      if (urlLang === 'en' || urlLang === 'de') { localStorage.setItem('lang', urlLang); }
      var l = localStorage.getItem('lang') || 'de';
      document.querySelectorAll('.lang-seg').forEach(function (btn) {
        if (btn.getAttribute('data-lang') === l) btn.classList.add('active');
        btn.onclick = function () { localStorage.setItem('lang', btn.getAttribute('data-lang')); location.reload(); };
      });
    })();
  </script>

  <main>
    <p class="container" style="margin-bottom:0;padding-top:var(--pico-spacing);">
      <a href="/alexander/miscellaneous.html">← Sonstiges</a>
    </p>
    <script>if((localStorage.getItem('lang')||'de')==='en')document.currentScript.previousElementSibling.querySelector('a').textContent='← Miscellaneous';</script>
    <div id="root"></div>
  </main>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const LANG = localStorage.getItem('lang') || 'de';

    const STRINGS = {
      de: {
        title: "Subwaysaucenguide",
        subtitle: "Welche Sauce passt zu welchem Sandwich?",
        colormapLabel: "Farbskala:",
        sortLabel: "Sortierung:",
        sortName: "Name",
        sortAvg: "Ø",
        source: "Subjektive Flavor-Pairing-Bewertung · Subway Deutschland Menü (Mai 2026)",
        methodology: "Berücksichtigt Geschmacksprofile (süß/sauer/scharf/umami), klassische Kombinationen, kulturelle Konsistenz und Saucenfunktion.",
        loading: "Lade Daten …",
      },
      en: {
        title: "Subway Sauce Guide",
        subtitle: "Which sauce goes with which sandwich?",
        colormapLabel: "Color scale:",
        sortLabel: "Sort:",
        sortName: "Name",
        sortAvg: "Avg",
        source: "Subjective flavor pairing assessment · Subway Germany menu (May 2026)",
        methodology: "Considers flavor profiles (sweet/sour/spicy/umami), classic combinations, cultural consistency, and sauce function.",
        loading: "Loading data …",
      },
    };

    /* ── Colormaps (matplotlib diverging) ──────────────────────────────────
       neg = score −3 color, mid = score 0 color, pos = score +3 color      */
    const COLORMAPS = {
      rdbu:    { neg: [33,  102, 172], mid: [247, 247, 247], pos: [178,  24,  43] },
      rdylgn:  { neg: [215,  48,  39], mid: [255, 255, 191], pos: [ 26, 152,  80] },
      spectral:{ neg: [213,  62,  79], mid: [255, 255, 191], pos: [ 50, 136, 189] },
      puor:    { neg: [230,  97,   1], mid: [247, 247, 247], pos: [ 94,  60, 153] },
      brbg:    { neg: [140,  81,  10], mid: [245, 245, 245], pos: [  1, 102,  94] },
    };
    const CM_KEYS  = ['rdbu', 'rdylgn', 'spectral', 'puor', 'brbg'];
    const CM_NAMES = ['RdBu', 'RdYlGn', 'Spectral', 'PuOr', 'BrBG'];

    function lerp(a, b, t) { return a + (b - a) * t; }

    function scoreToRgb(score, cmKey) {
      const { neg, mid, pos } = COLORMAPS[cmKey];
      const t  = score <= 0 ? (score + 3) / 3 : score / 3;
      const c1 = score <= 0 ? neg : mid;
      const c2 = score <= 0 ? mid : pos;
      return [
        Math.round(lerp(c1[0], c2[0], t)),
        Math.round(lerp(c1[1], c2[1], t)),
        Math.round(lerp(c1[2], c2[2], t)),
      ];
    }

    function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }

    function textColorForBg([r, g, b]) {
      return (0.299 * r + 0.587 * g + 0.114 * b) > 145 ? '#1e293b' : '#f1f5f9';
    }

    /* ── Layout constants ── */
    const LEFT = 182;  // sandwich label width
    const CW   = 42;   // cell width
    const CH   = 36;   // cell height
    const TOP  = 142;  // space above cells for rotated column headers
    const RPAD = 112;  // right pad (accommodates diagonal label overhang)
    const BPAD = 12;

    /* ── Component ── */
    function SubwaySauces() {
      const t = STRINGS[LANG] || STRINGS.de;

      const [data,     setData]     = useState(null);
      const [colormap, setColormap] = useState('brbg');
      const [sorted,   setSorted]   = useState(true);

      useEffect(() => {
        fetch('/assets/files/subway.json')
          .then(r => r.json())
          .then(setData);
      }, []);

      const sandwiches = useMemo(() => data ? Object.keys(data.matrix) : [], [data]);

      const sauces = useMemo(() => {
        if (!data || !sandwiches.length) return [];
        const base = Object.keys(data.matrix[sandwiches[0]]);
        if (!sorted) return base;
        return [...base].sort((a, b) => {
          const avg = s => sandwiches.reduce((acc, sw) => acc + data.matrix[sw][s], 0) / sandwiches.length;
          return avg(b) - avg(a);
        });
      }, [data, sandwiches, sorted]);

      const sauceLabel = key =>
        (LANG === 'en' && data.labels?.sauces?.en?.[key]) || key;

      const svgW = LEFT + sauces.length * CW + RPAD;
      const svgH = TOP  + sandwiches.length * CH + BPAD;

      if (!data) {
        return (
          <div className="container" style={{paddingTop: 32}}>
            <p style={{color:'#94a3b8'}}>{t.loading}</p>
          </div>
        );
      }

      return (
        <div className="container" style={{paddingTop:'var(--pico-spacing)', paddingBottom:40}}>

          {/* ── Title ── */}
          <hgroup style={{marginBottom:20}}>
            <h1 style={{marginBottom:4}}>{t.title}</h1>
            <p style={{color:'#94a3b8', margin:0}}>{t.subtitle}</p>
          </hgroup>

          {/* ── Controls: row 1 – colormap ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:8}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.colormapLabel}</span>
            <div style={{display:'flex'}}>
              {CM_KEYS.map((k, i) => (
                <button
                  key={k}
                  className={'lang-seg' + (colormap === k ? ' active' : '')}
                  onClick={() => setColormap(k)}
                  style={{minWidth:70}}
                >
                  {CM_NAMES[i]}
                </button>
              ))}
            </div>
          </div>

          {/* ── Controls: row 2 – sort ── */}
          <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap', marginBottom:20}}>
            <span style={{color:'#94a3b8', fontSize:13, minWidth:80}}>{t.sortLabel}</span>
            <div style={{display:'flex'}}>
              <button
                className={'lang-seg' + (!sorted ? ' active' : '')}
                onClick={() => setSorted(false)}
                style={{minWidth:64}}
              >
                {t.sortName}
              </button>
              <button
                className={'lang-seg' + (sorted ? ' active' : '')}
                onClick={() => setSorted(true)}
                style={{minWidth:64}}
              >
                {t.sortAvg}
              </button>
            </div>
          </div>

          {/* ── Heatmap ── */}
          <div
            style={{overflowX:'auto'}}
          >
            <svg
              width={svgW}
              height={svgH}
              style={{display:'block', fontFamily:'inherit'}}
            >
              {/* ─ Sauce column labels: rotate −45°, start at column left edge, extend up-right ─ */}
              {sauces.map((sauce, ci) => {
                const ax = LEFT + ci * CW + CW / 2;  // center of column
                const ay = TOP - 2;               // just above cell area
                return (
                  <text
                    key={'col-' + ci}
                    transform={`translate(${ax},${ay}) rotate(-45)`}
                    textAnchor="start"
                    dominantBaseline="auto"
                    fontSize={13}
                    fill="#94a3b8"
                    style={{userSelect:'none'}}
                  >
                    {sauceLabel(sauce)}
                  </text>
                );
              })}

              {/* ─ Sandwich row labels ─ */}
              {sandwiches.map((sandwich, ri) => {
                const cy = TOP + ri * CH + CH / 2;
                return (
                  <text
                    key={'row-' + ri}
                    x={LEFT - 8}
                    y={cy}
                    textAnchor="end"
                    dominantBaseline="middle"
                    fontSize={13}
                    fill="#cbd5e1"
                    style={{userSelect:'none'}}
                  >
                    {sandwich}
                  </text>
                );
              })}

              {/* ─ Cells ─ */}
              {sandwiches.flatMap((sandwich, ri) =>
                sauces.map((sauce, ci) => {
                  const score = data.matrix[sandwich][sauce];
                  const rgb   = scoreToRgb(score, colormap);
                  const x = LEFT + ci * CW;
                  const y = TOP  + ri * CH;
                  return (
                    <g key={ri + '-' + ci}>
                      <rect
                        x={x + 1} y={y + 1}
                        width={CW - 2} height={CH - 2}
                        rx={3}
                        fill={rgbStr(rgb)}
                      />
                      <text
                        x={x + CW / 2}
                        y={y + CH / 2}
                        textAnchor="middle"
                        dominantBaseline="middle"
                        fontSize={11}
                        fontWeight={Math.abs(score) === 3 ? 700 : 400}
                        fill={textColorForBg(rgb)}
                        style={{pointerEvents:'none', userSelect:'none'}}
                      >
                        {score > 0 ? '+' + score : score}
                      </text>
                    </g>
                  );
                })
              )}
            </svg>
          </div>

          {/* ── Source note ── */}
          <p style={{marginTop:24, fontSize:11, color:'#64748b', lineHeight:1.7}}>
            {t.source}<br/>
            <em>{t.methodology}</em>
          </p>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SubwaySauces/>);
  </script>
</body>
</html>
