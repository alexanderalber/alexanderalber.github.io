    const fmtDEshort = (d) => d.toLocaleDateString('de-DE', { day:'2-digit', month:'short' });

    const interpolate = (data, ssw) => {
      if (ssw <= data[0].week) return data[0].value;
      if (ssw >= data[data.length-1].week) return data[data.length-1].value;
      for (let i = 0; i < data.length - 1; i++) {
        if (ssw >= data[i].week && ssw <= data[i+1].week) {
          const t = (ssw - data[i].week) / (data[i+1].week - data[i].week);
          return data[i].value + t * (data[i+1].value - data[i].value);
        }
      }
      return null;
    };

    function DateInput({ value, onChange }) {
      const hiddenRef = React.useRef(null);
      const [parts, setParts] = React.useState(() => value ? value.split('-') : ['','','']);
      const [yyyy, mm, dd] = parts;
      React.useEffect(() => { setParts(value ? value.split('-') : ['','','']); }, [value]);
      const emit = ([y, m, d]) => {
        if (y.length === 4 && m && d)
          onChange({ target: { value: `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}` } });
        else
          onChange({ target: { value: '' } });
      };
      const setP = (i, raw) => {
        const v = raw.replace(/\D/g, '').slice(0, i === 0 ? 4 : 2);
        const next = [yyyy, mm, dd]; next[i] = v;
        setParts(next); emit(next);
      };

                  boxSizing:'border-box', textAlign:'center',
                  color:'#0f172a', background:'white', fontFamily:'inherit', fontSize:13 };

    function PregnancyTimeline() {
      const [lmpStr,   setLmpStr]   = useState(() => {
        const d = new Date(); d.setDate(d.getDate() - 140); return d.toISOString().slice(0,10);
      });
      const [todayStr, setTodayStr] = useState(new Date().toISOString().slice(0,10));
      const [activeCats, setActiveCats] = useState(new Set(Object.keys(CATEGORIES)));
      const [hover, setHover] = useState(null);

      const lmp   = useMemo(() => new Date(lmpStr   + 'T12:00:00'), [lmpStr]);
      const today = useMemo(() => new Date(todayStr  + 'T12:00:00'), [todayStr]);
      const et    = useMemo(() => addDays(lmp, 280), [lmp]);
      const todaySsw = useMemo(() => dateToSsw(lmp, today), [lmp, today]);

      const toggle = (cat) => setActiveCats(prev => {
        const n = new Set(prev); n.has(cat) ? n.delete(cat) : n.add(cat); return n;
      });

      const visible = useMemo(
        () => SYMPTOMS.filter(s => activeCats.has(s.category)).sort((a,b)=>a.start-b.start),
        [activeCats]
      );

      const W = 944, ML = 203, MR = 24, MT = 56, MB = 48;
      const ROW_H = 21;
      const MAX_HALF = 13;
      const sH = Math.max(visible.length * ROW_H, 48);
      const riskH = 160;
      const totalH = MT + sH + 28 + riskH + MB;
      const pw = W - ML - MR;

      const xOf  = (ssw) => ML + (ssw / 42) * pw;
      const riskY = MT + sH + 28;
      const botY  = riskY + riskH;

      const lens = (s, cy) => {
        const sx = xOf(s.start), px = xOf(s.peak), ex = xOf(s.end);
        const h = (s.frequency / 100) * MAX_HALF;
        const c1 = (sx+px)/2, c2 = (px+ex)/2;
        return `M${sx} ${cy} Q${c1} ${cy-h} ${px} ${cy-h} Q${c2} ${cy-h} ${ex} ${cy} Q${c2} ${cy+h} ${px} ${cy+h} Q${c1} ${cy+h} ${sx} ${cy} Z`;
      };

      const linePath = (data, y0, yH) =>
        data.map((d,i)=>`${i?'L':'M'}${xOf(d.week)} ${y0+yH-(d.value/100)*yH}`).join(' ');

      const ticks = Array.from({length:22},(_,i)=>i*2);

      const inp = {
        border:'1px solid #e2e8f0', borderRadius:8, padding:'5px 10px',
        fontSize:13, color:'#0f172a', background:'white',
        fontFamily:'inherit', cursor:'pointer',
      };

      return (

            <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',

                <h1 style={{fontSize:22,fontWeight:700,color:'#0f172a',margin:'0 0 6px',

                  <Baby style={{width:22,height:22,color:'#ec4899'}}/>
                  {t.title}
                </h1>
                <div style={{display:'flex',flexWrap:'wrap',gap:16,alignItems:'center',marginTop:4}}>

                    <DateInput value={lmpStr} onChange={e=>setLmpStr(e.target.value)} />
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#64748b'}}>
                    <Calendar style={{width:14,height:14}}/>
                    <span>{t.todayLabel}</span>
                    <DateInput value={todayStr} onChange={e=>setTodayStr(e.target.value)} />
                  </label>
                  <span style={{fontSize:13,color:'#94a3b8'}}>
                    {t.eddLabel}: <strong style={{color:'#475569'}}>{fmtDE(et)}</strong>
                    &ensp;·&ensp;
                    {t.todayGALabel}: <strong style={{color:'#dc2626'}}>SSW {fmtSsw(todaySsw)}</strong>
                  </span>
                </div>
                <p style={{fontSize:11,color:'#94a3b8',margin:'6px 0 0',lineHeight:1.5}}>
                  {t.noteText}
                </p>
              </div>
              <p style={{fontSize:11,color:'#94a3b8',maxWidth:340,margin:0,alignSelf:'center'}}>
                {t.sourceText}
              </p>
            </div>

            <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',
              padding:'14px 18px',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <Activity style={{width:15,height:15,color:'#64748b'}}/>
                <span style={{fontSize:13,fontWeight:600,color:'#374151'}}>{t.catLabel}</span>
                <button onClick={()=>setActiveCats(new Set(Object.keys(CATEGORIES)))}
                  style={{marginLeft:'auto',fontSize:11,padding:'3px 8px',borderRadius:6,
                    background:'#f1f5f9',border:'none',cursor:'pointer',color:'#475569'}}>{t.allOn}</button>
                <button onClick={()=>setActiveCats(new Set())}
                  style={{fontSize:11,padding:'3px 8px',borderRadius:6,
                    background:'#f1f5f9',border:'none',cursor:'pointer',color:'#475569'}}>{t.allOff}</button>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {Object.entries(CATEGORIES).map(([key,cat])=>{
                  const on = activeCats.has(key);
                  const cnt = SYMPTOMS.filter(s=>s.category===key).length;
                  return (
                    <button key={key} onClick={()=>toggle(key)} style={{
                      padding:'6px 12px',borderRadius:8,fontSize:13,fontWeight:500,cursor:'pointer',
                      display:'flex',alignItems:'center',gap:6,border:'1px solid',transition:'all .15s',
                      background:on?cat.color:'white', borderColor:on?cat.color:'#e2e8f0',
                      color:on?'white':'#64748b',
                    }}>
                      {on ? <Eye style={{width:13,height:13}}/> : <EyeOff style={{width:13,height:13}}/>}
                      {cat.label}
                      <span style={{fontSize:10,opacity:.7}}>{cnt}</span>
                    </button>
                  );
                })}
              </div>
            </div>

            <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',
              padding:16,overflowX:'auto',position:'relative'}}>
              <svg viewBox={`0 0 ${W} ${totalH}`} style={{display:'block',width:'100%',height:'auto'}}>

                {TRIMESTERS.map((tr,i)=>(
                  <rect key={i} x={xOf(tr.start)} y={MT-30}
                    width={xOf(tr.end)-xOf(tr.start)} height={sH+28+riskH+30} fill={tr.color}/>
                ))}
                {TRIM_LABELS.map(tl=>(
                  <text key={tl.l} x={xOf(tl.p)} y={MT-38} textAnchor="middle"
                    fill="#94a3b8" fontSize={11} fontWeight={500}>{tl.l}</text>
                ))}

                {ticks.map(w=>(
                  <g key={w}>
                    <line x1={xOf(w)} y1={MT-10} x2={xOf(w)} y2={botY}
                      stroke="#e2e8f0" strokeWidth={w%4===0?1:.5}
                      strokeDasharray={w%4===0?undefined:'2,3'}/>
                    <text x={xOf(w)} y={MT-14} textAnchor="middle"
                      fill="#475569" fontSize={11} fontWeight={600}>{w}</text>
                    <text x={xOf(w)} y={MT-2} textAnchor="middle"
                      fill="#94a3b8" fontSize={9}>{fmtDEshort(sswToDate(lmp,w))}</text>
                  </g>
                ))}
                <text x={ML-20} y={MT-14} textAnchor="end" fill="#64748b" fontSize={11} fontWeight={600}>{t.xAxisLabel}</text>
                <text x={ML-20} y={MT-2}  textAnchor="end" fill="#94a3b8" fontSize={9}>{t.dateLabel}</text>

                {visible.map((s,i)=>{
                  const cy = MT + i*ROW_H + ROW_H/2;
                  const cat = CATEGORIES[s.category];
                  const hov = hover?.type==='symptom' && hover.idx===i;
                  return (
                    <g key={s.name}
                      onMouseEnter={()=>setHover({type:'symptom',idx:i,data:s})}
                      onMouseLeave={()=>setHover(null)}
                      style={{cursor:'pointer'}}>
                      <rect x={ML} y={cy-ROW_H/2} width={pw} height={ROW_H}
                        fill={hov?'#f8fafc':'transparent'}/>
                      <text x={ML-10} y={cy+4} textAnchor="end" fontSize={11}
                        fill={hov?cat.color:'#374151'} fontWeight={hov?600:400}>{s.name}</text>
                      <path d={lens(s,cy)} fill={cat.color}
                        opacity={hov ? 0.90 : 0.62}
                        stroke={hov?cat.color:'none'} strokeWidth={1.5}/>
                    </g>
                  );
                })}
                {visible.length===0&&(
                  <text x={ML+pw/2} y={MT+sH/2} textAnchor="middle"
                    fill="#94a3b8" fontSize={13} fontStyle="italic">{t.noCatActive}</text>
                )}

                <rect x={ML} y={riskY} width={pw} height={riskH}
                  fill="white" stroke="#e2e8f0" strokeWidth={1}/>
                {[0,25,50,75,100].map(v=>{
                  const yy = riskY+riskH-(v/100)*riskH;
                  return <g key={v}>
                    <line x1={ML} y1={yy} x2={ML+pw} y2={yy} stroke="#e2e8f0" strokeDasharray="2,3"/>
                    <text x={ML-8} y={yy+3} textAnchor="end" fill="#94a3b8" fontSize={10}>{v}%</text>
                  </g>;
                })}
                <text x={ML-34} y={riskY+riskH/2+4} textAnchor="end" fill="#64748b" fontSize={11} fontWeight={600}>
                  {t.probLabel}
                </text>

                <path d={linePath(SURVIVAL_DATA,riskY,riskH)}
                  fill="none" stroke="#10b981" strokeWidth={2.5} strokeLinejoin="round"/>
                {SURVIVAL_DATA.map(d=>{
                  const cx=xOf(d.week), cy=riskY+riskH-(d.value/100)*riskH;
                  return <circle key={d.week} cx={cx} cy={cy} r={3.5}
                    fill="#10b981" stroke="white" strokeWidth={1.5}
                    onMouseEnter={()=>setHover({type:'risk',x:cx,y:cy,
                      label:t.survivalLabel,week:d.week,value:d.value,color:'#10b981'})}
                    onMouseLeave={()=>setHover(null)} style={{cursor:'pointer'}}/>;
                })}
                <text x={xOf(32)+8} y={riskY+riskH-(89.8/100)*riskH+4}
                  fill="#10b981" fontSize={11} fontWeight={600}>{t.survivalLabel}</text>

                <path d={linePath(MISCARRIAGE_DATA,riskY,riskH)}
                  fill="none" stroke="#e11d48" strokeWidth={2.5} strokeLinejoin="round"/>
                {MISCARRIAGE_DATA.map(d=>{
                  const cx=xOf(d.week), cy=riskY+riskH-(d.value/100)*riskH;
                  return <circle key={d.week} cx={cx} cy={cy} r={3.5}
                    fill="#e11d48" stroke="white" strokeWidth={1.5}
                    onMouseEnter={()=>setHover({type:'risk',x:cx,y:cy,
                      label:t.miscarriageLabel,week:d.week,value:d.value,color:'#e11d48'})}
                    onMouseLeave={()=>setHover(null)} style={{cursor:'pointer'}}/>;
                })}
                <text x={xOf(6)-4} y={riskY+riskH-(28/100)*riskH-8}
                  textAnchor="end" fill="#e11d48" fontSize={11} fontWeight={600}>{t.miscarriageLabel}</text>

                {todaySsw >= 0 && todaySsw <= 42 && (() => {
                  const tx = xOf(todaySsw);
                  const useMiscarriage = todaySsw < 22;
                  const riskVal = useMiscarriage
                    ? interpolate(MISCARRIAGE_DATA, todaySsw)
                    : interpolate(SURVIVAL_DATA, todaySsw);
                  const riskCy = riskVal !== null ? riskY + riskH - (riskVal / 100) * riskH : null;
                  const riskColor = useMiscarriage ? '#e11d48' : '#10b981';
                  const riskText = useMiscarriage
                    ? t.riskMiscarriage(riskVal < 1 ? riskVal.toFixed(2) : riskVal.toFixed(1))
                    : t.riskSurvival(riskVal < 99.5 ? riskVal.toFixed(0) : riskVal.toFixed(1));
                  const labelW = 90;
                  const flipLabel = tx + 12 + labelW > ML + pw;
                  const lx = flipLabel ? tx - 12 - labelW : tx + 12;
                  return <>
                    <line x1={tx} y1={MT-40} x2={tx} y2={botY}
                      stroke="#dc2626" strokeWidth={2} strokeDasharray="5,3"/>
                    <rect x={tx-33} y={MT-53} width={66} height={14} rx={4} fill="white" stroke="#dc2626" strokeWidth={1.5}/>
                    <text x={tx} y={MT-42} textAnchor="middle"
                      fill="#dc2626" fontSize={10} fontWeight={700}>{t.todayMarker} {fmtSsw(todaySsw)}</text>
                    {riskCy !== null && <>
                      <circle cx={tx} cy={riskCy} r={5} fill={riskColor} stroke="white" strokeWidth={2}/>
                      <rect x={lx} y={riskCy-9} width={labelW} height={16} rx={4} fill="white" stroke={riskColor} strokeWidth={1.5}/>
                      <text x={lx + labelW/2} y={riskCy+3} textAnchor="middle"
                        fill={riskColor} fontSize={10} fontWeight={700}>{riskText}</text>
                    </>}
                  </>;
                })()}

                {MILESTONES.map(m=>{
                  const mx=xOf(m.week);
                  return <g key={m.label}>
                    <line x1={mx} y1={botY} x2={mx} y2={botY+8} stroke="#475569" strokeWidth={1}/>
                    <text x={mx} y={botY+21} textAnchor="middle"
                      fill="#475569" fontSize={10} fontWeight={500}>{m.label}</text>
                    <text x={mx} y={botY+33} textAnchor="middle"
                      fill="#94a3b8" fontSize={9}>{fmtDE(sswToDate(lmp,m.week))}</text>
                  </g>;
                })}
              </svg>

              {hover?.type==='symptom'&&(()=>{
                const s=hover.data, cat=CATEGORIES[s.category];
                return <div style={{
                  position:'absolute',pointerEvents:'none',background:'#0f172a',color:'white',
                  borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.35)',padding:'10px 14px',
                  zIndex:10,width:224,
                  left:Math.min(xOf(s.peak)+14,W-230),
                  top:MT+hover.idx*ROW_H-52,
                }}>
                  <div style={{fontWeight:700,fontSize:13,color:cat.color,marginBottom:6}}>{s.name}</div>
                  <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.75}}>
                    <div>{t.tipStart} {fmtSsw(s.start)} · {fmtDE(sswToDate(lmp,s.start))}</div>
                    <div>{t.tipPeak} {fmtSsw(s.peak)} · {fmtDE(sswToDate(lmp,s.peak))}</div>
                    <div>{t.tipEnd} {fmtSsw(s.end)} · {fmtDE(sswToDate(lmp,s.end))}</div>
                    <div style={{marginTop:6,paddingTop:6,borderTop:'1px solid #334155',color:'white'}}>
                      {t.tipFreq(s.frequency)}
                    </div>
                  </div>
                </div>;
              })()}

              {hover?.type==='risk'&&(
                <div style={{
                  position:'absolute',pointerEvents:'none',background:'#0f172a',color:'white',
                  borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.35)',padding:'8px 12px',
                  zIndex:10,left:hover.x+10,top:hover.y-52,
                }}>
                  <div style={{fontWeight:700,fontSize:11,color:hover.color}}>{hover.label}</div>
                  <div style={{fontSize:10,color:'#94a3b8'}}>
                    SSW {hover.week} · {fmtDE(sswToDate(lmp,hover.week))}
                  </div>
                  <div style={{fontSize:16,fontWeight:700,marginTop:2}}>{hover.value}%</div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PregnancyTimeline />);
  </script>

  <footer class="container">
    <small>© 2026 Alexander Alber · <a href="/">alber.me</a></small>
  </footer>
</body>
</html>
