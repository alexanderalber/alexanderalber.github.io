<!doctype html>
<html lang="de" data-theme="dark" data-section="alexander">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schwangerschafts-Timeline: Alexander Alber</title>
  <meta name="description" content="Interaktive Visualisierung von Schwangerschaftssymptomen über die Schwangerschaftswochen.">
  <link rel="canonical" href="https://alber.me/alexander/tools/pregnancy-timeline.html">
  <link rel="stylesheet" href="/assets/css/pico.min.css">
  <link rel="stylesheet" href="/assets/css/custom.css">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><a href="/"><span class="site-logo" aria-label="alber.me"></span></a></li>
      </ul>
      <ul>
        <li><a href="/alexander/">About</a></li>
        <li><a href="/alexander/publications.html">Publications</a></li>
        <li><a href="/alexander/writing.html">Writing</a></li>
        <li><a href="/alexander/projects.html">Projects &amp; Art</a></li>
        <li><a href="/alexander/miscellaneous.html" aria-current="page">Miscellaneous</a></li>
        <li><a href="/alexander/cv.html">CV</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <p class="container" style="margin-bottom:0;padding-top:var(--pico-spacing);">
      <a href="/alexander/visualizations-for-parents.html">← Visualizations for Parents</a>
    </p>
    <div id="root"></div>
  </main>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const Eye      = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const EyeOff   = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
    const Activity = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
    const Baby     = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="2"/><path d="M5 22v-5l-1-1V9a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7l-1 1v5"/><path d="M8 22v-4h8v4"/></svg>;
    const Calendar = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;

    const addDays  = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
    const daysDiff = (a, b) => (b - a) / 86400000;
    const fmtDE    = (d) => d.toLocaleDateString('de-DE', { day:'2-digit', month:'short', year:'2-digit' });
    const sswToDate = (lmp, ssw) => addDays(lmp, Math.round(ssw * 7));
    const dateToSsw = (lmp, date) => daysDiff(lmp, date) / 7;
    const fmtSsw   = (ssw) => `${Math.floor(ssw)}+${Math.round((ssw - Math.floor(ssw)) * 7)}`;

    const CATEGORIES = {
      schmerz:    { label: 'Schmerzen',            color: '#ef4444' },
      gi:         { label: 'Verdauung / Übelkeit',  color: '#f97316' },
      allgemein:  { label: 'Allgemein / Hormonell', color: '#3b82f6' },
      körperlich: { label: 'Körperlich / Sichtbar', color: '#a855f7' },
      uterus:     { label: 'Uterus / Geburt',       color: '#ec4899' },
      misc:       { label: 'Sonstige',              color: '#64748b' },
    };

    const SYMPTOMS = [
      { name:'Frühes Bauchziehen',              start: 4.5, peak:10.0, end:14.0, category:'schmerz',    frequency:40  },
      { name:'Kopfschmerzen',                   start: 6.0, peak:15.5, end:40.0, category:'schmerz',    frequency:35  },
      { name:'Mutterbandschmerzen',             start:14.0, peak:20.5, end:30.0, category:'schmerz',    frequency:40  },
      { name:'Rückenschmerzen',                 start:17.0, peak:32.0, end:40.0, category:'schmerz',    frequency:55  },
      { name:'Hyperemesis (selten)',             start: 4.0, peak: 9.0, end:22.0, category:'gi',         frequency:2   },
      { name:'Obstipation / Blähungen',          start: 5.0, peak:20.0, end:40.0, category:'gi',         frequency:38  },
      { name:'Übelkeit / Erbrechen (NVP)',       start: 5.5, peak: 9.5, end:14.0, category:'gi',         frequency:80  },
      { name:'Heißhunger / Aversionen',          start: 6.5, peak:12.0, end:30.0, category:'gi',         frequency:65  },
      { name:'Sodbrennen',                      start:10.0, peak:35.0, end:40.0, category:'gi',         frequency:55  },
      { name:'Müdigkeit (1. Trim.)',             start: 4.0, peak: 9.5, end:14.5, category:'allgemein',  frequency:95  },
      { name:'Stimmungsschwankungen',            start: 4.0, peak: 8.0, end:14.0, category:'allgemein',  frequency:60  },
      { name:'Geruchsempfindlichkeit',           start: 5.0, peak: 9.0, end:13.0, category:'allgemein',  frequency:65  },
      { name:'Häufiges Wasserlassen (1. Trim.)', start: 5.0, peak:10.5, end:14.0, category:'allgemein',  frequency:70  },
      { name:'Schlafstörungen',                 start:12.0, peak:38.0, end:40.0, category:'allgemein',  frequency:74  },
      { name:'Atemnot / Dyspnoe',                start:28.0, peak:36.0, end:40.0, category:'allgemein',  frequency:67  },
      { name:'Häufiges Wasserlassen (3. Trim.)', start:30.0, peak:39.0, end:40.0, category:'allgemein',  frequency:80  },
      { name:'Nestbau-Instinkt',                start:34.0, peak:39.0, end:40.0, category:'allgemein',  frequency:70  },
      { name:'Brustspannen',                    start: 3.0, peak: 7.5, end:14.0, category:'körperlich', frequency:80  },
      { name:'Bauchwachstum sichtbar',           start:14.0, peak:39.0, end:40.5, category:'körperlich', frequency:100 },
      { name:'Linea nigra',                     start:21.0, peak:32.0, end:40.0, category:'körperlich', frequency:60  },
      { name:'Striae gravidarum',                start:24.0, peak:35.0, end:40.0, category:'körperlich', frequency:70  },
      { name:'Ödeme (Beine / Hände)',             start:25.0, peak:38.0, end:40.0, category:'körperlich', frequency:80  },
      { name:'Braxton-Hicks (spürbar)',          start:20.0, peak:38.0, end:40.0, category:'uterus',     frequency:65  },
      { name:'Senkwehen / Lightening',           start:34.0, peak:37.5, end:40.0, category:'uterus',     frequency:80  },
      { name:'Schleimpfropf-Abgang',             start:37.0, peak:39.0, end:40.5, category:'uterus',     frequency:100 },
      { name:'Geburtswehen',                    start:37.0, peak:40.0, end:42.0, category:'uterus',     frequency:100 },
      { name:'Implantationsblutung',             start: 4.0, peak: 4.3, end: 4.6, category:'misc',       frequency:25  },
      { name:'Erste Kindsbewegungen',            start:18.0, peak:30.0, end:40.0, category:'misc',       frequency:95  },
    ];

    const SURVIVAL_DATA = [
      {week:22,value:30},{week:23,value:50},{week:24,value:65},{week:25,value:80},
      {week:26,value:90},{week:27,value:95},{week:28,value:98},{week:30,value:99},
      {week:32,value:99.3},{week:34,value:99.5},{week:37,value:99.7},{week:40,value:99.8},
    ];
    const MISCARRIAGE_DATA = [
      {week:4,value:25},{week:5,value:21},{week:6,value:13},{week:7,value:4},
      {week:8,value:2.5},{week:10,value:1.5},{week:12,value:1},{week:14,value:0.5},
      {week:16,value:0.3},{week:20,value:0.2},{week:28,value:0.1},{week:40,value:0.05},
    ];
    const MILESTONES = [
      {week:6.5,label:'Herzschlag US'},{week:11,label:'Embryo→Fötus'},{week:13,label:'Ende T1'},
      {week:22,label:'Viability'},{week:27,label:'Beginn T3'},{week:37,label:'Reifgeburt'},{week:40,label:'ET'},
    ];
    const TRIMESTERS = [
      {start:0,end:13,color:'#fef2f2'},{start:13,end:27,color:'#eff6ff'},{start:27,end:42,color:'#faf5ff'},
    ];
    const TRIM_LABELS = [
      {p:6.5,l:'1. Trimester'},{p:20,l:'2. Trimester'},{p:34.5,l:'3. Trimester'},
    ];

    function PregnancyTimeline() {
      const [lmpStr,   setLmpStr]   = useState(() => {
        const d = new Date(); d.setDate(d.getDate() - 140); return d.toISOString().slice(0,10);
      });
      const [todayStr, setTodayStr] = useState(new Date().toISOString().slice(0,10));
      const [activeCats, setActiveCats] = useState(new Set(Object.keys(CATEGORIES)));
      const [hover, setHover] = useState(null);

      const lmp   = useMemo(() => new Date(lmpStr   + 'T12:00:00'), [lmpStr]);
      const today = useMemo(() => new Date(todayStr  + 'T12:00:00'), [todayStr]);
      const et    = useMemo(() => addDays(lmp, 280), [lmp]);
      const todaySsw = useMemo(() => dateToSsw(lmp, today), [lmp, today]);

      const toggle = (cat) => setActiveCats(prev => {
        const n = new Set(prev); n.has(cat) ? n.delete(cat) : n.add(cat); return n;
      });

      const visible = useMemo(
        () => SYMPTOMS.filter(s => activeCats.has(s.category)).sort((a,b)=>a.start-b.start),
        [activeCats]
      );

      const W = 1180, ML = 254, MR = 30, MT = 70, MB = 60;
      const ROW_H = 26;
      const MAX_HALF = 16;
      const sH = Math.max(visible.length * ROW_H, 60);
      const riskH = 200;
      const totalH = MT + sH + 28 + riskH + MB;
      const pw = W - ML - MR;

      const xOf  = (ssw) => ML + (ssw / 42) * pw;
      const riskY = MT + sH + 28;
      const botY  = riskY + riskH;

      const lens = (s, cy) => {
        const sx = xOf(s.start), px = xOf(s.peak), ex = xOf(s.end);
        const h = (s.frequency / 100) * MAX_HALF;
        const c1 = (sx+px)/2, c2 = (px+ex)/2;
        return `M${sx} ${cy} Q${c1} ${cy-h} ${px} ${cy-h} Q${c2} ${cy-h} ${ex} ${cy} Q${c2} ${cy+h} ${px} ${cy+h} Q${c1} ${cy+h} ${sx} ${cy} Z`;
      };

      const linePath = (data, y0, yH) =>
        data.map((d,i)=>`${i?'L':'M'}${xOf(d.week)} ${y0+yH-(d.value/100)*yH}`).join(' ');

      const ticks = Array.from({length:22},(_,i)=>i*2);

      const inp = {
        border:'1px solid #e2e8f0', borderRadius:8, padding:'5px 10px',
        fontSize:13, color:'#0f172a', background:'white',
        fontFamily:'inherit', cursor:'pointer',
      };

      return (
        <div style={{fontFamily:'system-ui,sans-serif',background:'#f8fafc',minHeight:'100vh',padding:16}}>
          <div style={{maxWidth:1240,margin:'0 auto'}}>

            <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',
              padding:'18px 24px',marginBottom:12,display:'flex',
              alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:700,color:'#0f172a',margin:'0 0 6px',
                  display:'flex',alignItems:'center',gap:8}}>
                  <Baby style={{width:22,height:22,color:'#ec4899'}}/>
                  Schwangerschafts-Timeline
                </h1>
                <div style={{display:'flex',flexWrap:'wrap',gap:16,alignItems:'center',marginTop:4}}>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#64748b'}}>
                    <Calendar style={{width:14,height:14}}/>
                    <span>LMP</span>
                    <input type="date" value={lmpStr} onChange={e=>setLmpStr(e.target.value)} style={inp}/>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'#64748b'}}>
                    <Calendar style={{width:14,height:14}}/>
                    <span>Heute</span>
                    <input type="date" value={todayStr} onChange={e=>setTodayStr(e.target.value)} style={inp}/>
                  </label>
                  <span style={{fontSize:13,color:'#94a3b8'}}>
                    ET: <strong style={{color:'#475569'}}>{fmtDE(et)}</strong>
                    &ensp;·&ensp;
                    Heute: <strong style={{color:'#dc2626'}}>SSW {fmtSsw(todaySsw)}</strong>
                  </span>
                </div>
              </div>
              <p style={{fontSize:11,color:'#94a3b8',maxWidth:340,margin:0,alignSelf:'center'}}>
                Balkendicke ∝ Häufigkeit. Kurven: NICHD 2013–18, Vermont Oxford 2020–22,
                Magnus 2019 BMJ, Tong 2008.
              </p>
            </div>

            <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',
              padding:'14px 18px',marginBottom:12}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <Activity style={{width:15,height:15,color:'#64748b'}}/>
                <span style={{fontSize:13,fontWeight:600,color:'#374151'}}>Symptom-Kategorien</span>
                <button onClick={()=>setActiveCats(new Set(Object.keys(CATEGORIES)))}
                  style={{marginLeft:'auto',fontSize:11,padding:'3px 8px',borderRadius:6,
                    background:'#f1f5f9',border:'none',cursor:'pointer',color:'#475569'}}>Alle an</button>
                <button onClick={()=>setActiveCats(new Set())}
                  style={{fontSize:11,padding:'3px 8px',borderRadius:6,
                    background:'#f1f5f9',border:'none',cursor:'pointer',color:'#475569'}}>Alle aus</button>
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {Object.entries(CATEGORIES).map(([key,cat])=>{
                  const on = activeCats.has(key);
                  const cnt = SYMPTOMS.filter(s=>s.category===key).length;
                  return (
                    <button key={key} onClick={()=>toggle(key)} style={{
                      padding:'6px 12px',borderRadius:8,fontSize:13,fontWeight:500,cursor:'pointer',
                      display:'flex',alignItems:'center',gap:6,border:'1px solid',transition:'all .15s',
                      background:on?cat.color:'white', borderColor:on?cat.color:'#e2e8f0',
                      color:on?'white':'#64748b',
                    }}>
                      {on ? <Eye style={{width:13,height:13}}/> : <EyeOff style={{width:13,height:13}}/>}
                      {cat.label}
                      <span style={{fontSize:10,opacity:.7}}>{cnt}</span>
                    </button>
                  );
                })}
              </div>
            </div>

            <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',
              padding:16,overflowX:'auto',position:'relative'}}>
              <svg width={W} height={totalH} style={{display:'block',minWidth:W}}>

                {TRIMESTERS.map((t,i)=>(
                  <rect key={i} x={xOf(t.start)} y={MT-30}
                    width={xOf(t.end)-xOf(t.start)} height={sH+28+riskH+30} fill={t.color}/>
                ))}
                {TRIM_LABELS.map(tl=>(
                  <text key={tl.l} x={xOf(tl.p)} y={MT-38} textAnchor="middle"
                    fill="#94a3b8" fontSize={11} fontWeight={500}>{tl.l}</text>
                ))}

                {ticks.map(w=>(
                  <g key={w}>
                    <line x1={xOf(w)} y1={MT-10} x2={xOf(w)} y2={botY}
                      stroke="#e2e8f0" strokeWidth={w%4===0?1:.5}
                      strokeDasharray={w%4===0?undefined:'2,3'}/>
                    <text x={xOf(w)} y={MT-14} textAnchor="middle"
                      fill="#475569" fontSize={11} fontWeight={600}>{w}</text>
                    <text x={xOf(w)} y={MT-2} textAnchor="middle"
                      fill="#94a3b8" fontSize={9}>{fmtDE(sswToDate(lmp,w))}</text>
                  </g>
                ))}
                <text x={ML-8} y={MT-14} textAnchor="end" fill="#64748b" fontSize={11} fontWeight={600}>SSW</text>
                <text x={ML-8} y={MT-2}  textAnchor="end" fill="#94a3b8" fontSize={9}>Datum</text>

                {visible.map((s,i)=>{
                  const cy = MT + i*ROW_H + ROW_H/2;
                  const cat = CATEGORIES[s.category];
                  const hov = hover?.type==='symptom' && hover.idx===i;
                  return (
                    <g key={s.name}
                      onMouseEnter={()=>setHover({type:'symptom',idx:i,data:s})}
                      onMouseLeave={()=>setHover(null)}
                      style={{cursor:'pointer'}}>
                      <rect x={ML} y={cy-ROW_H/2} width={pw} height={ROW_H}
                        fill={hov?'#f8fafc':'transparent'}/>
                      <text x={ML-10} y={cy+4} textAnchor="end" fontSize={11}
                        fill={hov?cat.color:'#374151'} fontWeight={hov?600:400}>{s.name}</text>
                      <path d={lens(s,cy)} fill={cat.color}
                        opacity={hov ? 0.90 : 0.62}
                        stroke={hov?cat.color:'none'} strokeWidth={1.5}/>
                    </g>
                  );
                })}
                {visible.length===0&&(
                  <text x={ML+pw/2} y={MT+sH/2} textAnchor="middle"
                    fill="#94a3b8" fontSize={13} fontStyle="italic">Keine Kategorie aktiv</text>
                )}

                <rect x={ML} y={riskY} width={pw} height={riskH}
                  fill="white" stroke="#e2e8f0" strokeWidth={1}/>
                {[0,25,50,75,100].map(v=>{
                  const yy = riskY+riskH-(v/100)*riskH;
                  return <g key={v}>
                    <line x1={ML} y1={yy} x2={ML+pw} y2={yy} stroke="#e2e8f0" strokeDasharray="2,3"/>
                    <text x={ML-8} y={yy+3} textAnchor="end" fill="#94a3b8" fontSize={10}>{v}%</text>
                  </g>;
                })}
                <text x={ML-8} y={riskY-6} textAnchor="end" fill="#64748b" fontSize={11} fontWeight={600}>
                  Wahrscheinlichkeit
                </text>

                <path d={linePath(SURVIVAL_DATA,riskY,riskH)}
                  fill="none" stroke="#10b981" strokeWidth={2.5} strokeLinejoin="round"/>
                {SURVIVAL_DATA.map(d=>{
                  const cx=xOf(d.week), cy=riskY+riskH-(d.value/100)*riskH;
                  return <circle key={d.week} cx={cx} cy={cy} r={3.5}
                    fill="#10b981" stroke="white" strokeWidth={1.5}
                    onMouseEnter={()=>setHover({type:'risk',x:cx,y:cy,
                      label:'Überleben Frühgeburt',week:d.week,value:d.value,color:'#10b981'})}
                    onMouseLeave={()=>setHover(null)} style={{cursor:'pointer'}}/>;
                })}
                <text x={xOf(40)+8} y={riskY+riskH-(99.8/100)*riskH+4}
                  fill="#10b981" fontSize={11} fontWeight={600}>Überleben FG</text>

                <path d={linePath(MISCARRIAGE_DATA,riskY,riskH)}
                  fill="none" stroke="#e11d48" strokeWidth={2.5} strokeLinejoin="round"/>
                {MISCARRIAGE_DATA.map(d=>{
                  const cx=xOf(d.week), cy=riskY+riskH-(d.value/100)*riskH;
                  return <circle key={d.week} cx={cx} cy={cy} r={3.5}
                    fill="#e11d48" stroke="white" strokeWidth={1.5}
                    onMouseEnter={()=>setHover({type:'risk',x:cx,y:cy,
                      label:'Fehlgeburtsrisiko',week:d.week,value:d.value,color:'#e11d48'})}
                    onMouseLeave={()=>setHover(null)} style={{cursor:'pointer'}}/>;
                })}
                <text x={xOf(6)-4} y={riskY+riskH-(13/100)*riskH-8}
                  textAnchor="end" fill="#e11d48" fontSize={11} fontWeight={600}>Fehlgeburt</text>

                {todaySsw >= 0 && todaySsw <= 42 && <>
                  <line x1={xOf(todaySsw)} y1={MT-50} x2={xOf(todaySsw)} y2={botY}
                    stroke="#dc2626" strokeWidth={2} strokeDasharray="5,3"/>
                  <rect x={xOf(todaySsw)-36} y={MT-66} width={72} height={17} rx={4} fill="#dc2626"/>
                  <text x={xOf(todaySsw)} y={MT-53} textAnchor="middle"
                    fill="white" fontSize={10} fontWeight={700}>HEUTE {fmtSsw(todaySsw)}</text>
                </>}

                {MILESTONES.map(m=>{
                  const mx=xOf(m.week);
                  return <g key={m.label}>
                    <line x1={mx} y1={botY} x2={mx} y2={botY+8} stroke="#475569" strokeWidth={1}/>
                    <text x={mx} y={botY+21} textAnchor="middle"
                      fill="#475569" fontSize={10} fontWeight={500}>{m.label}</text>
                    <text x={mx} y={botY+33} textAnchor="middle"
                      fill="#94a3b8" fontSize={9}>{fmtDE(sswToDate(lmp,m.week))}</text>
                  </g>;
                })}
              </svg>

              {hover?.type==='symptom'&&(()=>{
                const s=hover.data, cat=CATEGORIES[s.category];
                return <div style={{
                  position:'absolute',pointerEvents:'none',background:'#0f172a',color:'white',
                  borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.35)',padding:'10px 14px',
                  zIndex:10,width:224,
                  left:Math.min(xOf(s.peak)+14,W-230),
                  top:MT+hover.idx*ROW_H-52,
                }}>
                  <div style={{fontWeight:700,fontSize:13,color:cat.color,marginBottom:6}}>{s.name}</div>
                  <div style={{fontSize:11,color:'#94a3b8',lineHeight:1.75}}>
                    <div>Beginn SSW {fmtSsw(s.start)} · {fmtDE(sswToDate(lmp,s.start))}</div>
                    <div>Peak&nbsp;&nbsp; SSW {fmtSsw(s.peak)} · {fmtDE(sswToDate(lmp,s.peak))}</div>
                    <div>Ende&nbsp;&nbsp; SSW {fmtSsw(s.end)} · {fmtDE(sswToDate(lmp,s.end))}</div>
                    <div style={{marginTop:6,paddingTop:6,borderTop:'1px solid #334155',color:'white'}}>
                      Häufigkeit: <strong>{s.frequency}%</strong> der Schwangeren
                    </div>
                  </div>
                </div>;
              })()}

              {hover?.type==='risk'&&(
                <div style={{
                  position:'absolute',pointerEvents:'none',background:'#0f172a',color:'white',
                  borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.35)',padding:'8px 12px',
                  zIndex:10,left:hover.x+10,top:hover.y-52,
                }}>
                  <div style={{fontWeight:700,fontSize:11,color:hover.color}}>{hover.label}</div>
                  <div style={{fontSize:10,color:'#94a3b8'}}>
                    SSW {hover.week} · {fmtDE(sswToDate(lmp,hover.week))}
                  </div>
                  <div style={{fontSize:16,fontWeight:700,marginTop:2}}>{hover.value}%</div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PregnancyTimeline />);
  </script>

  <footer class="container">
    <small>© 2026 Alexander Alber · <a href="/">alber.me</a></small>
  </footer>
</body>
</html>
