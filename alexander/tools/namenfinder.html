  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const lang = localStorage.getItem('lang') || 'de';
    const STRINGS = {
      de: {
        loading:        'Namen werden geladen\u2026',
        title:          'Namenfinder',
        subtitle:       n => `${n} Namen \u2013 filtern nach Herkunft, Klang, Rang, Silben und mehr.`,
        labelGender:    'Geschlecht',
        all:            'Alle',
        girls:          '\u2640 M\u00e4dchen',
        boys:           '\u2642 Jungen',
        labelTrend:     'Trend',
        trendRising:    'Aufst.',
        trendStable:    'Stabil',
        trendFalling:   'Fallend',
        trendFallen:    'Veraltet',
        labelSound:     'Klang',
        soundSoft:      'Sanft',
        soundHard:      'Hart',
        soundNeutral:   'Neutral',
        labelOrigin:    'Herkunft',
        rankCur:        'Akt. Rang',
        rankPeak:       'Peak Rang',
        rangeAll:       'alle',
        labelEnding:    'Endlaut',
        endVowel:       'Vokal',
        endCons:        'Kons.',
        labelSyllables: 'Silben',
        labelLength:    'L\u00e4nge',
        labelSort:      'Sortierung',
        sortRank:       'Beliebtheit',
        sortAlpha:      'A \u2013 Z',
        resetBtn:       '\u2715 Zur\u00fccksetzen',
        results:        n => `${n} ${n === 1 ? 'Name' : 'Namen'} gefunden`,
        noResults:      'Keine Namen gefunden \u2013 versuche andere Filter.',
        notInTop200:    'nicht in Top 200',
        legendStrong:   'Dekaden-Balken',
        legend:         '\u2014 Intensit\u00e4t zeigt Beliebtheitsstufe: dunkel\u00a0=\u00a0Top\u00a010, mittel\u00a0=\u00a0Top\u00a050\u00a0/\u00a0100, hell\u00a0=\u00a0Top\u00a0200, leer\u00a0=\u00a0nicht vertreten. Silbenx\u00e4hlung per Vokalcluster; stimmloses End-h wird als Vokal gewertet (Noah, Sarah\u00a0\u2026). Quelle: Gesellschaft f\u00fcr deutsche Sprache (GfdS), 1980\u20132024.',
        statCurrent:    'Aktuell',
        statPeak:       'Peak',
        statTrend:      'Trend',
      },
      en: {
        loading:        'Loading names\u2026',
        title:          'Name Finder',
        subtitle:       n => `${n} names \u2013 filter by origin, sound, rank, syllables, and more.`,
        labelGender:    'Gender',
        all:            'All',
        girls:          '\u2640 Girls',
        boys:           '\u2642 Boys',
        labelTrend:     'Trend',
        trendRising:    'Rising',
        trendStable:    'Stable',
        trendFalling:   'Falling',
        trendFallen:    'Old',
        labelSound:     'Sound',
        soundSoft:      'Soft',
        soundHard:      'Hard',
        soundNeutral:   'Neutral',
        labelOrigin:    'Origin',
        rankCur:        'Cur. Rank',
        rankPeak:       'Peak Rank',
        rangeAll:       'all',
        labelEnding:    'Ending',
        endVowel:       'Vowel',
        endCons:        'Cons.',
        labelSyllables: 'Syllables',
        labelLength:    'Length',
        labelSort:      'Sort',
        sortRank:       'Popularity',
        sortAlpha:      'A \u2013 Z',
        resetBtn:       '\u2715 Reset',
        results:        n => `${n} ${n === 1 ? 'name' : 'names'} found`,
        noResults:      'No names found \u2013 try different filters.',
        notInTop200:    'not in Top 200',
        legendStrong:   'Decade bars',
        legend:         '\u2014 Opacity shows popularity tier: dark\u00a0=\u00a0Top\u00a010, medium\u00a0=\u00a0Top\u00a050\u00a0/\u00a0100, light\u00a0=\u00a0Top\u00a0200, empty\u00a0=\u00a0not ranked. Syllable count by vowel clusters; silent final -h after vowel counts as vowel (Noah, Sarah\u2026). Source: Gesellschaft f\u00fcr deutsche Sprache (GfdS), 1980\u20132024.',
        statCurrent:    'Current',
        statPeak:       'Peak',
        statTrend:      'Trend',
      }
    };
    const t = STRINGS[lang] || STRINGS.de;

    const DECADES       = ['1980s', '1990s', '2000s', '2010s', '2020s'];
    const DECADE_LABELS = ['80', '90', '00', '10', '20'];
    const VOWELS        = new Set(['a','e','i','o','u','ä','ö','ü','y']);
    const RANK_MAX      = 100;

    const ALL_TAGS = [
      'germanisch','lateinisch','griechisch','hebräisch','nordisch',
      'slawisch','keltisch','romanisch','arabisch','persisch','englisch',
      'biblisch','retro',
    ];
    const TAG_COLORS      = { biblisch: '#d97706', retro: '#7c3aed' };
    const DEFAULT_TAG_CLR = '#059669';

    const TREND_CFG = {
      rising:  { icon: '↑', label: t.trendRising,  color: '#059669' },
      stable:  { icon: '→', label: t.trendStable,  color: '#2563eb' },
      falling: { icon: '↓', label: t.trendFalling, color: '#d97706' },
      fallen:  { icon: '✕', label: t.trendFallen,  color: '#9ca3af' },
    };

    const TIER_OPACITY = { top10: 1.0, top50: 0.68, top100: 0.40, top200: 0.20 };

    // ── Derive phonetic / length fields ──────────────────────────────────────
    function deriveFields(entry) {
      const lower = entry.name.toLowerCase();

      // Treat trailing silent-h (vowel + h) as vowel ending: Noah, Sarah, Leah…
      // but not Ruth, Beth (consonant + h).
      let finalIdx = lower.length - 1;
      if (lower[finalIdx] === 'h' && finalIdx > 0 && VOWELS.has(lower[finalIdx - 1])) {
        finalIdx--;
      }
      const endsVowel = VOWELS.has(lower[finalIdx]);

      // Syllable count = number of maximal vowel clusters
      let syllables = 0, inVowel = false;
      for (const ch of lower) {
        if (VOWELS.has(ch)) { if (!inVowel) { syllables++; inVowel = true; } }
        else { inVowel = false; }
      }

      return { ...entry, ends_vowel: endsVowel, syllables, length: entry.name.length };
    }

    // ── DecadeStrip ──────────────────────────────────────────────────────────
    function DecadeStrip({ tier, gender }) {
      const color = gender === 'f' ? '#e11d48' : '#2563eb';
      return (
        <div>
          <div style={{ display: 'flex', gap: 3, marginBottom: 2 }}>
            {DECADE_LABELS.map(l => (
              <div key={l} style={{ width: 24, textAlign: 'center', fontSize: '0.58rem', color: '#9ca3af' }}>{l}</div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 3 }}>
            {DECADES.map(d => {
              const tierVal = tier[d];
              const opacity = tierVal ? (TIER_OPACITY[tierVal] ?? 0.12) : 0.07;
              return (
                <div key={d} title={tierVal ? `${d}: ${tierVal}` : `${d}: ${t.notInTop200}`}
                  style={{ width: 24, height: 14, borderRadius: 3, backgroundColor: color, opacity,
                    border: tierVal ? 'none' : '1px solid #ddd' }} />
              );
            })}
          </div>
        </div>
      );
    }

    // ── NameCard ─────────────────────────────────────────────────────────────
    function NameCard({ entry }) {
      const trend       = TREND_CFG[entry.trend];
      const genderColor = entry.gender === 'f' ? '#e11d48' : '#2563eb';
      const genderIcon  = entry.gender === 'f' ? '♀' : '♂';

      const statLbl = { fontSize: '0.58rem', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 2 };
      const statVal = { fontSize: '0.9rem', fontWeight: 700, color: '#374151', lineHeight: 1.1 };

      return (
        <div className="name-card">
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5, marginBottom: 3 }}>
            <span style={{ fontSize: '1.45rem', fontWeight: 700, color: '#111', lineHeight: 1.1 }}>{entry.name}</span>
            <span style={{ color: genderColor, fontSize: '0.82rem', fontWeight: 600 }}>{genderIcon}</span>
          </div>

          <div style={{ fontSize: '0.74rem', color: '#6b7280', fontStyle: 'italic', marginBottom: 9, lineHeight: 1.35 }}>
            {entry.meaning}
          </div>

          <div style={{ marginBottom: 10 }}>
            {entry.tags.map(tag => (
              <span key={tag} className={`tag-badge${tag === 'biblisch' || tag === 'retro' ? ' ' + tag : ''}`}>{tag}</span>
            ))}
          </div>

          <DecadeStrip tier={entry.decade_tier} gender={entry.gender} />

          {/* Ranks + Trend — three clearly labelled columns */}
          <div style={{ display: 'flex', gap: 16, marginTop: 10 }}>
            <div style={{ flex: '0 0 54px' }}>
              <div style={statLbl}>{t.statCurrent}</div>
              <div style={{ ...statVal, color: entry.rank_current ? '#374151' : '#d1d5db' }}>
                {entry.rank_current ? `#${entry.rank_current}` : '—'}
              </div>
            </div>
            <div style={{ flex: '0 0 76px' }}>
              <div style={statLbl}>{t.statPeak}</div>
              <div style={statVal}>
                #{entry.peak_rank}
                <span style={{ fontSize: '0.65rem', color: '#9ca3af', fontWeight: 400, marginLeft: 3 }}>
                  {entry.peak_decade.replace('s', '')}
                </span>
              </div>
            </div>
            <div style={{ flex: '1 1 auto', textAlign: 'right' }}>
              <div style={statLbl}>{t.statTrend}</div>
              <div style={{ fontSize: '0.76rem', fontWeight: 500, color: trend.color }}>
                {trend.icon} {trend.label}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── FilterPill ───────────────────────────────────────────────────────────
    function FilterPill({ label, active, color, onClick }) {
      return (
        <button className="filter-pill" onClick={onClick} style={{
          borderColor: active ? color : '#d1d5db',
          background:  active ? color : 'transparent',
          color:       active ? '#fff' : '#6b7280',
        }}>
          {label}
        </button>
      );
    }

    // ── DualRangeSlider ──────────────────────────────────────────────────────
    function DualRangeSlider({ label, lo, hi, onChange }) {
      const min  = 1, max = RANK_MAX;
      const pLo  = ((lo - min) / (max - min)) * 100;
      const pHi  = ((hi - min) / (max - min)) * 100;
      const active = lo > min || hi < max;

      return (
        <div style={{ flex: '1 1 180px', minWidth: 160 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
            <span style={{ fontSize: '0.72rem', color: '#9ca3af', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
              {label}
            </span>
            <span style={{ fontSize: '0.74rem', fontWeight: active ? 600 : 400, color: active ? '#374151' : '#d1d5db' }}>
              {active ? `#${lo} – #${hi}` : t.rangeAll}
            </span>
          </div>
          <div style={{ position: 'relative', height: 20, margin: '0 6px' }}>
            {/* Track */}
            <div style={{ position: 'absolute', top: '50%', left: 0, right: 0, height: 4,
              transform: 'translateY(-50%)', background: '#e5e7eb', borderRadius: 2, pointerEvents: 'none' }}>
              <div style={{ position: 'absolute', height: '100%', borderRadius: 2,
                left: `${pLo}%`, right: `${100 - pHi}%`,
                background: active ? '#2563eb' : '#e5e7eb' }} />
            </div>
            {/* Lo thumb — comes to front only when it's near the high end */}
            <input type="range" className="dual-thumb"
              min={min} max={max} value={lo}
              onChange={e => onChange(Math.min(+e.target.value, hi - 1), hi)}
              style={{ zIndex: lo >= hi - 4 ? 5 : 3 }}
            />
            {/* Hi thumb */}
            <input type="range" className="dual-thumb"
              min={min} max={max} value={hi}
              onChange={e => onChange(lo, Math.max(+e.target.value, lo + 1))}
              style={{ zIndex: 4 }}
            />
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [names,   setNames]   = useState([]);
      const [loading, setLoading] = useState(true);

      const [genderFilter,    setGenderFilter]    = useState('all');
      const [soundFilter,     setSoundFilter]     = useState('all');
      const [trendFilter,     setTrendFilter]     = useState('all');
      const [activeTags,      setActiveTags]      = useState(new Set());
      const [endsVowelFilter, setEndsVowelFilter] = useState('all');
      const [syllablesFilter, setSyllablesFilter] = useState(new Set());
      const [lengthFilter,    setLengthFilter]    = useState(new Set());
      const [rankCurRange,    setRankCurRange]    = useState([1, RANK_MAX]);
      const [rankPeakRange,   setRankPeakRange]   = useState([1, RANK_MAX]);
      const [sortBy,          setSortBy]          = useState('rank');

      useEffect(() => {
        fetch('/assets/files/names.json')
          .then(r => r.json())
          .then(data => { setNames(data.map(deriveFields)); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      const toggleSet = useCallback((setter, val) => {
        setter(prev => {
          const next = new Set(prev);
          next.has(val) ? next.delete(val) : next.add(val);
          return next;
        });
      }, []);

      const rankCurActive  = rankCurRange[0]  > 1 || rankCurRange[1]  < RANK_MAX;
      const rankPeakActive = rankPeakRange[0] > 1 || rankPeakRange[1] < RANK_MAX;

      const hasFilters =
        genderFilter !== 'all' || soundFilter !== 'all' || trendFilter !== 'all' ||
        activeTags.size > 0 || endsVowelFilter !== 'all' ||
        syllablesFilter.size > 0 || lengthFilter.size > 0 ||
        rankCurActive || rankPeakActive;

      const resetFilters = () => {
        setGenderFilter('all'); setSoundFilter('all'); setTrendFilter('all');
        setActiveTags(new Set()); setEndsVowelFilter('all');
        setSyllablesFilter(new Set()); setLengthFilter(new Set());
        setRankCurRange([1, RANK_MAX]); setRankPeakRange([1, RANK_MAX]);
      };

      const filtered = useMemo(() => {
        let r = names;
        if (genderFilter !== 'all') r = r.filter(n => n.gender === genderFilter);
        if (soundFilter  !== 'all') r = r.filter(n => n.sound  === soundFilter);
        if (trendFilter  !== 'all') r = r.filter(n => n.trend  === trendFilter);
        if (activeTags.size > 0)
          r = r.filter(n => [...activeTags].some(t => n.tags.includes(t)));

        if (rankCurActive) {
          const [lo, hi] = rankCurRange;
          r = r.filter(n => n.rank_current && n.rank_current >= lo && n.rank_current <= hi);
        }
        if (rankPeakActive) {
          const [lo, hi] = rankPeakRange;
          r = r.filter(n => n.peak_rank >= lo && n.peak_rank <= hi);
        }

        if (endsVowelFilter === 'vowel')     r = r.filter(n =>  n.ends_vowel);
        if (endsVowelFilter === 'consonant') r = r.filter(n => !n.ends_vowel);

        if (syllablesFilter.size > 0) {
          r = r.filter(n => {
            const key = n.syllables >= 4 ? '4+' : String(n.syllables);
            return syllablesFilter.has(key);
          });
        }
        if (lengthFilter.size > 0) {
          r = r.filter(n => {
            const key = n.length <= 4 ? 'short' : n.length <= 6 ? 'medium' : n.length <= 8 ? 'long' : 'xlong';
            return lengthFilter.has(key);
          });
        }

        r = [...r];
        if (sortBy === 'rank') {
          r.sort((a, b) => {
            if (a.rank_current && b.rank_current) return a.rank_current - b.rank_current;
            if (a.rank_current) return -1;
            if (b.rank_current) return  1;
            return (a.peak_rank ?? 999) - (b.peak_rank ?? 999);
          });
        } else if (sortBy === 'alpha') {
          r.sort((a, b) => a.name.localeCompare(b.name, 'de'));
        }
        return r;
      }, [names, genderFilter, soundFilter, trendFilter, activeTags,
          rankCurRange, rankPeakRange, rankCurActive, rankPeakActive,
          endsVowelFilter, syllablesFilter, lengthFilter, sortBy]);

      const row = { display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center' };
      const lbl = { fontSize: '0.72rem', color: '#9ca3af', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', whiteSpace: 'nowrap' };

      if (loading) return (
        <div style={{ padding: '60px 16px', textAlign: 'center', color: '#9ca3af' }}>
          {t.loading}
        </div>
      );

      return (
        <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 16px 48px' }}>

          <div style={{ paddingTop: 28, marginBottom: 20 }}>
            <h1 style={{ margin: 0, fontSize: '1.9rem', fontWeight: 700, color: '#111' }}>{t.title}</h1>
            <p style={{ margin: '5px 0 0', color: '#6b7280', fontSize: '0.88rem' }}>
              {t.subtitle(names.length)}
            </p>
          </div>

          <div style={{ background: '#fff', borderRadius: 12, padding: '14px 16px', marginBottom: 14,
            border: '1px solid #e5e7eb', display: 'flex', flexDirection: 'column', gap: 11 }}>

            {/* Gender */}
            <div style={row}>
              <span style={lbl}>{t.labelGender}</span>
              {[['all', t.all],['f', t.girls],['m', t.boys]].map(([v, l]) => (
                <FilterPill key={v} label={l} active={genderFilter === v}
                  color={v === 'f' ? '#e11d48' : v === 'm' ? '#2563eb' : '#374151'}
                  onClick={() => setGenderFilter(v)} />
              ))}
            </div>

            {/* Trend */}
            <div style={row}>
              <span style={lbl}>{t.labelTrend}</span>
              <FilterPill label={t.all} active={trendFilter === 'all'} color="#374151" onClick={() => setTrendFilter('all')} />
              {Object.entries(TREND_CFG).map(([k, v]) => (
                <FilterPill key={k} label={`${v.icon} ${v.label}`} active={trendFilter === k}
                  color={v.color} onClick={() => setTrendFilter(k)} />
              ))}
            </div>

            {/* Sound */}
            <div style={row}>
              <span style={lbl}>{t.labelSound}</span>
              {[['all', t.all],['soft', t.soundSoft],['hard', t.soundHard],['neutral', t.soundNeutral]].map(([v, l]) => (
                <FilterPill key={v} label={l} active={soundFilter === v} color="#374151" onClick={() => setSoundFilter(v)} />
              ))}
            </div>

            {/* Tags (multi-select) */}
            <div style={row}>
              <span style={lbl}>{t.labelOrigin}</span>
              {ALL_TAGS.map(tag => (
                <FilterPill key={tag} label={tag} active={activeTags.has(tag)}
                  color={TAG_COLORS[tag] ?? DEFAULT_TAG_CLR}
                  onClick={() => toggleSet(setActiveTags, tag)} />
              ))}
            </div>

            {/* Rank sliders */}
            <div style={{ borderTop: '1px solid #f3f4f6', paddingTop: 12,
              display: 'flex', gap: 28, flexWrap: 'wrap' }}>
              <DualRangeSlider label={t.rankCur}
                lo={rankCurRange[0]} hi={rankCurRange[1]}
                onChange={(lo, hi) => setRankCurRange([lo, hi])} />
              <DualRangeSlider label={t.rankPeak}
                lo={rankPeakRange[0]} hi={rankPeakRange[1]}
                onChange={(lo, hi) => setRankPeakRange([lo, hi])} />
            </div>

            {/* Ending */}
            <div style={row}>
              <span style={lbl}>{t.labelEnding}</span>
              {[['all', t.all],['vowel', t.endVowel],['consonant', t.endCons]].map(([v, l]) => (
                <FilterPill key={v} label={l} active={endsVowelFilter === v} color="#374151"
                  onClick={() => setEndsVowelFilter(v)} />
              ))}
            </div>

            {/* Syllables (multi-select) */}
            <div style={row}>
              <span style={lbl}>{t.labelSyllables}</span>
              {[['1','1'],['2','2'],['3','3'],['4+','≥4']].map(([v, l]) => (
                <FilterPill key={v} label={l} active={syllablesFilter.has(v)} color="#374151"
                  onClick={() => toggleSet(setSyllablesFilter, v)} />
              ))}
            </div>

            {/* Length (multi-select) */}
            <div style={row}>
              <span style={lbl}>{t.labelLength}</span>
              {[['short','≤4'],['medium','5–6'],['long','7–8'],['xlong','≥9']].map(([v, l]) => (
                <FilterPill key={v} label={l} active={lengthFilter.has(v)} color="#374151"
                  onClick={() => toggleSet(setLengthFilter, v)} />
              ))}
            </div>

            {/* Sort + reset */}
            <div style={{ ...row, borderTop: '1px solid #f3f4f6', paddingTop: 10, justifyContent: 'space-between' }}>
              <div style={row}>
                <span style={lbl}>{t.labelSort}</span>
                {[['rank', t.sortRank],['alpha', t.sortAlpha]].map(([v, l]) => (
                  <FilterPill key={v} label={l} active={sortBy === v} color="#374151" onClick={() => setSortBy(v)} />
                ))}
              </div>
              {hasFilters && (
                <button onClick={resetFilters} style={{
                  background: 'none', border: 'none', cursor: 'pointer',
                  color: '#9ca3af', fontSize: '0.78rem', padding: '4px 6px',
                }}>
                  {t.resetBtn}
                </button>
              )}
            </div>
          </div>

          <p style={{ margin: '0 0 12px', fontSize: '0.82rem', color: '#9ca3af' }}>
            {t.results(filtered.length)}
          </p>

          {filtered.length === 0 && (
            <div style={{ textAlign: 'center', padding: '48px 0', color: '#9ca3af' }}>
              {t.noResults}
            </div>
          )}

          {filtered.length > 0 && (
            <div className="name-grid">
              {filtered.map(entry => <NameCard key={entry.name} entry={entry} />)}
            </div>
          )}

          <div style={{ marginTop: 32, fontSize: '0.74rem', color: '#9ca3af', borderTop: '1px solid #e5e7eb', paddingTop: 16 }}>
            <strong style={{ color: '#6b7280' }}>{t.legendStrong}</strong> {t.legend}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
