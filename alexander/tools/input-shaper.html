    };

    /* Negative (partial-sum) shaper: three equispaced impulses at phases [0, φ, 2φ]
       with φ = π/2 → π/3 as the aggressiveness m goes 0 → 1. The two damped
       zero-vibration constraints (ΣAᵢe^{βφᵢ}cosφᵢ = ΣAᵢe^{βφᵢ}sinφᵢ = 0) then have
       the closed-form solution Aᵢ ∝ [p², −2p·cosφ, 1] with p = e^{βφ}. Exact for any
       ζ; reduces to damped ZV at m=0 and the textbook UM-ZV [1,−1,1] at ζ=0, m=1.
       (For ζ>0 the amplitudes are decay-weighted, just as ZV carries its K factor.) */
    function negShaperImpulses(m, zeta, d) {
      const beta = zeta / Math.sqrt(1 - zeta * zeta);   // ζω_n/ω_d, the per-radian decay
      const phi = Math.PI / 2 - m * (Math.PI / 6);      // π/2 (ZV) → π/3 (UM-ZV)
      const p = Math.exp(beta * phi);
      return {
        t: [0, (phi / Math.PI) * d, (2 * phi / Math.PI) * d],
        a: [p * p, -2 * p * Math.cos(phi), 1],          // normalised by the caller
      };
    }

    /* Negative unity-magnitude EI shaper: five impulses A = [+1,−1,+1,−1,+1] at
       symmetric times t = [0, x₂T, ½x₅T, (x₅−x₂)T, x₅T]. The two free durations
       (x₂, x₅) are fixed by the two EI conditions at the design frequency ρ = 1:
       the residual equals the tolerated hump V, and its slope is zero (ρ = 1 is
       the top of the hump). For ζ > 0 the amplitudes are decay-weighted just like
       UM-ZV (aᵢ = ±e^{−ζωₙtᵢ}, ±1 only at ζ = 0): at ρ = 1 that weighting cancels
       the system's own decay, so the effective impulse train is the symmetric ±1
       design and the EI band (hump + two flanking zeros) survives the damping. A
       strict ±1 train instead collapses the band into a single notch once the
       per-cycle decay K drops well below 1. The 2×2 Newton then only has to slide
       the times so the hump touches V at ρ = 1 for any ζ.

       Step 1 seeds with the closed-form undamped solution (the symmetric ±1 train
       reduces to M(ρ) = 1 + 2cos(γρ) − 2cos(βρ); the conditions become
       2cosγ − 2cosβ + 1 + V = 0 and γsinγ − βsinβ = 0, γ = πx₅, β = π(x₅−2x₂)).
       Step 2 refines (x₂, x₅) with a finite-difference 2×2 Newton on the damped
       residual r(ρ): F₁ = r(1) − V, F₂ ∝ r′(1) ≈ r(1+δ) − r(1−δ).
       At V = 0.05, ζ = 0 this gives ≈0.74·T — shorter than the positive EI (1·T)
       because the negative impulses retract, the price being command over-drive. */
    function umEIImpulses(V, zeta, d, wn) {
      const T = 2 * d;                             // full damped period
      /* 1 — undamped closed-form seed */
      let g = 2.3, b = 1.7;                        // good seed for V ∈ [0.01, 0.2]
      for (let it = 0; it < 40; it++) {
        const F1 = 2 * Math.cos(g) - 2 * Math.cos(b) + 1 + V;
        const F2 = g * Math.sin(g) - b * Math.sin(b);
        const J11 = -2 * Math.sin(g),              J12 =  2 * Math.sin(b);
        const J21 = Math.sin(g) + g * Math.cos(g), J22 = -(Math.sin(b) + b * Math.cos(b));
        const det = J11 * J22 - J12 * J21;
        if (Math.abs(det) < 1e-12) break;
        g -= (F1 * J22 - F2 * J12) / det;
        b -= (-F1 * J21 + F2 * J11) / det;
      }
      let x5 = g / Math.PI;                        // outer impulse, fraction of period
      let x2 = (x5 - b / Math.PI) / 2;             // first inner impulse
      const x2Seed = x2, x5Seed = x5;

      /* 2 — refine against the true damped residual (no-op at ζ = 0).
         The damped residual is oscillatory in the impulse times, so it has many
         roots; only the one near the undamped seed is the short EI shaper. We keep
         Newton on that branch by limiting each step and clamping (x₂, x₅) into a
         box around the seed — otherwise it can wander off to a spurious solution
         many periods long that still satisfies r(1) = V. */
      const build = (a2, a5) => {
        const tt = [0, a2 * T, (a5 / 2) * T, (a5 - a2) * T, a5 * T];
        const aa = [1, -1, 1, -1, 1].map((s, i) => s * Math.exp(-zeta * wn * tt[i]));  // decay-weighted (≡ ±1 at ζ = 0)
        const sum = aa.reduce((p, v) => p + v, 0);
        return { t: tt, a: aa.map(v => v / sum) };                                      // static gain 1
      };
      const res   = (rho, a2, a5) => residualVibration(rho, build(a2, a5), zeta, wn);
      const dlt = 0.02, hx = 1e-3, maxStep = 0.05;
      const x5lo = 0.5 * x5Seed, x5hi = 1.6 * x5Seed;     // stay near the seed branch
      const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
      const F = (a2, a5) => [res(1, a2, a5) - V, res(1 + dlt, a2, a5) - res(1 - dlt, a2, a5)];
      for (let it = 0; it < 80; it++) {
        const f   = F(x2, x5);
        const f2p = F(x2 + hx, x5), f2m = F(x2 - hx, x5);
        const f5p = F(x2, x5 + hx), f5m = F(x2, x5 - hx);
        const J11 = (f2p[0] - f2m[0]) / (2 * hx), J12 = (f5p[0] - f5m[0]) / (2 * hx);
        const J21 = (f2p[1] - f2m[1]) / (2 * hx), J22 = (f5p[1] - f5m[1]) / (2 * hx);
        const det = J11 * J22 - J12 * J21;
        if (!isFinite(det) || Math.abs(det) < 1e-14) break;
        let d2 = ( f[0] * J22 - f[1] * J12) / det;
        let d5 = (-f[0] * J21 + f[1] * J11) / det;
        const mag = Math.abs(d2) + Math.abs(d5);             // limit the step length
        if (mag > maxStep) { const s = maxStep / mag; d2 *= s; d5 *= s; }
        x5 = clamp(x5 - d5, x5lo, x5hi);
        x2 = clamp(x2 - d2, 1e-3, x5 / 2 - 1e-3);
        if (mag < 1e-9) break;
      }
      // reject a solve that drifted off the branch or never reached V → use the seed
      if (!isFinite(x2) || !isFinite(x5) || Math.abs(res(1, x2, x5) - V) > 5e-3) {
        x2 = x2Seed; x5 = x5Seed;
      }
      return build(x2, x5);                        // decay-weighted, already Σ = 1
    }

    /* Specified-Negative-Amplitude EI: same five-impulse symmetric structure as
       UM-EI, but the effective amplitudes are [p, −a, q, −a, p] with the negative
       magnitude a specified by the aggressiveness slider (0…1). The remaining
       degree of freedom (p) is pinned by a linear bridge so the endpoints are
       exact: p(a) interpolates the positive-EI outer amplitude (1+V)/4 (a = 0) up
       to 1 (a = 1, where this reduces to UM-EI). q follows from Σ = 1. The two
       impulse times are then solved against the damped residual for hump = V and
       zero slope at ρ = 1, exactly like UM-EI. Amplitudes decay-weighted for ζ>0.
       This is a smooth teaching bridge between positive EI and UM-EI, not the
       time-optimal SNA of the literature. */
    function snaEIImpulses(V, aNeg, zeta, d, wn) {
      const T = 2 * d;
      const p = (1 + V) / 4 + aNeg * (1 - (1 + V) / 4);
      const q = 1 - 2 * p + 2 * aNeg;
      const mag = [p, aNeg, q, aNeg, p], sgn = [1, -1, 1, -1, 1];

      /* seed = interpolation of the two analytic endpoints in (γ, β) = (πx₅, π(x₅−2x₂)) */
      let g1 = 2.3, b1 = 1.7;                       // a = 1: UM-EI closed form
      for (let it = 0; it < 40; it++) {
        const F1 = 2 * Math.cos(g1) - 2 * Math.cos(b1) + 1 + V;
        const F2 = g1 * Math.sin(g1) - b1 * Math.sin(b1);
        const J11 = -2 * Math.sin(g1),               J12 =  2 * Math.sin(b1);
        const J21 = Math.sin(g1) + g1 * Math.cos(g1), J22 = -(Math.sin(b1) + b1 * Math.cos(b1));
        const det = J11 * J22 - J12 * J21;
        if (Math.abs(det) < 1e-12) break;
        g1 -= (F1 * J22 - F2 * J12) / det;
        b1 -= (-F1 * J21 + F2 * J11) / det;
      }
      const g0 = Math.PI, b0 = Math.acos((V - 1) / 2);   // a = 0: positive EI (x₅ = 1)
      let x5 = (g0 + aNeg * (g1 - g0)) / Math.PI;
      let x2 = (x5 - (b0 + aNeg * (b1 - b0)) / Math.PI) / 2;
      const x2Seed = x2, x5Seed = x5;

      /* refine (x₂, x₅) against the damped residual: r(1) = V and r′(1) = 0 */
      const build = (a2, a5) => {
        const tt = [0, a2 * T, (a5 / 2) * T, (a5 - a2) * T, a5 * T];
        const aa = sgn.map((s, i) => s * mag[i] * Math.exp(-zeta * wn * tt[i]));
        const sum = aa.reduce((u, v) => u + v, 0);
        return { t: tt, a: aa.map(v => v / sum) };
      };
      const res = (rho, a2, a5) => residualVibration(rho, build(a2, a5), zeta, wn);
      const dlt = 0.02, hx = 1e-3, maxStep = 0.05;
      const x5lo = 0.5 * x5Seed, x5hi = 1.6 * x5Seed;
      const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
      const F = (a2, a5) => [res(1, a2, a5) - V, res(1 + dlt, a2, a5) - res(1 - dlt, a2, a5)];
      for (let it = 0; it < 80; it++) {
        const f   = F(x2, x5);
        const f2p = F(x2 + hx, x5), f2m = F(x2 - hx, x5);
        const f5p = F(x2, x5 + hx), f5m = F(x2, x5 - hx);
        const J11 = (f2p[0] - f2m[0]) / (2 * hx), J12 = (f5p[0] - f5m[0]) / (2 * hx);
        const J21 = (f2p[1] - f2m[1]) / (2 * hx), J22 = (f5p[1] - f5m[1]) / (2 * hx);
        const det = J11 * J22 - J12 * J21;
        if (!isFinite(det) || Math.abs(det) < 1e-14) break;
        let d2 = ( f[0] * J22 - f[1] * J12) / det;
        let d5 = (-f[0] * J21 + f[1] * J11) / det;
        const mg = Math.abs(d2) + Math.abs(d5);
        if (mg > maxStep) { const s = maxStep / mg; d2 *= s; d5 *= s; }
        x5 = clamp(x5 - d5, x5lo, x5hi);
        x2 = clamp(x2 - d2, 1e-3, x5 / 2 - 1e-3);
        if (mg < 1e-9) break;
      }
      if (!isFinite(x2) || !isFinite(x5) || Math.abs(res(1, x2, x5) - V) > 5e-3) {
        x2 = x2Seed; x5 = x5Seed;
      }
      return build(x2, x5);
    }

    function shaperImpulses(type, f, zeta, V, m, aNeg) {
      const wn = 2 * Math.PI * f;
      if (zeta >= 1 || f <= 0) return null;          // no oscillation → no shaper
      const wd = wn * Math.sqrt(1 - zeta * zeta);
      const d  = Math.PI / wd;                        // Δ = half damped period
      const K  = Math.exp(-zeta * Math.PI / Math.sqrt(1 - zeta * zeta));

      let t, a;
      switch (type) {
        case 'ZV':
          t = [0, d];            a = [1, K]; break;
        case 'ZVD':
          t = [0, d, 2 * d];     a = [1, 2 * K, K * K]; break;
        case 'ZVDD':
          t = [0, d, 2 * d, 3 * d];
          a = [1, 3 * K, 3 * K * K, K * K * K]; break;
        case 'EI':               // Singhose EI, tolerance V
          t = [0, d, 2 * d];
          a = [(1 + V) / 4, (1 - V) / 2, (1 + V) / 4]; break;
        case '2-Hump EI': {      // exact two-hump EI (undamped) – Singhose 1997
          const X  = Math.cbrt(V * V * (Math.sqrt(1 - V * V) + 1));
          const A1 = (3 * X * X + 2 * X + 3 * V * V) / (16 * X);
          const A2 = 0.5 - A1;
          t = [0, d, 2 * d, 3 * d];
          a = [A1, A2, A2, A1]; break;
        }
        case 'UM-ZV': {          // negative unity-magnitude ZV (damped-exact)
          const r = negShaperImpulses(1, zeta, d); t = r.t; a = r.a; break;
        }
        case 'UM-EI': {          // negative unity-magnitude EI (damped-exact at ρ = 1)
          const r = umEIImpulses(V, zeta, d, wn); t = r.t; a = r.a; break;
        }
        case 'PS': {             // tunable partial-sum family, A = [1, −m, 1]
          const mm = Math.min(Math.max(m == null ? 1 : m, 0), 1);
          const r = negShaperImpulses(mm, zeta, d); t = r.t; a = r.a; break;
        }
        case 'SNA-EI': {         // specified-negative-amplitude EI (positive EI ↔ UM-EI)
          const aa = Math.min(Math.max(aNeg == null ? 0.6 : aNeg, 0), 1);
          const r = snaEIImpulses(V, aa, zeta, d, wn); t = r.t; a = r.a; break;
        }
        default:
          t = [0]; a = [1];
      }
      const sum = a.reduce((s, v) => s + v, 0);
      return { t, a: a.map(v => v / sum) };
    }

    /* Unit-step response of the under-damped 2nd-order system (static gain 1) */
    function stepResponse(t, zeta, wn) {
      if (t <= 0) return 0;
      const r  = Math.sqrt(1 - zeta * zeta);
      const wd = wn * r;
      return 1 - Math.exp(-zeta * wn * t) * (Math.cos(wd * t) + (zeta / r) * Math.sin(wd * t));
    }

    /* Unit-ramp response g_r(t) = ∫₀ᵗ stepResponse dτ of the same system. Closed
       form (a = ζωₙ, ω_d damped): the steady part is the ramp itself minus the 2ζ/ωₙ
       lag, plus a decaying transient. Used as the output basis for the piecewise-
       linear command model. (g_r(0)=0, g_r′=stepResponse.) */
    function rampResponse(t, zeta, wn) {
      if (t <= 0) return 0;
      const a  = zeta * wn;
      const r  = Math.sqrt(1 - zeta * zeta);
      const wd = wn * r;
      return t - 2 * zeta / wn + (Math.exp(-a * t) / (wn * wn)) *
             (2 * a * Math.cos(wd * t) - (wn * wn * (1 - 2 * zeta * zeta) / wd) * Math.sin(wd * t));
    }

    /* Percentage residual vibration of the impulse sequence applied to a
       system of frequency ω = ρ·ωₙ (Singhose). 1 = no shaping benefit, 0 = none. */
    function residualVibration(rho, imp, zeta, wn) {
      const omega = rho * wn;
      const wd = omega * Math.sqrt(1 - zeta * zeta);
      const tN = imp.t[imp.t.length - 1];
      let C = 0, S = 0;
      for (let i = 0; i < imp.t.length; i++) {
        const w = imp.a[i] * Math.exp(zeta * omega * imp.t[i]);
        C += w * Math.cos(wd * imp.t[i]);
        S += w * Math.sin(wd * imp.t[i]);
      }
      return Math.exp(-zeta * omega * tN) * Math.sqrt(C * C + S * S);
    }

    /* Realise the ideal impulse train on a sample grid of rate fs.
       'snap'  → each impulse to the nearest sample (first-moment error).
       'split' → spread across the two bracketing samples, preserving the
                 amplitude-weighted mean time (error drops to 2nd order).
       'phase' (∈ [0,1), in samples) is the offset between the sampler clock and
       the move start: the sampler may have ticked anywhere within a sample period
       before t = 0. Impulse i then lands on grid index round/floor(tᵢ·fs + phase),
       realised (relative to the move) at (n − phase)·Ts. phase = 0 reproduces the
       original grid that starts exactly at t = 0. Sweeping phase reveals that the
       sampling penalty is a *band*, not a single deterministic value. */
    function discretizeImpulses(imp, fs, method, phase) {
      if (!imp || !(fs > 0)) return imp;
      const ph = phase || 0;
      const Ts = 1 / fs;
      const map = new Map();                          // sample index → Σ amplitude
      const add = (n, amp) => map.set(n, (map.get(n) || 0) + amp);
      for (let i = 0; i < imp.t.length; i++) {
        const x = imp.t[i] * fs + ph;
        if (method === 'split') {
          const n = Math.floor(x + 1e-9), g = x - n;
          add(n, imp.a[i] * (1 - g));
          if (g > 1e-12) add(n + 1, imp.a[i] * g);
        } else {
          add(Math.round(x), imp.a[i]);
        }
      }
      const idx = [...map.keys()].sort((p, q) => p - q);
      return { t: idx.map(n => (n - ph) * Ts), a: idx.map(n => map.get(n)) };
    }

    /* Sampling-phase band: realise the shaper at N_PHASES phase offsets φ ∈ [0,1)
       and return the pointwise envelope (min/max) of a per-phase curve. The single
       φ = 0 curve is still drawn as the centre line; the band shows how far the
       residual / response can drift depending on where the sampler clock falls. */
    const N_PHASES = 16;
    function phaseSet(imp, fs, method) {
      const out = [];
      for (let j = 0; j < N_PHASES; j++) out.push(discretizeImpulses(imp, fs, method, j / N_PHASES));
      return out;
    }
    /* Envelope of a value evaluated per-phase over a list of sample abscissae.
       `evalAt(dp, x)` returns the scalar for discretised set dp at abscissa x. */
    function phaseEnvelope(dpList, xs, evalAt) {
      const lo = [], hi = [];
      for (let i = 0; i < xs.length; i++) {
        let mn = Infinity, mx = -Infinity;
        for (let k = 0; k < dpList.length; k++) {
          const y = evalAt(dpList[k], xs[i]);
          if (y < mn) mn = y;
          if (y > mx) mx = y;
        }
        lo.push([xs[i], mn]); hi.push([xs[i], mx]);
      }
      return { lower: lo, upper: hi };
    }

    /* Cumulative-sum staircase of the impulse command, padded to [xMin, tMax]. */
    function commandSteps(imp, xMin, tMax) {
      const pts = [[xMin, 0], [0, 0]];
      let cum = 0;
      for (let i = 0; i < imp.t.length; i++) {
        pts.push([imp.t[i], cum]);                    // hold up to this impulse
        cum += imp.a[i];
        pts.push([imp.t[i], cum]);                    // vertical step
      }
      pts.push([tMax, cum]);
      return pts;
    }

    /* Smooth quintic reference r (0→1 over t_m, zero vel/acc at the ends) and
       the exact inverse-dynamics command u = r + (2ζ/ωₙ)ṙ + (1/ωₙ²)r̈. */
    function refCmd(t, tm, wn, zeta) {
      if (t <= 0)  return { r: 0, u: 0 };
      if (t >= tm) return { r: 1, u: 1 };
      const s = t / tm;
      const r   = 10 * s ** 3 - 15 * s ** 4 + 6 * s ** 5;
      const rd  = (30 * s ** 2 - 60 * s ** 3 + 30 * s ** 4) / tm;
      const rdd = (60 * s - 180 * s ** 2 + 120 * s ** 3) / (tm * tm);
      return { r, u: r + (2 * zeta / wn) * rd + (1 / (wn * wn)) * rdd };
    }

    /* RK4 integration of  ẍ + 2ζωₙẋ + ωₙ²x = ωₙ²·u(t)  for a given command. */
    function simulate(uAt, wnP, zetaP, tMax, N) {
      const dt = tMax / N;
      const acc = (x, v, uu) => wnP * wnP * uu - 2 * zetaP * wnP * v - wnP * wnP * x;
      let x = 0, v = 0;
      const out = [[0, 0]];
      for (let i = 0; i < N; i++) {
        const t0 = i * dt;
        const u0 = uAt(t0), uh = uAt(t0 + dt / 2), u1 = uAt(t0 + dt);
        const k1x = v,                  k1v = acc(x, v, u0);
        const k2x = v + dt / 2 * k1v,   k2v = acc(x + dt / 2 * k1x, v + dt / 2 * k1v, uh);
        const k3x = v + dt / 2 * k2v,   k3v = acc(x + dt / 2 * k2x, v + dt / 2 * k2v, uh);
        const k4x = v + dt * k3v,       k4v = acc(x + dt * k3x, v + dt * k3v, u1);
        x += dt / 6 * (k1x + 2 * k2x + 2 * k3x + k4x);
        v += dt / 6 * (k1v + 2 * k2v + 2 * k3v + k4v);
        out.push([(i + 1) * dt, x]);
      }
      return out;
    }

    /* ── Optimisation-based custom shaper (mode 'optimize') ───────────────────
       There is no single literature shaper that satisfies every requirement at
       once, so this is the honest weighted trade-off. Decision variables are the
       command increments δ = [δ₀…δ_{M−1}] on a uniform grid t_k = k·Ts. The command
       is the running sum u_k = Σ_{j≤k} δ_j and the output x(t) = Σ_k δ_k·g(t−t_k)
       with g = stepResponse is *linear* in δ. We minimise a weighted sum of:
         • residual vibration over a ρ-band around 1   (robustness)   → δᵀQδ
         • set-point tracking error Σ(x−1)²            (speed)        → ‖Gδ−1‖²
         • actuator effort Σδ²                         (smoothness)   → ‖δ‖²
         • optional monotonicity penalty Σmax(0,x_{k−1}−x_k)²  (no wrong-direction)
       subject to  Σδ = 1  (reach the set-point) and the box |δ_k| ≤ δ_max — the
       actuator slew-rate limit; the lower bound is 0 unless negative increments
       (command over-drive) are allowed. Solved by projected gradient descent with
       a Lipschitz step size; the box∩hyperplane projection is a 1-D bisection on
       the hyperplane multiplier λ. */
    const OPT_M = 50;          // number of command samples
    const OPT_HPER = 3;        // optimisation horizon, in damped periods

    /* Euclidean projection onto { Σδ = S, lo ≤ δ_k ≤ hi }: find λ with
       Σ clamp(v_k − λ, lo, hi) = S (monotone in λ) by bisection, then clamp.
       S defaults to 1 (the staircase set-point constraint). */
    function projSumBox(v, lo, hi, S) {
      const target = S == null ? 1 : S;
      const M = v.length;
      let mn = Infinity, mx = -Infinity;
      for (let k = 0; k < M; k++) { if (v[k] < mn) mn = v[k]; if (v[k] > mx) mx = v[k]; }
      let a = mn - hi - 1, b = mx - lo + 1;
      for (let it = 0; it < 80; it++) {
        const lam = 0.5 * (a + b);
        let s = 0;
        for (let k = 0; k < M; k++) { let x = v[k] - lam; s += x < lo ? lo : x > hi ? hi : x; }
        if (s > target) a = lam; else b = lam;
      }
      const lam = 0.5 * (a + b), out = new Float64Array(M);
      for (let k = 0; k < M; k++) { let x = v[k] - lam; out[k] = x < lo ? lo : x > hi ? hi : x; }
      return out;
    }

    /* Residual-vibration basis (c, s), decay-normalised so that for a coefficient
       vector x, residual(ρ) = √((Σ xₖcₖ)² + (Σ xₖsₖ)²). Two command models: */
    function stepResidualBasis(rho, tk, tN, zeta, wn) {        // staircase: δ are step amplitudes
      const M = tk.length, om = rho * wn, wdr = rho * wn * Math.sqrt(1 - zeta * zeta);
      const c = new Float64Array(M), s = new Float64Array(M);
      for (let k = 0; k < M; k++) {
        const e = Math.exp(zeta * om * (tk[k] - tN));
        c[k] = e * Math.cos(wdr * tk[k]);
        s[k] = e * Math.sin(wdr * tk[k]);
      }
      return { c, s };
    }
    /* piecewise-linear: per interval the command velocity is a unit box-car, so the
       mode-excitation integral is q_k = [e^{(p−iq)t_{k+1}} − e^{(p−iq)t_k}]/(p−iq),
       p = ζω, q = ρω_d; c,s = decay·Re/Im of q_k. */
    function rampResidualBasis(rho, nodes, tEnd, zeta, wn) {
      const M = nodes.length - 1, a = zeta * wn, wd = wn * Math.sqrt(1 - zeta * zeta);
      const p = rho * a, qd = rho * wd, D2 = p * p + qd * qd, decay = Math.exp(-p * tEnd);
      const c = new Float64Array(M), s = new Float64Array(M);
      if (D2 < 1e-12) {                                          // ρ→0 limit: ∫ dτ = interval length
        for (let k = 0; k < M; k++) c[k] = nodes[k + 1] - nodes[k];
        return { c, s };
      }
      const ER = new Float64Array(M + 1), EI = new Float64Array(M + 1);
      for (let k = 0; k <= M; k++) { const ep = Math.exp(p * nodes[k]); ER[k] = ep * Math.cos(qd * nodes[k]); EI[k] = -ep * Math.sin(qd * nodes[k]); }
      for (let k = 0; k < M; k++) {
        const NR = ER[k + 1] - ER[k], NI = EI[k + 1] - EI[k];   // N·conj(D)/|D|², conj(D)=(p,qd)
        c[k] = decay * (NR * p - NI * qd) / D2;
        s[k] = decay * (NR * qd + NI * p) / D2;
      }
      return { c, s };
    }
    /* Residual vibration of an optimisation result at frequency ratio ρ. */
    function optResidual(rho, res, zeta, wn) {
      const b = res.model === 'ramps'
        ? rampResidualBasis(rho, res.nodes, res.tEnd, zeta, wn)
        : stepResidualBasis(rho, res.t, res.t[res.t.length - 1], zeta, wn);
      const x = res.model === 'ramps' ? res.slope : res.delta;
      let C = 0, S = 0;
      for (let k = 0; k < x.length; k++) { C += b.c[k] * x[k]; S += b.s[k] * x[k]; }
      return Math.sqrt(C * C + S * S);
    }
    /* Plant output of an optimisation result at time tt (linear superposition). */
    function optOutput(tt, res, zeta, wn) {
      let y = 0;
      if (res.model === 'ramps') {
        for (let k = 0; k < res.slope.length; k++)
          y += res.slope[k] * (rampResponse(tt - res.nodes[k], zeta, wn) - rampResponse(tt - res.nodes[k + 1], zeta, wn));
      } else {
        for (let k = 0; k < res.delta.length; k++) y += res.delta[k] * stepResponse(tt - res.t[k], zeta, wn);
      }
      return y;
    }

    function optimizeCommand(zeta, wn, opt) {
      const M = OPT_M;
      const isR = opt.model === 'ramps';
      const wd = wn * Math.sqrt(1 - zeta * zeta);
      const Tper = 2 * Math.PI / wd;
      const Ts = OPT_HPER * Tper / M;
      const tk = new Float64Array(M);                   // variable sample times k·Ts
      for (let k = 0; k < M; k++) tk[k] = k * Ts;
      const tN = tk[M - 1];
      const nodes = new Float64Array(M + 1);            // ramps: M+1 nodes, motion ends at tEnd
      for (let k = 0; k <= M; k++) nodes[k] = k * Ts;
      const tEnd = nodes[M];
      const tEval = new Float64Array(M);                // output-evaluation points (tracking/mono)
      for (let j = 0; j < M; j++) tEval[j] = isR ? (j + 1) * Ts : j * Ts;

      /* weights (the sliders). robustness has two axes: bw sets the ρ-band width,
         Wvib sets how hard vibration suppression is weighted against speed/smoothness.
         smoothness: steps penalise Σδ² (small, spread steps); ramps penalise the
         slope-change Σ(Δdu)² (low jerk) — penalising Σdu² there would just reward
         the slowest possible ramp, so curvature is the meaningful smoothness axis. */
      const Wvib = opt.vibW;
      const Wspeed = opt.speed * 0.5;
      const Weff = opt.smooth * (isR ? 8 : 12);
      const Wmono = opt.mono ? 50 : 0;
      const bw = 0.05 + opt.rob * 0.45;                 // residual band half-width
      /* Decision variable is the command increment du per sample for BOTH models
         (steps: du = δ; ramps: du = slope·Ts). This keeps the sum target (Σdu = 1),
         the actuator-rate box (|du| ≤ cap) and all weight scales identical between
         models — only the basis functions differ (÷Ts for ramps). */
      const cap = Math.max(opt.rateMax * OPT_HPER / M, 1.2 / M);
      const lo = opt.allowNeg ? -cap : 0, hi = cap;

      // output basis G[j][k] (j = eval point, k = variable du_k); ramps basis ÷Ts
      const G = [];
      for (let j = 0; j < M; j++) {
        const row = new Float64Array(M);
        for (let k = 0; k < M; k++) row[k] = isR
          ? (rampResponse(tEval[j] - nodes[k], zeta, wn) - rampResponse(tEval[j] - nodes[k + 1], zeta, wn)) / Ts
          : stepResponse(tEval[j] - tk[k], zeta, wn);
        G.push(row);
      }
      // Q = Σ_ρ (c cᵀ + s sᵀ) over the robustness band (ramps residual basis ÷Ts)
      const rhos = [1];
      for (const fr of [0.34, 0.67, 1.0]) { rhos.push(1 - bw * fr); rhos.push(1 + bw * fr); }
      const Q = [];
      for (let i = 0; i < M; i++) Q.push(new Float64Array(M));
      for (const rho of rhos) {
        const { c, s } = isR ? rampResidualBasis(rho, nodes, tEnd, zeta, wn)
                             : stepResidualBasis(rho, tk, tN, zeta, wn);
        const sc = isR ? 1 / Ts : 1;
        for (let i = 0; i < M; i++) for (let j = 0; j < M; j++) Q[i][j] += sc * sc * (c[i] * c[j] + s[i] * s[j]);
      }
      // A = Wvib Q + Wspeed GᵀG + Weff·L ; b = Wspeed Gᵀ·1 (track x=1 at all eval points).
      // smoothness operator L: steps = I (Σδ²); ramps = DᵀD of first differences (Σ(Δdu)²).
      const sm = (i, j) => isR
        ? (i === j ? (i === 0 || i === M - 1 ? 1 : 2) : (Math.abs(i - j) === 1 ? -1 : 0))
        : (i === j ? 1 : 0);
      const A = [];
      for (let i = 0; i < M; i++) A.push(new Float64Array(M));
      const bvec = new Float64Array(M);
      for (let i = 0; i < M; i++) {
        for (let j = 0; j < M; j++) {
          let gg = 0; for (let k = 0; k < M; k++) gg += G[k][i] * G[k][j];
          A[i][j] = Wvib * Q[i][j] + Wspeed * gg + Weff * sm(i, j);
        }
        let g1 = 0; for (let k = 0; k < M; k++) g1 += G[k][i];
        bvec[i] = Wspeed * g1;
      }
      // Lipschitz: L = 2 λmax(A) + 2 Wmono Σ‖G_j−G_{j−1}‖² (power iteration for λmax)
      let v = new Float64Array(M).fill(1), lam = 1;
      for (let it = 0; it < 40; it++) {
        const w = new Float64Array(M);
        for (let i = 0; i < M; i++) { let s = 0; for (let j = 0; j < M; j++) s += A[i][j] * v[j]; w[i] = s; }
        let nrm = 0; for (let i = 0; i < M; i++) nrm += w[i] * w[i]; nrm = Math.sqrt(nrm) || 1;
        for (let i = 0; i < M; i++) v[i] = w[i] / nrm;
        lam = nrm;
      }
      let monoS = 0;
      if (Wmono) for (let j = 1; j < M; j++) { let s = 0; for (let k = 0; k < M; k++) { const dd = G[j][k] - G[j - 1][k]; s += dd * dd; } monoS += s; }
      const step = 1 / (2 * lam + 2 * Wmono * monoS + 1e-9);

      // projected gradient descent (variable = command increment du, Σdu = 1)
      let d = new Float64Array(M).fill(1 / M);
      for (let it = 0; it < 800; it++) {
        const grad = new Float64Array(M);
        for (let i = 0; i < M; i++) { let s = 0; for (let j = 0; j < M; j++) s += A[i][j] * d[j]; grad[i] = 2 * (s - bvec[i]); }
        if (Wmono) {
          const x = new Float64Array(M);
          for (let j = 0; j < M; j++) { let s = 0; for (let k = 0; k < M; k++) s += G[j][k] * d[k]; x[j] = s; }
          for (let j = 1; j < M; j++) {
            const dj = x[j - 1] - x[j];                  // wrong-direction amount
            if (dj > 0) { const cc = 2 * Wmono * dj; for (let k = 0; k < M; k++) grad[k] += cc * (G[j - 1][k] - G[j][k]); }
          }
        }
        const cand = new Float64Array(M);
        for (let i = 0; i < M; i++) cand[i] = d[i] - step * grad[i];
        d = projSumBox(cand, lo, hi);
      }

      // assemble result + metrics (du = command increment per sample, same scale for both)
      const sol = Array.from(d);
      let peak = 0; for (let k = 0; k < M; k++) peak = Math.max(peak, Math.abs(d[k]));
      const res = {
        model: opt.model, Ts, Tper, bw, t: Array.from(tk), du: sol,  // du = FIR shaper kernel
        peakRate: peak * M / OPT_HPER,                       // 1/T (max command change/Ts)
        effort:   sol.reduce((s, x) => s + Math.abs(x), 0),  // Σ|du| (1 if monotone)
      };
      if (isR) {
        res.slope = sol.map(x => x / Ts);                    // slope = du / Ts
        res.nodes = Array.from(nodes); res.tEnd = tEnd;
        const uNodes = new Array(M + 1); uNodes[0] = 0;       // command at the nodes = cumsum(du)
        for (let k = 0; k < M; k++) uNodes[k + 1] = uNodes[k] + sol[k];
        res.uNodes = uNodes;
      } else {
        res.delta = sol; res.imp = { t: res.t, a: sol };
      }
      let monotone = true, prev = -Infinity;
      for (let j = 0; j < M; j++) { const x = optOutput(tEval[j], res, zeta, wn); if (x < prev - 2e-3) { monotone = false; break; } prev = x; }
      res.monotone = monotone;
      res.residual1 = optResidual(1, res, zeta, wn);
      return res;
    }

    /* Copy-paste implementation recipe (numpy) for an optimisation result. The
       array literals carry the actual numbers of the current solution, so the user
       can reproduce the command on their own controller. */
    function pyArr(arr) {
      const f = x => Math.abs(x) < 1e-9 ? '0.0' : (+x.toPrecision(5)).toString();
      let out = '', line = '    ';
      for (let i = 0; i < arr.length; i++) {
        const tok = f(arr[i]) + (i < arr.length - 1 ? ', ' : '');
        if (line.length + tok.length > 76) { out += line + '\n'; line = '    '; }
        line += tok;
      }
      return out + line;
    }
    function optRecipe(res, lang) {
      const de = lang !== 'en';
      const Ts = (+res.Ts.toPrecision(6)).toString();
      const head = [
        'import numpy as np',
        de ? '# Optimierter Input-Shaper als FIR-Kern h (Σh = 1). Mit beliebiger'
           : '# Optimised input shaper as an FIR kernel h (Σh = 1). Convolve it with',
        de ? '# Referenz falten – nicht nur ein 0→1-Sprung.'
           : '# any reference signal – not just a single 0→1 step.',
        'Ts = ' + Ts + '  # s  (Shaper-Raster / shaper grid)',
        'h = np.array([',
        pyArr(res.du),
        '])',
        '',
      ];
      if (res.model === 'ramps') {
        return head.concat([
          de ? '# Rampen-Modell: h liefert die KNOTENwerte auf dem Ts-Raster. Das Kommando'
             : '# Ramp model: h gives the NODE values on the Ts grid. The command is the',
          de ? '# ist die lineare Interpolation dazwischen → schneller als Ts auswerten (Tc < Ts).'
             : '# linear interpolation between them → evaluate faster than Ts (Tc < Ts).',
          'class ShapedRamp:',
          de ? '    """Pro schnellem Regler-Tick Tc aufrufen: rohes Ziel rein, abschnittsweise'
             : '    """Call every fast controller tick Tc: raw target in, piecewise-linear',
          de ? '    lineares Kommando raus (zwischen den Ts-Knoten interpoliert)."""'
             : '    shaped command out (interpolated between the Ts nodes)."""',
          '    def __init__(self, h, Ts, Tc):',
          '        self.h, self.Ts, self.Tc = np.asarray(h, float), Ts, Tc',
          '        self.buf = np.zeros(len(h))',
          '        self.tau = Ts            # ' + (de ? 'Knoten-Update beim 1. Aufruf' : 'force a node update first call'),
          '        self.prev = self.cur = 0.0',
          '    def update(self, target):',
          '        self.tau += self.Tc',
          '        if self.tau >= self.Ts:           # ' + (de ? 'ein Shaper-Schritt weiter' : 'advance one shaper step'),
          '            self.tau -= self.Ts',
          '            self.buf[1:] = self.buf[:-1]; self.buf[0] = float(target)',
          '            self.prev, self.cur = self.cur, float(self.h @ self.buf)',
          '        return self.prev + (self.cur - self.prev) * (self.tau / self.Ts)',
          '',
          'Tc = Ts / 8                        # ' + (de ? 'z.B. 8× oversampling' : 'e.g. 8x oversampling'),
          'ramp = ShapedRamp(h, Ts, Tc)',
          de ? '# cmd = [ramp.update(r) for r in ziel_strom_bei_Tc]'
             : '# cmd = [ramp.update(r) for r in target_stream_at_Tc]',
          de ? '# offline: nodes = np.convolve(referenz, h); dann np.interp aufs feine Raster'
             : '# offline: nodes = np.convolve(reference, h); then np.interp onto a fine grid',
        ]).join('\n');
      }
      return head.concat([
        de ? '# Stufen-Modell: ein Wert pro Ts, bis zum nächsten Tick halten (Treppe).'
           : '# Step model: one value per Ts, hold until the next tick (staircase).',
        'class ShapedSetpoint:',
        de ? '    """Zustandsbehaftet: pro Tick das rohe Ziel rein, geformten Sollwert'
           : '    """Stateful: feed the raw target each tick, get the shaped set-point',
        de ? '    raus. Für beliebige, zeitveränderliche Ziele."""'
           : '    back. Works for arbitrary, time-varying targets."""',
        '    def __init__(self, h):',
        '        self.h = np.asarray(h, float)',
        '        self.buf = np.zeros(len(h))      # buf[0] = newest target',
        '    def update(self, target):',
        '        self.buf[1:] = self.buf[:-1]',
        '        self.buf[0] = float(target)',
        '        return float(self.h @ self.buf)',
        '',
        'shaper = ShapedSetpoint(h)',
        de ? '# cmd = [shaper.update(r) for r in ziel_strom]   # online'
           : '# cmd = [shaper.update(r) for r in target_stream]   # online',
        de ? '# offline:  cmd = np.convolve(reference, h)   ·   0→1-Move: u = np.cumsum(h)'
           : '# offline:  cmd = np.convolve(reference, h)   ·   0→1 move: u = np.cumsum(h)',
      ]).join('\n');
    }

    /* ── Palette (matches site / subway-sauces hollywood tones) ── */
    const COL_UNSHAPED = '#ff8c42';   // orange
    const COL_SHAPED   = '#0fb5ad';   // teal
    const COL_CMD      = '#d9a441';   // gold – command staircase / feedforward u
    const COL_DISC     = '#c05fd6';   // violet – discretised (sampled) overlay
    const COL_MIS      = '#e05260';   // red – mistuned-plant output
    const COL_GRID     = '#334155';
    const COL_AXIS     = '#64748b';
    const COL_REF      = '#94a3b8';

    function fmt(x, dp) { return x.toFixed(dp); }

    /* 3 significant digits, plain decimal (no exponential) – used for timings */
    function sig3(x) {
      if (x === 0) return '0';
      const dp = Math.max(0, 2 - Math.floor(Math.log10(Math.abs(x))));
      return x.toFixed(dp);
    }

    /* ── Generic line plot (responsive SVG) ─────────────────────────────── */
    function LinePlot({ W, H, xMin, xMax, yMin, yMax, series, xTicks, yTicks,
                        xFmt, yFmt, refY, refColor, markX, axX, axY, bands, vBand }) {
      const L = 46, R = 14, T = 12, B = 30;
      const sx = x => L + (x - xMin) / (xMax - xMin) * (W - L - R);
      const sy = y => T + (1 - (y - yMin) / (yMax - yMin)) * (H - T - B);
      const path = pts => pts.map((p, i) => (i ? 'L' : 'M') + fmt(sx(p[0]), 1) + ' ' + fmt(sy(p[1]), 1)).join(' ');
      // filled area between an upper and a lower envelope (upper forward, lower reversed)
      const area = (up, lo) =>
        up.map((p, i) => (i ? 'L' : 'M') + fmt(sx(p[0]), 1) + ' ' + fmt(sy(p[1]), 1)).join(' ') + ' ' +
        lo.slice().reverse().map(p => 'L' + fmt(sx(p[0]), 1) + ' ' + fmt(sy(p[1]), 1)).join(' ') + ' Z';

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', fontFamily: 'inherit', display: 'block' }}>
          {/* grid + y ticks */}
          {yTicks.map((y, i) => (
            <g key={'y' + i}>
              <line x1={L} y1={sy(y)} x2={W - R} y2={sy(y)} stroke={COL_GRID} strokeWidth={1} />
              <text x={L - 6} y={sy(y)} textAnchor="end" dominantBaseline="middle" fontSize={11} fill={COL_AXIS}>{yFmt(y)}</text>
            </g>
          ))}
          {/* x ticks */}
          {xTicks.map((x, i) => (
            <g key={'x' + i}>
              <line x1={sx(x)} y1={T} x2={sx(x)} y2={H - B} stroke={COL_GRID} strokeWidth={1} opacity={0.5} />
              <text x={sx(x)} y={H - B + 14} textAnchor="middle" fontSize={11} fill={COL_AXIS}>{xFmt(x)}</text>
            </g>
          ))}
          {/* vertical span (e.g. the robustness ρ-band) */}
          {vBand && (
            <rect x={sx(Math.max(vBand.x0, xMin))} y={T}
                  width={Math.max(0, sx(Math.min(vBand.x1, xMax)) - sx(Math.max(vBand.x0, xMin)))}
                  height={H - T - B} fill={vBand.color} opacity={vBand.opacity != null ? vBand.opacity : 0.1} />
          )}
          {/* uncertainty bands (drawn behind the lines) */}
          {bands && bands.map((bd, i) => (
            <path key={'b' + i} d={area(bd.upper, bd.lower)} fill={bd.color}
                  opacity={bd.opacity != null ? bd.opacity : 0.18} stroke="none" />
          ))}
          {/* reference horizontal line */}
          {refY != null && refY >= yMin && refY <= yMax && (
            <line x1={L} y1={sy(refY)} x2={W - R} y2={sy(refY)} stroke={refColor || COL_REF} strokeWidth={1} strokeDasharray="3 3" />
          )}
          {/* vertical marker */}
          {markX != null && (
            <line x1={sx(markX)} y1={T} x2={sx(markX)} y2={H - B} stroke={COL_REF} strokeWidth={1} strokeDasharray="3 3" />
          )}
          {/* series */}
          {series.map((s, i) => (
            <path key={i} d={path(s.points)} fill="none" stroke={s.color} strokeWidth={s.width || 2}
                  strokeDasharray={s.dash || ''} strokeLinejoin="round" />
          ))}
          {/* axis titles */}
          <text x={(L + W - R) / 2} y={H - 2} textAnchor="middle" fontSize={11} fill={COL_AXIS}>{axX}</text>
          <text transform={`translate(12,${(T + H - B) / 2}) rotate(-90)`} textAnchor="middle" fontSize={11} fill={COL_AXIS}>{axY}</text>
        </svg>
      );
    }

    /* ── Impulse stem plot (handles negative amplitudes + sampled overlay) ── */
    function ImpulsePlot({ W, H, imp, disc, dense }) {
      const L = 46, R = 14, T = 14, B = 30;
      const allA = disc ? imp.a.concat(disc.a) : imp.a;
      const allT = disc ? imp.t.concat(disc.t) : imp.t;
      const tN = Math.max(...allT, 1e-9);
      const aMax = Math.max(...allA.map(Math.abs), 1e-9);
      const hasNeg = allA.some(v => v < 0);
      const top = aMax * 1.15, bot = hasNeg ? -aMax * 1.15 : 0;
      const xMax = tN * 1.12 + 1e-9;
      const sx = x => L + (x / xMax) * (W - L - R);
      const sy = a => T + (1 - (a - bot) / (top - bot)) * (H - T - B);
      const base = sy(0);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: 'auto', fontFamily: 'inherit', display: 'block' }}>
          <line x1={L} y1={base} x2={W - R} y2={base} stroke={COL_GRID} strokeWidth={1} />
          {disc && disc.t.map((ti, i) => (
            <g key={'d' + i}>
              <line x1={sx(ti)} y1={base} x2={sx(ti)} y2={sy(disc.a[i])} stroke={COL_DISC} strokeWidth={5} opacity={0.3} />
              <circle cx={sx(ti)} cy={sy(disc.a[i])} r={3} fill={COL_DISC} opacity={0.55} />
            </g>
          ))}
          {imp.t.map((ti, i) => {
            const up = imp.a[i] >= 0;
            return (
              <g key={i}>
                <line x1={sx(ti)} y1={base} x2={sx(ti)} y2={sy(imp.a[i])} stroke={COL_SHAPED} strokeWidth={dense ? 2 : 2.5} />
                {!dense && <circle cx={sx(ti)} cy={sy(imp.a[i])} r={4} fill={COL_SHAPED} />}
                {!dense && <text x={sx(ti)} y={sy(imp.a[i]) + (up ? -8 : 14)} textAnchor="middle" fontSize={11} fill={Math.abs(imp.a[i]) < 5e-4 ? '#475569' : '#cbd5e1'}>{fmt(Math.abs(imp.a[i]) < 5e-4 ? 0 : imp.a[i], 3)}</text>}
                {!dense && <text x={sx(ti)} y={base + (up ? 14 : -7)} textAnchor="middle" fontSize={11} fill={COL_AXIS}>{sig3(ti * 1000)}</text>}
              </g>
            );
          })}
          <text x={(L + W - R) / 2} y={H - 2} textAnchor="middle" fontSize={11} fill={COL_AXIS}>tᵢ [ms]</text>
        </svg>
      );
    }

    function Legend({ items }) {
      return (
        <div style={{ display: 'flex', gap: 18, flexWrap: 'wrap', marginBottom: 6 }}>
          {items.map((it, i) => (
            <span key={i} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#94a3b8' }}>
              <span style={{ width: 18, height: 0, borderTop: `2px ${it.dash ? 'dashed' : 'solid'} ${it.color}` }} />
              {it.label}
            </span>
          ))}
        </div>
      );
    }

    function ticks(min, max, n) {
      const out = [];
      for (let i = 0; i <= n; i++) out.push(min + (max - min) * i / n);
      return out;
    }

    /* ── App ─────────────────────────────────────────────────────────────── */
    function InputShaper() {
      const t = STRINGS[LANG] || STRINGS.de;

      const [mode,  setMode]  = useState('shaping'); // 'shaping' | 'inversion'
      const [type,  setType]  = useState('EI');
      const [f,     setF]     = useState(40);     // Hz
      const [zeta,  setZeta]  = useState(0.05);
      const [V,     setV]     = useState(0.05);   // EI tolerance
      const [m,     setM]     = useState(1);      // PS aggressiveness (0=ZV, 1=UM-ZV)
      const [aNeg,  setANeg]  = useState(0.6);    // SNA-EI negative amplitude (0=pos EI, 1=UM-EI)
      const [disc,  setDisc]  = useState(false);  // discretisation on/off
      const [fs,    setFs]    = useState(1000);   // sample rate [Hz]
      const [method, setMethod] = useState('snap'); // 'snap' | 'split'
      const [tmPer, setTmPer] = useState(1);      // inversion move time, in periods
      const [detune, setDetune] = useState(20);   // inversion model error [%]
      const [hover, setHover] = useState(null);   // shaper whose tooltip is shown
      const [hoverSM, setHoverSM] = useState(false); // snap/split tooltip
      // optimize-mode weights / toggles
      const [optModel, setOptModel] = useState('steps'); // 'steps' | 'ramps'
      const [optRob,   setOptRob]   = useState(0.3);
      const [optVibW,  setOptVibW]  = useState(1);    // vibration weight (Wvib)
      const [optSpeed, setOptSpeed] = useState(0.5);
      const [optSmooth, setOptSmooth] = useState(0.3);
      const [optRate,  setOptRate]  = useState(3);    // max actuator rate [1/T]
      const [optNeg,   setOptNeg]   = useState(false);
      const [optMono,  setOptMono]  = useState(false);

      const usesV = type === 'EI' || type === '2-Hump EI' || type === 'UM-EI' || type === 'SNA-EI';
      const usesM = type === 'PS';
      const usesA = type === 'SNA-EI';
      const wn = 2 * Math.PI * f;
      const imp = useMemo(() => shaperImpulses(type, f, zeta, V, m, aNeg), [type, f, zeta, V, m, aNeg]);
      const discImp = useMemo(() => (disc && imp) ? discretizeImpulses(imp, fs, method) : null,
                              [disc, imp, fs, method]);

      /* ── time-domain series ── */
      const timePlot = useMemo(() => {
        if (!imp) return null;
        const wd = wn * Math.sqrt(1 - zeta * zeta);
        const Tper = 2 * Math.PI / wd;
        // x-range depends only on the system (period), not on the shaper, so the
        // axis stays put when switching shapers. 8·T covers even 3Δ = 1.5·T shapers.
        const tMax = 8 * Tper;
        const xMin = -0.045 * tMax;                 // a little room left of 0 to see the step
        const N = 400;
        const un = [[xMin, 0]], sh = [[xMin, 0]];   // responses are 0 before t=0
        const shD = discImp ? [[xMin, 0]] : null;   // response of the sampled shaper
        for (let i = 0; i <= N; i++) {
          const tt = tMax * i / N;
          const yu = stepResponse(tt, zeta, wn);
          let ys = 0;
          for (let k = 0; k < imp.t.length; k++) ys += imp.a[k] * stepResponse(tt - imp.t[k], zeta, wn);
          un.push([tt, yu]); sh.push([tt, ys]);
          if (shD) {
            let yd = 0;
            for (let k = 0; k < discImp.t.length; k++) yd += discImp.a[k] * stepResponse(tt - discImp.t[k], zeta, wn);
            shD.push([tt, yd]);
          }
        }
        const cmd  = commandSteps(imp, xMin, tMax);                 // shaped command staircase
        const setp = [[xMin, 0], [0, 0], [0, 1], [tMax, 1]];        // the setpoint step itself
        // Sampling-phase band: envelope of the discrete response over all phase offsets.
        let band = null;
        if (discImp) {
          const dps = phaseSet(imp, fs, method);
          const xs = []; for (let i = 0; i <= N; i++) xs.push(tMax * i / N);
          const respAt = (dp, tt) => {
            let y = 0; for (let k = 0; k < dp.t.length; k++) y += dp.a[k] * stepResponse(tt - dp.t[k], zeta, wn);
            return y;
          };
          band = phaseEnvelope(dps, xs, respAt);
          band.lower.unshift([xMin, 0]); band.upper.unshift([xMin, 0]);
        }
        // Fixed y-range 0..2: the static end value is always 1, the max overshoot
        // of a 2nd-order system is 2.0 (ζ→0). Keeping it fixed avoids axis jumps.
        return { un, sh, shD, cmd, setp, band, tMax, xMin, yMin: 0, yMax: 2 };
      }, [imp, discImp, zeta, wn, fs, method]);

      /* ── sensitivity series (ideal + optional discretised overlay) ── */
      const sensPlot = useMemo(() => {
        if (!imp) return null;
        const pts = [], ptsD = [];
        const N = 240;
        for (let i = 0; i <= N; i++) {
          const rho = 2 * i / N;
          pts.push([rho, residualVibration(rho, imp, zeta, wn)]);
          if (discImp) ptsD.push([rho, residualVibration(rho, discImp, zeta, wn)]);
        }
        // Sampling-phase band + min/max residual at the design frequency ρ = 1.
        let band = null, resLo = null, resHi = null;
        if (discImp) {
          const dps = phaseSet(imp, fs, method);
          const xs = []; for (let i = 0; i <= N; i++) xs.push(2 * i / N);
          band = phaseEnvelope(dps, xs, (dp, rho) => residualVibration(rho, dp, zeta, wn));
          resLo = Infinity; resHi = -Infinity;
          for (let k = 0; k < dps.length; k++) {
            const r = residualVibration(1, dps[k], zeta, wn);
            if (r < resLo) resLo = r;
            if (r > resHi) resHi = r;
          }
        }
        return { pts, ptsD: discImp ? ptsD : null, band, resLo, resHi };
      }, [imp, discImp, zeta, wn, fs, method]);

      /* ── inverse-dynamics feedforward demo ── */
      const invPlot = useMemo(() => {
        if (zeta >= 1 || f <= 0) return null;
        const wd = wn * Math.sqrt(1 - zeta * zeta);
        const Tper = 2 * Math.PI / wd;
        const tm = tmPer * Tper;
        const tMax = tm + 2 * Tper;
        const xMin = -0.04 * tMax;                 // start just before 0 to show the step
        const N = 600;
        const uAt = tt => refCmd(tt, tm, wn, zeta).u;
        const wnMis = wn * (1 + detune / 100);
        // With the exact model the output equals the reference, so we don't plot a
        // separate "exact output" curve – the reference itself is that result.
        const outMis = simulate(uAt, wnMis, zeta, tMax, N);
        outMis.unshift([xMin, 0]);                 // 0 before t=0
        const ref = [[xMin, 0]], cmd = [[xMin, 0]];
        for (let i = 0; i <= N; i++) {
          const tt = tMax * i / N;
          const rc = refCmd(tt, tm, wn, zeta);
          ref.push([tt, rc.r]); cmd.push([tt, rc.u]);
        }
        const setp = [[xMin, 0], [0, 0], [0, 1], [tMax, 1]];   // the setpoint step itself
        // Fixed y-range so the axis doesn't jump with the parameters. The command u
        // and the mistuned output can exceed it (aggressive moves) and then clip –
        // that overshoot is itself the "living dangerously" signal.
        return { ref, cmd, outMis, setp, tMax, xMin, tm, yMin: -1, yMax: 2 };
      }, [f, zeta, wn, tmPer, detune]);

      /* ── optimisation-based custom shaper ── */
      const optPlot = useMemo(() => {
        if (zeta >= 1 || f <= 0) return null;
        const r = optimizeCommand(zeta, wn, {
          model: optModel, rob: optRob, vibW: optVibW, speed: optSpeed, smooth: optSmooth,
          rateMax: optRate, allowNeg: optNeg, mono: optMono,
        });
        const tMax = (OPT_HPER + 0.3) * r.Tper;
        const xMin = -0.045 * tMax;
        const N = 400;
        const out = [[xMin, 0]];
        let settle = 0;
        for (let i = 0; i <= N; i++) {
          const tt = tMax * i / N;
          const y = optOutput(tt, r, zeta, wn);
          out.push([tt, y]);
          if (Math.abs(y - 1) > 0.02) settle = tt;
        }
        // command: staircase (steps) or continuous polyline (ramps)
        let cmd;
        if (r.model === 'ramps') {
          cmd = [[xMin, 0]];
          for (let k = 0; k <= r.nodes.length - 1; k++) cmd.push([r.nodes[k], r.uNodes[k]]);
          cmd.push([tMax, r.uNodes[r.uNodes.length - 1]]);
        } else {
          cmd = commandSteps(r.imp, xMin, tMax);
        }
        const setp = [[xMin, 0], [0, 0], [0, 1], [tMax, 1]];
        const sens = [];
        const Ns = 240;
        for (let i = 0; i <= Ns; i++) { const rho = 2 * i / Ns; sens.push([rho, optResidual(rho, r, zeta, wn)]); }
        return { r, out, cmd, setp, sens, tMax, xMin, settleMs: settle * 1000 };
      }, [zeta, wn, f, optModel, optRob, optVibW, optSpeed, optSmooth, optRate, optNeg, optMono]);

      const residualAt1 = imp ? residualVibration(1, imp, zeta, wn) : null;
      const shaperDurMs = imp ? imp.t[imp.t.length - 1] * 1000 : null;
      const effort = imp ? imp.a.reduce((s, v) => s + Math.abs(v), 0) : null;  // Σ|Aᵢ| (1 = positive)

      const slabel = { color: '#94a3b8', fontSize: 13, minWidth: 110 };
      const sval   = { color: '#cbd5e1', fontSize: 13, minWidth: 56, fontVariantNumeric: 'tabular-nums' };

      return (
        <div className="container" style={{ paddingTop: 'var(--pico-spacing)', paddingBottom: 40 }}>

          {/* ── Title ── */}
          <hgroup style={{ marginBottom: 20 }}>
            <h1 style={{ marginBottom: 4 }}>{t.title}</h1>
            <p style={{ color: '#94a3b8', margin: 0 }}>{t.subtitle}</p>
          </hgroup>

          {/* ── Mode toggle: input shaping vs. model inversion ── */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
            <span style={slabel}>{t.modeLabel}</span>
            <div className="shaper-seg" style={{ display: 'flex' }}>
              {[['shaping', t.modeShaping], ['inversion', t.modeInversion], ['optimize', t.modeOptimize]].map(([k, lbl]) => (
                <button key={k} className={'lang-seg' + (mode === k ? ' active' : '')}
                        onClick={() => setMode(k)} style={{ minWidth: 120 }}>{lbl}</button>
              ))}
            </div>
          </div>

          {mode === 'shaping' && (
            /* shaper type (with hover/focus tooltip) */
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
            <span style={slabel}>{t.shaperLabel}</span>
            <div className="shaper-seg" style={{ position: 'relative', display: 'flex', flexWrap: 'wrap' }}>
              {SHAPERS.map(s => (
                <button key={s} className={'lang-seg' + (type === s ? ' active' : '')}
                        onClick={() => setType(s)} style={{ minWidth: 78 }}
                        onMouseEnter={() => setHover(s)} onMouseLeave={() => setHover(null)}
                        onFocus={() => setHover(s)} onBlur={() => setHover(null)}>
                  {s}
                </button>
              ))}
              {hover && (
                <div role="tooltip" style={{
                  position: 'absolute', bottom: 'calc(100% + 8px)', left: 0, zIndex: 30,
                  width: 'min(320px, 80vw)', background: '#0f172a', border: '1px solid #334155',
                  borderRadius: 8, padding: '9px 11px', boxShadow: '0 6px 18px rgba(0,0,0,.45)',
                  pointerEvents: 'none',
                }}>
                  <strong style={{ color: '#cbd5e1', fontSize: 13 }}>
                    {hover} · {SHAPER_INFO[hover].name[LANG] || SHAPER_INFO[hover].name.de}
                  </strong>
                  <span style={{ display: 'block', marginTop: 4, color: '#94a3b8', fontSize: 12, lineHeight: 1.5 }}>
                    {SHAPER_INFO[hover].tldr[LANG] || SHAPER_INFO[hover].tldr.de}
                  </span>
                </div>
              )}
            </div>
          </div>
          )}

          {/* ── Controls: frequency (logarithmic, 0.1–100 Hz) — shared by both modes ── */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
            <span style={slabel}>{t.freqLabel}</span>
            <input type="range" min={-1} max={2} step={0.01} value={Math.log10(f)}
                   onChange={e => setF(Math.pow(10, +e.target.value))} style={{ width: 220, margin: 0 }} />
            <span style={sval}>{fmt(f, f < 1 ? 2 : f < 10 ? 1 : 0)} Hz</span>
          </div>

          {/* ── Controls: damping ── */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
            <span style={slabel}>{t.zetaLabel}</span>
            <input type="range" min={0} max={0.4} step={0.005} value={zeta}
                   onChange={e => setZeta(+e.target.value)} style={{ width: 220, margin: 0 }} />
            <span style={sval}>{fmt(zeta, 3)}</span>
          </div>

          {mode === 'shaping' && (
          <React.Fragment>
          {/* ── Controls: tolerance V (EI family incl. SNA-EI) ── */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8,
                        opacity: usesV ? 1 : 0.4, pointerEvents: usesV ? 'auto' : 'none' }}>
            <span style={slabel}>{t.tolLabel}</span>
            <input type="range" min={0.01} max={0.2} step={0.005} value={V} disabled={!usesV}
                   onChange={e => setV(+e.target.value)} style={{ width: 220, margin: 0 }} />
            <span style={sval}>{fmt(V * 100, 1)} %</span>
          </div>

          {/* ── Controls: aggressiveness — m for PS, a (specified neg. amplitude) for SNA-EI ── */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8,
                        opacity: (usesM || usesA) ? 1 : 0.4, pointerEvents: (usesM || usesA) ? 'auto' : 'none' }}>
            {usesA ? (
              <React.Fragment>
                <span style={slabel}>{t.aLabel}</span>
                <input type="range" min={0} max={1} step={0.01} value={aNeg}
                       onChange={e => setANeg(+e.target.value)} style={{ width: 220, margin: 0 }} />
                <span style={sval}>{fmt(aNeg, 2)}</span>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <span style={slabel}>{t.mLabel}</span>
                <input type="range" min={0} max={1} step={0.01} value={m} disabled={!usesM}
                       onChange={e => setM(+e.target.value)} style={{ width: 220, margin: 0 }} />
                <span style={sval}>{fmt(m, 2)}</span>
              </React.Fragment>
            )}
          </div>

          {/* ── Controls: discretisation (finite sample rate) ── */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
            <span style={slabel}>{t.discLabel}</span>
            <div className="shaper-seg" style={{ display: 'flex' }}>
              {[[false, t.discIdeal], [true, t.discOn]].map(([k, lbl]) => (
                <button key={String(k)} className={'lang-seg' + (disc === k ? ' active' : '')}
                        onClick={() => setDisc(k)} style={{ minWidth: 78 }}>{lbl}</button>
              ))}
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 20,
                        opacity: disc ? 1 : 0.4, pointerEvents: disc ? 'auto' : 'none' }}>
            <span style={slabel}>{t.sampleLabel}</span>
            <input type="range" min={0} max={4.7} step={0.01} value={Math.log10(fs)}
                   onChange={e => setFs(Math.pow(10, +e.target.value))} style={{ width: 180, margin: 0 }} />
            <span style={{ ...sval, minWidth: 64 }}>
              {fs >= 1000 ? sig3(fs / 1000) + ' kHz' : sig3(fs) + ' Hz'}
            </span>
            <div className="shaper-seg" style={{ position: 'relative', display: 'flex', marginLeft: 4 }}
                 onMouseEnter={() => setHoverSM(true)} onMouseLeave={() => setHoverSM(false)}>
              {[['snap', t.methodSnap], ['split', t.methodSplit]].map(([k, lbl]) => (
                <button key={k} className={'lang-seg' + (method === k ? ' active' : '')}
                        onClick={() => setMethod(k)} style={{ minWidth: 70 }}
                        onFocus={() => setHoverSM(true)} onBlur={() => setHoverSM(false)}>{lbl}</button>
              ))}
              {hoverSM && (
                <div role="tooltip" style={{
                  position: 'absolute', bottom: 'calc(100% + 8px)', right: 0, zIndex: 30,
                  width: 'min(340px, 80vw)', background: '#0f172a', border: '1px solid #334155',
                  borderRadius: 8, padding: '9px 11px', boxShadow: '0 6px 18px rgba(0,0,0,.45)',
                  pointerEvents: 'none', color: '#94a3b8', fontSize: 12, lineHeight: 1.5,
                }}>
                  {t.sampleNote}
                </div>
              )}
            </div>
          </div>
          </React.Fragment>
          )}

          {mode === 'shaping' && !imp && (
            <p style={{ color: '#94a3b8', fontSize: 14 }}>{t.overdamped}</p>
          )}

          {mode === 'shaping' && imp && (
            <React.Fragment>
              {/* ── Metrics ── */}
              <div style={{ display: 'flex', gap: 28, flexWrap: 'wrap', marginBottom: 24 }}>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.durMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(shaperDurMs, 1)} ms</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.resMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(residualAt1 * 100, 2)} %</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.effortMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(effort, 2)}</div>
                </div>
                {disc && discImp && sensPlot && (
                  <div>
                    <div style={{ fontSize: 12, color: COL_DISC }}>{t.resDiscreteMetric}</div>
                    <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>
                      {fmt(sensPlot.resLo * 100, 2)}–{fmt(sensPlot.resHi * 100, 2)} %
                    </div>
                  </div>
                )}
              </div>

              {/* ── Step response ── */}
              <h3 style={{ marginBottom: 2 }}>{t.respTitle}</h3>
              <p style={{ color: '#94a3b8', margin: '0 0 6px', fontSize: 13 }}>{t.respSub}</p>
              <Legend items={[
                { color: COL_REF, label: t.setpoint, dash: true },
                { color: COL_CMD, label: t.command },
                { color: COL_UNSHAPED, label: t.unshaped },
                { color: COL_SHAPED,   label: t.shaped },
                ...(timePlot && timePlot.shD ? [{ color: COL_DISC, label: t.shapedDisc, dash: true }] : []),
              ]} />
              {timePlot && (
                <LinePlot
                  W={680} H={260}
                  xMin={timePlot.xMin} xMax={timePlot.tMax}
                  yMin={timePlot.yMin} yMax={timePlot.yMax}
                  xTicks={ticks(0, timePlot.tMax, 5)}
                  yTicks={[0, 0.5, 1, 1.5, 2]}
                  xFmt={x => fmt(x, x < 0.1 ? 3 : x < 1 ? 2 : 1)}
                  yFmt={y => fmt(y, 1)}
                  series={[
                    { points: timePlot.setp, color: COL_REF, width: 1.5, dash: '4 3' },
                    { points: timePlot.cmd, color: COL_CMD, width: 1.5 },
                    { points: timePlot.un, color: COL_UNSHAPED, width: 2 },
                    { points: timePlot.sh, color: COL_SHAPED, width: 2 },
                    ...(timePlot.shD ? [{ points: timePlot.shD, color: COL_DISC, width: 1.5, dash: '5 3' }] : []),
                  ]}
                  bands={timePlot.band ? [{ upper: timePlot.band.upper, lower: timePlot.band.lower, color: COL_DISC }] : null}
                  axX={t.axTime} axY={t.axResp}
                />
              )}

              {/* ── Sensitivity curve ── */}
              <h3 style={{ marginTop: 28, marginBottom: 2 }}>{t.sensTitle}</h3>
              <p style={{ color: '#94a3b8', margin: '0 0 6px', fontSize: 13 }}>{t.sensSub}</p>
              <Legend items={[
                { color: COL_SHAPED, label: type },
                ...(sensPlot && sensPlot.ptsD ? [{ color: COL_DISC, label: t.discOn, dash: true }] : []),
                { color: COL_REF, label: t.tolerance, dash: true },
              ]} />
              {sensPlot && (
                <LinePlot
                  W={680} H={240}
                  xMin={0} xMax={2}
                  yMin={0} yMax={1}
                  xTicks={[0, 0.5, 1, 1.5, 2]}
                  yTicks={[0, 0.25, 0.5, 0.75, 1]}
                  xFmt={x => fmt(x, 1)}
                  yFmt={y => fmt(y * 100, 0) + '%'}
                  refY={usesV ? V : null} refColor={COL_REF}
                  markX={1}
                  series={[
                    { points: sensPlot.pts, color: COL_SHAPED, width: 2 },
                    ...(sensPlot.ptsD ? [{ points: sensPlot.ptsD, color: COL_DISC, width: 1.5, dash: '4 3' }] : []),
                  ]}
                  bands={sensPlot.band ? [{ upper: sensPlot.band.upper, lower: sensPlot.band.lower, color: COL_DISC }] : null}
                  axX={t.axRho} axY={t.axResidual}
                />
              )}

              {/* ── Impulse sequence ── */}
              <h3 style={{ marginTop: 28, marginBottom: 2 }}>{t.impTitle}</h3>
              <p style={{ color: '#94a3b8', margin: '0 0 8px', fontSize: 13 }}>{t.impSub}</p>
              <div style={{ display: 'flex', gap: 24, flexWrap: 'wrap', alignItems: 'flex-start' }}>
                <div style={{ flex: '1 1 360px', minWidth: 280 }}>
                  <ImpulsePlot W={520} H={200} imp={imp} disc={disc ? discImp : null} />
                </div>
                <table style={{ width: 'auto', fontSize: 13, fontVariantNumeric: 'tabular-nums' }}>
                  <thead>
                    <tr><th colSpan={2} style={{ color: '#94a3b8', textAlign: 'left', fontWeight: 'normal' }}>{t.impIdeal}</th></tr>
                    <tr>
                      <th style={{ color: '#94a3b8', textAlign: 'right' }}>{t.colTime}</th>
                      <th style={{ color: '#94a3b8', textAlign: 'right' }}>{t.colAmp}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {imp.t.map((ti, i) => {
                      const z = Math.abs(imp.a[i]) < 5e-4, c = z ? '#475569' : '#cbd5e1';
                      return (
                        <tr key={i}>
                          <td style={{ textAlign: 'right', color: c }}>{sig3(ti * 1000)}</td>
                          <td style={{ textAlign: 'right', color: c }}>{fmt(z ? 0 : imp.a[i], 4)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {disc && discImp && (
                  <table style={{ width: 'auto', fontSize: 13, fontVariantNumeric: 'tabular-nums' }}>
                    <thead>
                      <tr><th colSpan={2} style={{ color: COL_DISC, textAlign: 'left', fontWeight: 'normal' }}>{t.impDiscrete}</th></tr>
                      <tr>
                        <th style={{ color: '#94a3b8', textAlign: 'right' }}>{t.colTime}</th>
                        <th style={{ color: '#94a3b8', textAlign: 'right' }}>{t.colAmp}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {discImp.t.map((ti, i) => {
                        const z = Math.abs(discImp.a[i]) < 5e-4, c = z ? '#475569' : '#cbd5e1';
                        return (
                          <tr key={i}>
                            <td style={{ textAlign: 'right', color: c }}>{sig3(ti * 1000)}</td>
                            <td style={{ textAlign: 'right', color: c }}>{fmt(z ? 0 : discImp.a[i], 4)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            </React.Fragment>
          )}

          {/* ── Inversion mode: controls + feedforward plot ── */}
          {mode === 'inversion' && (
          <React.Fragment>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.invMoveLabel}</span>
              <input type="range" min={0.2} max={3} step={0.05} value={tmPer}
                     onChange={e => setTmPer(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>{fmt(tmPer, 2)} · T</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 20 }}>
              <span style={slabel}>{t.invDetuneLabel}</span>
              <input type="range" min={-40} max={40} step={1} value={detune}
                     onChange={e => setDetune(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>{detune > 0 ? '+' : ''}{fmt(detune, 0)} %</span>
            </div>

            {!invPlot && (
              <p style={{ color: '#94a3b8', fontSize: 14 }}>{t.overdamped}</p>
            )}

            {invPlot && (
              <React.Fragment>
                <h3 style={{ marginBottom: 2 }}>{t.invTitle}</h3>
                <p style={{ color: '#94a3b8', margin: '0 0 6px', fontSize: 13 }}>{t.invSub}</p>
                <Legend items={[
                  { color: COL_REF, label: t.setpoint, dash: true },
                  { color: COL_CMD, label: t.invCmd },
                  { color: COL_MIS, label: t.invOutMis },
                  { color: COL_SHAPED, label: t.invRef },
                ]} />
                <LinePlot
                  W={680} H={300}
                  xMin={invPlot.xMin} xMax={invPlot.tMax}
                  yMin={invPlot.yMin} yMax={invPlot.yMax}
                  xTicks={ticks(0, invPlot.tMax, 5)}
                  yTicks={[-1, 0, 1, 2]}
                  xFmt={x => fmt(x, x < 0.1 ? 3 : x < 1 ? 2 : 1)}
                  yFmt={y => fmt(y, 1)}
                  series={[
                    { points: invPlot.setp, color: COL_REF, width: 1.5, dash: '4 3' },
                    { points: invPlot.cmd, color: COL_CMD, width: 1.5 },
                    { points: invPlot.outMis, color: COL_MIS, width: 2 },
                    { points: invPlot.ref, color: COL_SHAPED, width: 2 },
                  ]}
                  axX={t.axTime} axY={t.axInvVal}
                />
                <p style={{ marginTop: 16, fontSize: 13, color: '#94a3b8', lineHeight: 1.7, maxWidth: 680 }}>
                  {t.invAbout}
                </p>
              </React.Fragment>
            )}
          </React.Fragment>
          )}

          {/* ── Optimize mode: weight sliders + optimised command ── */}
          {mode === 'optimize' && (
          <React.Fragment>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 16 }}>
              <span style={slabel}>{t.optModelLabel}</span>
              <div className="shaper-seg" style={{ display: 'flex' }}>
                {[['steps', t.optModelSteps], ['ramps', t.optModelRamps]].map(([k, lbl]) => (
                  <button key={k} className={'lang-seg' + (optModel === k ? ' active' : '')}
                          onClick={() => setOptModel(k)} style={{ minWidth: 78 }}>{lbl}</button>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.optRobLabel}</span>
              <input type="range" min={0} max={1} step={0.01} value={optRob}
                     onChange={e => setOptRob(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>±{fmt((0.05 + optRob * 0.45), 2)}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.optVibWLabel}</span>
              <input type="range" min={0} max={4} step={0.05} value={optVibW}
                     onChange={e => setOptVibW(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>{fmt(optVibW, 2)}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.optSpeedLabel}</span>
              <input type="range" min={0} max={1} step={0.01} value={optSpeed}
                     onChange={e => setOptSpeed(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>{fmt(optSpeed, 2)}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.optSmoothLabel}</span>
              <input type="range" min={0} max={1} step={0.01} value={optSmooth}
                     onChange={e => setOptSmooth(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>{fmt(optSmooth, 2)}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.optRateLabel}</span>
              <input type="range" min={0.4} max={8} step={0.1} value={optRate}
                     onChange={e => setOptRate(+e.target.value)} style={{ width: 220, margin: 0 }} />
              <span style={sval}>{fmt(optRate, 1)} /T</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 8 }}>
              <span style={slabel}>{t.optNegLabel}</span>
              <div className="shaper-seg" style={{ display: 'flex' }}>
                {[[false, t.optOff], [true, t.optOn]].map(([k, lbl]) => (
                  <button key={String(k)} className={'lang-seg' + (optNeg === k ? ' active' : '')}
                          onClick={() => setOptNeg(k)} style={{ minWidth: 64 }}>{lbl}</button>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 20 }}>
              <span style={slabel}>{t.optMonoLabel}</span>
              <div className="shaper-seg" style={{ display: 'flex' }}>
                {[[false, t.optOff], [true, t.optOn]].map(([k, lbl]) => (
                  <button key={String(k)} className={'lang-seg' + (optMono === k ? ' active' : '')}
                          onClick={() => setOptMono(k)} style={{ minWidth: 64 }}>{lbl}</button>
                ))}
              </div>
            </div>

            {!optPlot && (
              <p style={{ color: '#94a3b8', fontSize: 14 }}>{t.overdamped}</p>
            )}

            {optPlot && (
            <React.Fragment>
              {/* ── Metrics ── */}
              <div style={{ display: 'flex', gap: 28, flexWrap: 'wrap', marginBottom: 24 }}>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.settleMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(optPlot.settleMs, 1)} ms</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.resMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(optPlot.r.residual1 * 100, 2)} %</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.effortMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(optPlot.r.effort, 2)}</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.peakRateMetric}</div>
                  <div style={{ fontSize: 20, color: '#cbd5e1', fontVariantNumeric: 'tabular-nums' }}>{fmt(optPlot.r.peakRate, 2)} /T</div>
                </div>
                <div>
                  <div style={{ fontSize: 12, color: '#94a3b8' }}>{t.monoMetric}</div>
                  <div style={{ fontSize: 20, color: optPlot.r.monotone ? COL_SHAPED : COL_MIS, fontVariantNumeric: 'tabular-nums' }}>
                    {optPlot.r.monotone ? t.yesS : t.noS}
                  </div>
                </div>
              </div>

              {/* ── Step response ── */}
              <h3 style={{ marginBottom: 2 }}>{t.optTitle}</h3>
              <p style={{ color: '#94a3b8', margin: '0 0 6px', fontSize: 13 }}>{t.optSub}</p>
              <Legend items={[
                { color: COL_REF, label: t.setpoint, dash: true },
                { color: COL_CMD, label: t.command },
                { color: COL_SHAPED, label: t.optOut },
              ]} />
              <LinePlot
                W={680} H={260}
                xMin={optPlot.xMin} xMax={optPlot.tMax}
                yMin={0} yMax={2}
                xTicks={ticks(0, optPlot.tMax, 5)}
                yTicks={[0, 0.5, 1, 1.5, 2]}
                xFmt={x => fmt(x, x < 0.1 ? 3 : x < 1 ? 2 : 1)}
                yFmt={y => fmt(y, 1)}
                series={[
                  { points: optPlot.setp, color: COL_REF, width: 1.5, dash: '4 3' },
                  { points: optPlot.cmd, color: COL_CMD, width: 1.5 },
                  { points: optPlot.out, color: COL_SHAPED, width: 2 },
                ]}
                axX={t.axTime} axY={t.axResp}
              />

              {/* ── Sensitivity curve (with optimised ρ-band) ── */}
              <h3 style={{ marginTop: 28, marginBottom: 2 }}>{t.sensTitle}</h3>
              <p style={{ color: '#94a3b8', margin: '0 0 6px', fontSize: 13 }}>{t.sensSub}</p>
              <Legend items={[
                { color: COL_SHAPED, label: t.modeOptimize },
                { color: COL_DISC, label: t.optBandLabel },
                { color: COL_REF, label: 'ρ = 1', dash: true },
              ]} />
              <LinePlot
                W={680} H={240}
                xMin={0} xMax={2}
                yMin={0} yMax={1}
                xTicks={[0, 0.5, 1, 1.5, 2]}
                yTicks={[0, 0.25, 0.5, 0.75, 1]}
                xFmt={x => fmt(x, 1)}
                yFmt={y => fmt(y * 100, 0) + '%'}
                markX={1}
                vBand={{ x0: 1 - optPlot.r.bw, x1: 1 + optPlot.r.bw, color: COL_DISC, opacity: 0.12 }}
                series={[{ points: optPlot.sens, color: COL_SHAPED, width: 2 }]}
                axX={t.axRho} axY={t.axResidual}
              />

              {/* ── Command increments ── */}
              <h3 style={{ marginTop: 28, marginBottom: 2 }}>{optModel === 'ramps' ? t.optSlopeTitle : t.optImpTitle}</h3>
              <p style={{ color: '#94a3b8', margin: '0 0 8px', fontSize: 13 }}>{optModel === 'ramps' ? t.optSlopeSub : t.optImpSub}</p>
              <div style={{ maxWidth: 680 }}>
                <ImpulsePlot W={680} H={180} dense={true}
                  imp={optModel === 'ramps' ? { t: optPlot.r.t, a: optPlot.r.slope } : optPlot.r.imp} />
              </div>

              {/* ── Implementation recipe (copy-paste numpy) ── */}
              <h3 style={{ marginTop: 28, marginBottom: 8 }}>{t.optRecipeTitle}</h3>
              <pre style={{
                maxWidth: 680, overflow: 'auto', background: '#0f172a', border: '1px solid #334155',
                borderRadius: 8, padding: '12px 14px', fontSize: 12, lineHeight: 1.5, color: '#cbd5e1',
                userSelect: 'text', fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Consolas, monospace',
              }}>{optRecipe(optPlot.r, LANG)}</pre>

              <p style={{ marginTop: 16, fontSize: 13, color: '#94a3b8', lineHeight: 1.7, maxWidth: 680 }}>
                {t.optAbout}
              </p>
            </React.Fragment>
            )}
          </React.Fragment>
          )}

          {/* ── About + footer ── */}
          <p style={{ marginTop: 28, fontSize: 13, color: '#94a3b8', lineHeight: 1.7, maxWidth: 680 }}>
            {t.about}
          </p>
          <p style={{ marginTop: 16, fontSize: 11, color: '#64748b', lineHeight: 1.7 }}>
            {t.source}
          </p>
          <p style={{ marginTop: 8, fontSize: 10, color: '#475569', lineHeight: 1.6 }}>
            {t.disclaimer}
          </p>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<InputShaper />);
  </script>
</body>
</html>
