  <script type="text/babel">
    const { useState, useRef } = React;

    const lang = localStorage.getItem('lang') || 'de';
    const STRINGS = {
      de: {
        h1: 'Kita-Infekte: Krankheitstage-Verteilung',
        source: 'AAP (10–12 Infekte/Jahr) · Ball et al. 2002 (Tucson, n=1.226) · Sundhedsstyrelsen/DK (23,7 bzw. 11 Tage/Jahr) · Louhiala 1992 (Espoo, n=2.568) · Nafstad 1999 (Oslo, n=3.754) — Bänder aus Negativ-Binomial-Approximation (SD\u00a0=\u00a01,3·√μ), approximativ.',
        notice: 'Diese Tools sind private Hobbyprojekte - nicht kommerziell, nicht ausgiebig getestet und ohne Gewähr. Nutzung gerne, auf eigene Verantwortung.',
        showLabel: 'ANZEIGEN',
        btnKita: 'Kita-Kind', btnFami: 'Familienkind', btnBeide: 'Beide',
        famiNote: 'Familienkind\u00a0= vergleichbares Lebensalter (Kitaeintritt typisch 12–18\u00a0Mo)',
        labelInfekte: 'Infekte pro Jahr',
        labelTage: 'Krankentage pro Jahr',
        year: yr => `Jahr\u00a0${yr}`,
        tipYear: x => `Jahr\u00a0${x.toFixed(1)}`,
        tipKita: 'Kita', tipFami: 'Fami',
        tipInfekte: 'Infekte:', tipTage: 'Tage:',
        legendKita: 'Kita-Kind', legendFami: 'Familienkind',
        methodTitle: 'Methodik\u00a0& Quellen',
        mp1: 'X-Achse: Kita-Erfahrungsjahr statt Lebensalter. Studien zeigen, dass die Dauer der Kitaexposition ein stärkerer Prädiktor für Infektionsraten ist als das Alter beim Eintritt: der Peak tritt kurz nach Eintritt auf und fällt innerhalb von 9–12 Monaten wieder ab — unabhängig davon, ob das Kind mit 12 oder 24 Monaten eingetreten ist (finnische Kohorte, Nafstad 1999). Familienkinder werden beim vergleichbaren Lebensalter gezeigt (Kitaeintritt typisch 12–18 Mo).',
        mp2: 'Einschränkung: Die quantitativen Absolutzahlen (Tage/Jahr) stammen überwiegend aus altersgruppierten Daten (Sundhedsstyrelsen: 0–3 Jahre vs. 3–6 Jahre), nicht aus direkt entry-normierten Kohorten. Das Mapping auf die Kita-Erfahrungsjahr-Achse ist eine begründete Annahme, keine direkte Ableitung.',
        mp3: 'Infekte/Jahr (Kita): AAP-Richtwert 10–12 respiratorische Infekte/Jahr für Kita-Kinder im zweiten Lebensjahr. Ball et al. 2002 (Tucson Children\'s Respiratory Study, n=1.226, Geburtskohorte 1980): Kita-Kinder 2× häufiger > 6 Erkältungen/Jahr vs. Homecare; Effekt verblasst nach ca. 3 Jahren. Jahresabfall aus Nafstad et al. 1999 (Oslo, n=3.754): Rückgang auf Familienkind-Niveau ab Kita-Jahr 3–4.',
        mp4: 'Krankentage/Jahr: Sundhedsstyrelsen/DREAM-Register (Dänemark, populationsbasiert): Kita-Kinder 0–3 Jahre durchschnittlich 23,7 Tage/Jahr, 3–6 Jahre 11 Tage/Jahr krank. Finnische Kohorte: symptomatische Tage/Monat steigen von 3,8 (Monat vor Eintritt) auf 10,6 (2 Monate nach Eintritt). Im Tool werden Tage mit tatsächlicher Abwesenheit zugrunde gelegt (dänische Daten), nicht alle symptomatischen Tage.',
        mp5: 'Bänder: P10/P25/P50/P75/P90 aus Negativ-Binomial-Approximation (SD = 1,3·√μ; Overdispersion-Faktor ~1,7 gegenüber Poisson — typisch für Infektionshäufigkeiten in Kinderkohorten). Kurven linear interpoliert. Alle Werte approximativ; individuelle Varianz ist erheblich.',
      },
      en: {
        h1: 'Daycare Infections: Sick Day Distribution',
        source: 'AAP (10–12 infections/year) · Ball et al. 2002 (Tucson, n=1,226) · Sundhedsstyrelsen/DK (23.7 / 11 days/year) · Louhiala 1992 (Espoo, n=2,568) · Nafstad 1999 (Oslo, n=3,754) — Bands from Negative-Binomial approximation (SD\u00a0=\u00a01.3·√μ), approximate.',
        notice: 'These are personal hobby projects - non-commercial, not extensively tested, and provided without any warranty. Feel free to use them, at your own risk.',
        showLabel: 'SHOW',
        btnKita: 'Daycare Child', btnFami: 'Home-cared Child', btnBeide: 'Both',
        famiNote: 'Home-cared child\u00a0= comparable age (daycare entry typically 12–18\u00a0mo)',
        labelInfekte: 'Infections per Year',
        labelTage: 'Sick Days per Year',
        year: yr => `Year\u00a0${yr}`,
        tipYear: x => `Year\u00a0${x.toFixed(1)}`,
        tipKita: 'Daycare', tipFami: 'Home',
        tipInfekte: 'Infections:', tipTage: 'Days:',
        legendKita: 'Daycare Child', legendFami: 'Home-cared Child',
        methodTitle: 'Methodology\u00a0& Sources',
        mp1: 'X-axis: Years of daycare experience rather than chronological age. Research shows that duration of daycare exposure is a stronger predictor of infection rates than age at enrollment: the peak occurs shortly after entry and falls within 9–12 months regardless of whether the child enrolled at 12 or 24 months (Finnish cohort, Nafstad 1999). Home-cared children are shown at comparable chronological age.',
        mp2: 'Limitation: The absolute numbers (days/year) are largely derived from age-grouped data (Sundhedsstyrelsen: ages 0–3 vs. 3–6 years), not from entry-normalized cohorts. The mapping to the daycare-year axis is a reasoned assumption, not a direct derivation.',
        mp3: 'Infections/year (daycare): AAP benchmark of 10–12 respiratory infections/year for daycare children in their second year of life. Ball et al. 2002 (Tucson Children\'s Respiratory Study, n=1,226): daycare children 2× more likely to have >6 colds/year vs. home care; effect fades after ~3 years. Annual decline from Nafstad et al. 1999 (Oslo, n=3,754): regression to home-care levels by daycare year 3–4.',
        mp4: 'Sick days/year: Sundhedsstyrelsen/DREAM Register (Denmark, population-based): daycare children ages 0–3 average 23.7 days/year, ages 3–6 average 11 days/year ill. Finnish cohort: symptomatic days/month rise from 3.8 (month before entry) to 10.6 (2 months after entry). The tool uses days of actual absence (Danish data), not all symptomatic days.',
        mp5: 'Bands: P10/P25/P50/P75/P90 from Negative-Binomial approximation (SD = 1.3·√μ; overdispersion factor ~1.7 vs. Poisson — typical for infection counts in child cohorts). Curves linearly interpolated. All values approximate; individual variation is substantial.',
      }
    };
    const t = STRINGS[lang] || STRINGS.de;

    // ─── DATA ────────────────────────────────────────────────────────────────
    // Alle Arrays: [kita_jahr, P10, P25, P50, P75, P90]
    //
    // Kita-Jahr 1–5. Familienkind = vergleichbares Lebensalter
    // (typischer Kitaeintritt 12–18 Mo, d.h. Fami-Jahr 1 ≈ Lebensalter 1–2 Jahre).
    //
    // INFEKTE/JAHR
    //   Kita: AAP-Richtwert 10–12/Jahr; Ball et al. 2002 (Tucson, n=1.226) 2× Risiko
    //         >6 Erkältungen/Jahr vs. Homecare; Jahresabfall aus Nafstad 1999.
    //   Fami: Ball 2002 Baseline ~6/Jahr (age 1–2); leichter Rückgang mit Alter.
    //   Bänder: Negativ-Binomial, SD = 1,3·√μ (Overdispersion-Faktor ~1,7×Poisson).
    //
    // KRANKENTAGE/JAHR
    //   Kita: Sundhedsstyrelsen (DK): 0–3 J → 23,7 Tage/J; 3–6 J → 11 Tage/J.
    //         Finnische Kohorte: symptomatische Tage/Mo steigen 3,8 → 10,6 nach Eintritt.
    //   Fami: ~50 % unter Kita im Jahr 1; Konvergenz bis Jahr 5.
    //   Bänder: Negativ-Binomial, SD = 1,3·√μ.

    const INFEKTE_KITA = [
      [1,  6,   8,   11,  14,  17 ],
      [2,  3.5, 5.5,  8,  10.5, 13],
      [3,  3,   5,    7,   9,  11 ],
      [4,  2,   4,    6,   8,  10 ],
      [5,  2,   3.5,  5.5, 7.5,  9],
    ];

    const INFEKTE_FAMI = [
      [1,  2,   4,    6,   8,  10  ],
      [2,  1,   3,    5,   7,   9  ],
      [3,  1,   2.5,  4.5, 6.5,  8 ],
      [4,  1,   2,    4,   6,   7.5],
      [5,  1,   2,    4,   6,   7.5],
    ];

    const TAGE_KITA = [
      [1, 16,  20,   24,  28,  32 ],
      [2, 11,  14,   18,  22,  25 ],
      [3,  6,   8,   11,  14,  17 ],
      [4,  4,   6.5,  9,  11.5, 14],
      [5,  3.5, 5.5,  8,  10.5, 13],
    ];

    const TAGE_FAMI = [
      [1,  6,   9,   12,  15,  18],
      [2,  5,   7,   10,  13,  15],
      [3,  4,   6,    8.5, 11,  13],
      [4,  3,   5,    7.5, 10,  12],
      [5,  3,   5,    7,   9,  11],
    ];

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function lerp(data, x, col) {
      if (x <= data[0][0]) return data[0][col];
      if (x >= data[data.length - 1][0]) return data[data.length - 1][col];
      let i = 1;
      while (i < data.length && data[i][0] < x) i++;
      const a = data[i - 1], b = data[i];
      const t = (x - a[0]) / (b[0] - a[0]);
      return a[col] + t * (b[col] - a[col]);
    }

    function band(data, colLow, colHigh, xOf, yOf) {
      const fwd = data.map(d => `${xOf(d[0])},${yOf(d[colLow])}`).join(" L ");
      const bwd = [...data].reverse().map(d => `${xOf(d[0])},${yOf(d[colHigh])}`).join(" L ");
      return `M ${fwd} L ${bwd} Z`;
    }

    function pathLine(data, col, xOf, yOf) {
      return data.map((d, i) => `${i ? "L" : "M"}${xOf(d[0])},${yOf(d[col])}`).join(" ");
    }

    // ─── COMPONENT ───────────────────────────────────────────────────────────
    function KitaInfekte() {
      const [mode, setMode] = useState("beide"); // "kita"|"fami"|"beide"
      const [tip,  setTip]  = useState(null);
      const svgRef = useRef(null);

      // ── SVG layout ─────────────────────────────────────────────────────────
      const W   = 860;
      const ML  = 50, MR = 48;
      const pw  = W - ML - MR;
      const PH0 = 260;
      const PH1 = 220;
      const GAP = 28;
      const MT  = 22;
      const totalH = MT + PH0 + GAP + PH1 + 32;

      const XMIN = 1, XMAX = 5;
      const xOf = x => ML + ((x - XMIN) / (XMAX - XMIN)) * pw;

      const panels = [
        {
          y: MT,
          h: PH0,
          yMin: 0, yMax: 20,
          label: t.labelInfekte,
          yticks: [2, 4, 6, 8, 10, 12, 14, 16, 18],
          yfmt: v => `${v}`,
        },
        {
          y: MT + PH0 + GAP,
          h: PH1,
          yMin: 0, yMax: 36,
          label: t.labelTage,
          yticks: [4, 8, 12, 16, 20, 24, 28, 32],
          yfmt: v => `${v}`,
        },
      ];

      const yOf = (v, p) => p.y + p.h - ((v - p.yMin) / (p.yMax - p.yMin)) * p.h;

      const handleMove = e => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) * (W / rect.width);
        const x = Math.max(XMIN, Math.min(XMAX, (svgX - ML) / pw * (XMAX - XMIN) + XMIN));
        setTip({
          x,
          kI: [lerp(INFEKTE_KITA,x,2), lerp(INFEKTE_KITA,x,3), lerp(INFEKTE_KITA,x,4)],
          fI: [lerp(INFEKTE_FAMI,x,2), lerp(INFEKTE_FAMI,x,3), lerp(INFEKTE_FAMI,x,4)],
          kT: [lerp(TAGE_KITA,x,2),    lerp(TAGE_KITA,x,3),    lerp(TAGE_KITA,x,4)   ],
          fT: [lerp(TAGE_FAMI,x,2),    lerp(TAGE_FAMI,x,3),    lerp(TAGE_FAMI,x,4)   ],
        });
      };

      const colK = "#3b82f6";
      const colF = "#10b981";

      const showK = mode === "kita"  || mode === "beide";
      const showF = mode === "fami"  || mode === "beide";

      const renderBands = (data, col, pi) => {
        const p  = panels[pi];
        const yf = v => yOf(v, p);
        return (
          <>
            <path d={band(data, 1, 5, xOf, yf)} fill={col} opacity={0.08}/>
            <path d={band(data, 2, 4, xOf, yf)} fill={col} opacity={0.18}/>
            <path d={pathLine(data, 3, xOf, yf)} fill="none" stroke={col} strokeWidth={2.5}/>
          </>
        );
      };

      const btnStyle = (active, col) => ({
        padding: "5px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer",
        border: `1.5px solid ${active ? col : "#e2e8f0"}`,
        background: active ? col : "white",
        color:      active ? "white" : "#64748b",
        transition: "all .15s",
      });

      const f1 = v => v.toFixed(1);

      // Tooltip dimensions
      const TW = 194;
      const TH = (n) => 22 + n * 42 + 8;

      return (
        <div style={{fontFamily:"system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh",padding:16}}>
        <div style={{maxWidth:920,margin:"0 auto"}}>

          {/* ── HEADER CARD ── */}
          <div style={{background:"white",borderRadius:12,border:"1px solid #e2e8f0",
            padding:"18px 24px",marginBottom:12}}>
            <h1 style={{fontSize:21,fontWeight:700,color:"#0f172a",margin:"0 0 4px"}}>
              {t.h1}
            </h1>
            <p style={{fontSize:11,color:"#94a3b8",margin:"0 0 14px",lineHeight:1.6}}>
              {t.source}
              <span style={{display:"block",marginTop:8,color:"#64748b"}}>{t.notice}</span>
            </p>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:11,color:"#94a3b8",fontWeight:700,letterSpacing:.5,marginRight:2}}>{t.showLabel}</span>
              {[["kita",t.btnKita,colK],["fami",t.btnFami,colF],["beide",t.btnBeide,"#6366f1"]].map(([k,lbl,col])=>(
                <button key={k} onClick={()=>setMode(k)} style={btnStyle(mode===k,col)}>{lbl}</button>
              ))}
              <span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>
                {t.famiNote}
              </span>
            </div>
          </div>

          {/* ── CHART ── */}
          <div style={{background:"white",borderRadius:12,border:"1px solid #e2e8f0",
            padding:"16px 8px 8px",overflowX:"auto"}}>
            <svg ref={svgRef} width={W} height={totalH}
              style={{display:"block",cursor:"crosshair"}}
              onMouseMove={handleMove}
              onMouseLeave={()=>setTip(null)}>

              {/* Panel backgrounds + y-grids */}
              {panels.map((p, pi) => (
                <g key={pi}>
                  <rect x={ML} y={p.y} width={pw} height={p.h} fill="white" stroke="#e2e8f0"/>
                  {p.yticks.map(v => (
                    <g key={v}>
                      <line x1={ML} y1={yOf(v,p)} x2={ML+pw} y2={yOf(v,p)}
                        stroke="#e2e8f0" strokeDasharray="2,3"/>
                      <text x={ML-6} y={yOf(v,p)+4} textAnchor="end" fill="#94a3b8" fontSize={10}>
                        {p.yfmt(v)}
                      </text>
                    </g>
                  ))}
                  <text x={ML+10} y={p.y+17} fill="#64748b" fontSize={12} fontWeight={700}>
                    {p.label}
                  </text>
                </g>
              ))}

              {/* X-axis ticks + labels */}
              {[1,2,3,4,5].map(yr => (
                <g key={yr}>
                  {panels.map((p, pi) => (
                    <line key={pi}
                      x1={xOf(yr)} y1={p.y} x2={xOf(yr)} y2={p.y+p.h}
                      stroke={yr===1||yr===5?"#cbd5e1":"#e2e8f0"}
                      strokeWidth={yr===1||yr===5?1.5:1}
                      strokeDasharray={yr===1||yr===5?undefined:"2,4"}/>
                  ))}
                  <text x={xOf(yr)} y={panels[1].y+panels[1].h+16}
                    textAnchor="middle" fill="#94a3b8" fontSize={11}>
                    {t.year(yr)}
                  </text>
                </g>
              ))}

              {/* Bands — Fami below Kita so Kita is on top */}
              {showF && renderBands(INFEKTE_FAMI, colF, 0)}
              {showK && renderBands(INFEKTE_KITA, colK, 0)}
              {showF && renderBands(TAGE_FAMI,    colF, 1)}
              {showK && renderBands(TAGE_KITA,    colK, 1)}

              {/* Percentile labels right edge — use whichever series is shown */}
              {(() => {
                const src  = showK ? INFEKTE_KITA : INFEKTE_FAMI;
                const col  = showK ? colK : colF;
                const p    = panels[0];
                const last = src[src.length - 1];
                return [[1,"P10"],[2,"P25"],[3,"P50"],[4,"P75"],[5,"P90"]].map(([ci,lbl]) => (
                  <text key={ci} x={xOf(last[0])+4} y={yOf(last[ci],p)+4}
                    fill={col} fontSize={9} opacity={0.7}>{lbl}</text>
                ));
              })()}

              {/* Legend inside top panel */}
              {(() => {
                const items = [];
                if (showK) items.push([colK, t.legendKita]);
                if (showF) items.push([colF, t.legendFami]);
                return items.map(([col, lbl], i) => (
                  <g key={lbl}>
                    <rect x={ML+10+i*100} y={panels[0].y+panels[0].h-20}
                      width={14} height={4} rx={2} fill={col}/>
                    <text x={ML+28+i*100} y={panels[0].y+panels[0].h-16}
                      fill={col} fontSize={10} fontWeight={600}>{lbl}</text>
                  </g>
                ));
              })()}

              {/* Tooltip */}
              {tip && (() => {
                const tx = xOf(tip.x);
                const entries = [];
                if (showK) entries.push({ col: colK, lbl: t.tipKita,  inf: tip.kI, tage: tip.kT });
                if (showF) entries.push({ col: colF, lbl: t.tipFami,  inf: tip.fI, tage: tip.fT });
                const bh = TH(entries.length);
                const bx = tx + 10 + TW > W - MR ? tx - TW - 10 : tx + 10;
                const by = panels[0].y + 10;
                return (
                  <g>
                    <line x1={tx} y1={panels[0].y} x2={tx} y2={panels[1].y+panels[1].h}
                      stroke="#64748b" strokeWidth={1} strokeDasharray="3,2" opacity={0.5}/>
                    <rect x={bx} y={by} width={TW} height={bh} rx={6}
                      fill="white" stroke="#e2e8f0"
                      style={{filter:"drop-shadow(0 1px 3px rgba(0,0,0,.1))"}}/>
                    <text x={bx+10} y={by+14} fill="#64748b" fontSize={11} fontWeight={700}>
                      {t.tipYear(tip.x)}
                    </text>
                    {entries.map(({ col, lbl, inf, tage }, i) => (
                      <g key={lbl}>
                        <rect x={bx+8} y={by+22+i*42} width={4} height={36} rx={2} fill={col}/>
                        <text x={bx+17} y={by+34+i*42} fill={col} fontSize={10} fontWeight={700}>{lbl}</text>
                        <text x={bx+17} y={by+46+i*42} fill="#475569" fontSize={10}>
                          {`${t.tipInfekte} ${f1(inf[1])} (${f1(inf[0])}–${f1(inf[2])})`}
                        </text>
                        <text x={bx+17} y={by+58+i*42} fill="#475569" fontSize={10}>
                          {`${t.tipTage} ${f1(tage[1])} (${f1(tage[0])}–${f1(tage[2])})`}
                        </text>
                      </g>
                    ))}
                  </g>
                );
              })()}

            </svg>

          {/* ── METHODOLOGY NOTE ── */}

            padding:"12px 20px",marginTop:10,fontSize:12,lineHeight:1.65}}>

            <p style={{marginTop:10,color:"#334155",margin:"10px 0 0"}}>

          </details>

        </div>
        </div>
      );
    }
