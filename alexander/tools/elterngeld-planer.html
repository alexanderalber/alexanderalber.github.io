  <script type="text/babel">
    const { useState, useMemo, useCallback } = React;

    const lang = localStorage.getItem('lang') || 'de';
    const STRINGS = {
      de: {
        monthPrefix: 'LM',
        h1: 'Elterngeld-Planer',
        instructions: 'Klick auf eine Zelle zum Durchschalten:\u00a0— → Basis → Plus → Bonus → —',
        helpShow: 'Regeln\u00a0& Hilfe',

        helpContent: [
          ['Basiselterngeld:', '65\u00a0% vom Netto, max\u00a01.800\u00a0€/Monat. Nur in LM\u00a01–14. Gleichzeitig max\u00a01\u00a0Monat (seit 04/2024).'],
          ['ElterngeldPlus:', 'Halber Basissatz, max\u00a0900\u00a0€. Auch nach LM\u00a014 möglich. 1\u00a0Basismonat\u00a0=\u00a02\u00a0Plus-Monate im Budget.'],
          ['Partnerschaftsbonus:', '2–4\u00a0Extramonate Plus je Elternteil bei gleichzeitiger Teilzeit (24–32\u00a0h). Zusätzlich zum Budget.'],
          ['Budget:', '14\u00a0Basismonate gesamt. Plus-Monate kosten 0,5\u00a0Basismonate. Bonus ist extra.'],
          ['MuSch:', 'Lebensmonat\u00a01–2 zählen als Mutterschutz (volles Netto, wird auf Elterngeld angerechnet).'],
        ],
        presets: {
          klassisch: { name: 'Preset MinMax', desc: 'Mutter 12 Basis, Vater 2 Basis. Einfach, wenig gemeinsame Zeit.' },

        },
        mother: 'Mutter', father: 'Vater',
        egNet: 'Elterngeld-Netto',
        monthHeader: 'Monat',
        sigmaMonth: '\u03a3/Monat',
        muschNote: 'MuSch',
        resetBtn: 'Reset',
        statTotal: 'Gesamtauszahlung',
        statTotalSub: (m, f) => `Mutter: ${m}\u00a0€\u00a0· Vater: ${f}\u00a0€`,
        statDuration: 'Bezugsdauer',
        statDurationVal: n => `${n}\u00a0Monate`,
        statDurationSub: n => `Letzter aktiver Monat: LM\u00a0${n}`,
        statShared: 'Gemeinsame Monate',
        statSharedSub: 'Monate, in denen beide zu Hause sind',
        statBudget: 'Budget verbraucht',
        statBudgetSub: n => `${n}\u00a0Basismonate übrig`,
        chartTitle: 'Monatliche Auszahlung',
        budgetTitle: 'Budget-Aufschlüsselung',
        budgetBasisMusch: 'Basis/MuSch:',
        budgetPlus: 'ElterngeldPlus:',
        budgetBonus: 'Partnerschaftsbonus:',
        budgetMonths: 'Monate',
        budgetBm: 'BM',
        budgetExtra: '(extra)',
        budgetTotal: (used) => `Budget: ${used}\u00a0/ 14\u00a0Basismonate verbraucht`,
        disclaimer: [
          'Vereinfachte Berechnung. Keine Gewähr für Richtigkeit. Für verbindliche Auskunft → ZBFS Bayern (0800\u00a06645471).',
          'Mutterschutzgeld wird hier als volles Netto angezeigt (Krankenkasse\u00a0+ AG-Zuschuss).',
          'Partnerschaftsbonus-Monate zählen nicht ins 14-Monats-Budget.',
        ],
        errBasisAfter14M: (lm) => `Mutter: Basiselterngeld in ${lm} nicht möglich (nur bis LM\u00a014)`,
        errBasisAfter14F: (lm) => `Vater: Basiselterngeld in ${lm} nicht möglich (nur bis LM\u00a014)`,
        errBudget: (used) => `Budget überschritten: ${used} von 14\u00a0Basismonaten verbraucht (Plus zählt halb)`,
        warnMinM: 'Mutter: Mindestens\u00a02\u00a0Monate Bezug erforderlich',
        warnMinF: 'Vater: Mindestens\u00a02\u00a0Monate Bezug erforderlich',
        errMaxBasisM: 'Mutter: Max\u00a012\u00a0Basismonate',
        errMaxBasisF: 'Vater: Max\u00a012\u00a0Basismonate',
        errSimultaneous: (n) => `Gleichzeitiges Basiselterngeld: ${n}\u00a0Monate (max.\u00a01 erlaubt seit April\u00a02024)`,
        warnBonusM: (n) => `Mutter: Partnerschaftsbonus muss 2–4\u00a0Monate sein (aktuell: ${n})`,
        warnBonusF: (n) => `Vater: Partnerschaftsbonus muss 2–4\u00a0Monate sein (aktuell: ${n})`,
        warnBonusSync: (lm) => `${lm}: Partnerschaftsbonus muss gleichzeitig bezogen werden`,
        statusLabels: { none:'—', basis:'Basis', plus:'Plus', bonus:'Bonus', mutterschutz:'MuSch' },
        legendItems: [['#dc2626','MuSch'],['#2563eb','Basis (M)'],['#93c5fd','Basis (V)'],['#7c3aed','Plus (M)'],['#c4b5fd','Plus (V)'],['#059669','Bonus (M)'],['#6ee7b7','Bonus (V)']],
      },
      en: {
        monthPrefix: 'M',
        h1: 'Parental Leave Planner',
        instructions: 'Click a cell to cycle:\u00a0— → Basis → Plus → Bonus → —',
        helpShow: 'Rules\u00a0& Help',
        helpHide: 'Hide help',
        helpContent: [
          ['Basis Benefit:', '65\u00a0% of net income, max\u00a0€1,800/month. Only in months\u00a01–14. Simultaneous max\u00a01\u00a0month (since 04/2024).'],
          ['ElterngeldPlus:', 'Half the base rate, max\u00a0€900. Also available after month\u00a014. 1\u00a0base month\u00a0=\u00a02\u00a0Plus months in budget.'],
          ['Partnership Bonus:', '2–4\u00a0extra Plus months per parent with simultaneous part-time work (24–32\u00a0h). Additional to the budget.'],
          ['Budget:', '14\u00a0base months total. Plus months cost 0.5\u00a0base months. Bonus is extra.'],
          ['Mat. Leave:', 'Life months\u00a01–2 count as maternity leave (full net income, offset against benefit).'],
        ],
        presets: {
          klassisch: { name: 'Preset MinMax', desc: 'Mother 12 Basis, Father 2 Basis. Simple, little shared time.' },
          mix:       { name: 'Preset <3', desc: 'Mother 5 Basis + 3 Plus + 3 Bonus, Father 4 Basis + 3 Plus + 3 Bonus. Budget fully used.' },
          maximum:   { name: 'Preset Max', desc: '10 Basis + 4 Plus (Mother), 1 Basis + 2 Plus + 4 Bonus (Father). Up to 22 months.' },
        },
        mother: 'Mother', father: 'Father',
        egNet: 'Parental Leave Net',
        monthHeader: 'Month',
        sigmaMonth: '\u03a3/Month',
        muschNote: 'MuSch',
        resetBtn: 'Reset',
        statTotal: 'Total Payout',
        statTotalSub: (m, f) => `Mother: ${m}\u00a0€\u00a0· Father: ${f}\u00a0€`,
        statDuration: 'Benefit Period',
        statDurationVal: n => `${n}\u00a0months`,
        statDurationSub: n => `Last active month: M\u00a0${n}`,
        statShared: 'Shared Months',
        statSharedSub: 'Months both parents are home',
        statBudget: 'Budget Used',
        statBudgetSub: n => `${n}\u00a0base months remaining`,
        chartTitle: 'Monthly Payout',
        budgetTitle: 'Budget Breakdown',
        budgetBasisMusch: 'Basis/Mat.:',
        budgetPlus: 'ElterngeldPlus:',
        budgetBonus: 'Partnership Bonus:',
        budgetMonths: 'months',
        budgetBm: 'BM',
        budgetExtra: '(extra)',
        budgetTotal: (used) => `Budget: ${used}\u00a0/ 14\u00a0base months used`,
        disclaimer: [
          'Simplified calculation. No warranty for accuracy. For binding information → ZBFS Bavaria (0800\u00a06645471).',
          'Maternity leave pay shown as full net income (health insurance\u00a0+ employer supplement).',
          'Partnership Bonus months do not count toward the 14-month budget.',
        ],
        errBasisAfter14M: (lm) => `Mother: Basis benefit in ${lm} not possible (only up to M\u00a014)`,
        errBasisAfter14F: (lm) => `Father: Basis benefit in ${lm} not possible (only up to M\u00a014)`,
        errBudget: (used) => `Budget exceeded: ${used} of 14\u00a0base months used (Plus counts half)`,
        warnMinM: 'Mother: At least\u00a02\u00a0months of benefits required',
        warnMinF: 'Father: At least\u00a02\u00a0months of benefits required',
        errMaxBasisM: 'Mother: Max\u00a012\u00a0base months',
        errMaxBasisF: 'Father: Max\u00a012\u00a0base months',
        errSimultaneous: (n) => `Simultaneous Basis benefit: ${n}\u00a0months (max.\u00a01 allowed since April\u00a02024)`,
        warnBonusM: (n) => `Mother: Partnership bonus must be 2–4\u00a0months (current: ${n})`,
        warnBonusF: (n) => `Father: Partnership bonus must be 2–4\u00a0months (current: ${n})`,
        warnBonusSync: (lm) => `${lm}: Partnership bonus must be drawn simultaneously`,
        statusLabels: { none:'—', basis:'Basis', plus:'Plus', bonus:'Bonus', mutterschutz:'MuSch' },
        legendItems: [['#dc2626','MuSch'],['#2563eb','Basis (M)'],['#93c5fd','Basis (V)'],['#7c3aed','Plus (M)'],['#c4b5fd','Plus (V)'],['#059669','Bonus (M)'],['#6ee7b7','Bonus (V)']],
      }
    };
    const t = STRINGS[lang] || STRINGS.de;

    const MONTHS_LABEL = Array.from({length:24}, (_,i) => `${t.monthPrefix}\u00a0${i+1}`);

    const STATUS = {
      NONE: "none", BASIS: "basis", PLUS: "plus", BONUS: "bonus", MUTTERSCHUTZ: "mutterschutz",
    };
    const STATUS_LABELS = t.statusLabels;
    const STATUS_COLORS = {
      [STATUS.NONE]: { bg: "transparent", text: "#888", border: "#ddd" },
      [STATUS.BASIS]: { bg: "#2563eb", text: "#fff", border: "#1d4ed8" },
      [STATUS.PLUS]: { bg: "#7c3aed", text: "#fff", border: "#6d28d9" },
      [STATUS.BONUS]: { bg: "#059669", text: "#fff", border: "#047857" },
      [STATUS.MUTTERSCHUTZ]: { bg: "#dc2626", text: "#fff", border: "#b91c1c" },
    };

    const PRESET_LABELS = { klassisch: 'Preset MinMax', mix: 'Preset ❤', maximum: 'Preset Max' };

    const PRESETS = {
      klassisch: {
        label: 'Preset MinMax',
        name: t.presets.klassisch.name,
        desc: t.presets.klassisch.desc,
        mother: ["mutterschutz","mutterschutz","basis","basis","basis","basis","basis","basis","basis","basis","basis","basis","none","none","none","none","none","none","none","none","none","none","none","none"],
        father: ["basis","none","none","none","none","none","none","none","none","none","none","none","basis","none","none","none","none","none","none","none","none","none","none","none"],
      },
      mix: {
        label: 'Preset <3',
        name: t.presets.mix.name,
        desc: t.presets.mix.desc,
        mother: ["mutterschutz","mutterschutz","basis","basis","basis","basis","basis","plus","plus","plus","bonus","bonus","bonus","none","none","none","none","none","none","none","none","none","none","none"],
        father: ["basis","plus","plus","plus","none","none","none","basis","basis","basis","bonus","bonus","bonus","none","none","none","none","none","none","none","none","none","none","none"],
      },
      maximum: {
        label: 'Preset Max',
        name: t.presets.maximum.name,
        desc: t.presets.maximum.desc,
        mother: ["mutterschutz","mutterschutz","basis","basis","basis","basis","basis","basis","basis","basis","plus","plus","plus","plus","none","none","none","none","bonus","bonus","bonus","bonus","none","none"],
        father: ["basis","plus","plus","none","none","none","none","none","none","none","none","none","none","none","none","none","none","none","bonus","bonus","bonus","bonus","none","none"],
      },
    };

    function calcElterngeld(monthlyNet) {
      if (monthlyNet <= 0) return { basis: 300, plus: 150 };
      const rate = monthlyNet < 1240 ? 0.67 : 0.65;
      const basis = Math.min(1800, Math.max(300, Math.round(monthlyNet * rate)));
      const plus = Math.min(900, Math.round(basis / 2));
      return { basis, plus };
    }

    function validate(mother, father) {
      const warnings = [], errors = [];
      let motherBasis = 0, motherPlus = 0, fatherBasis = 0, fatherPlus = 0;
      let motherBonus = 0, fatherBonus = 0, simultaneousBasisMonths = 0;

      for (let i = 0; i < 24; i++) {
        const m = mother[i], f = father[i];
        if (m === STATUS.MUTTERSCHUTZ || m === STATUS.BASIS) motherBasis++;
        if (m === STATUS.PLUS) motherPlus++;
        if (m === STATUS.BONUS) motherBonus++;
        if (f === STATUS.BASIS) fatherBasis++;
        if (f === STATUS.PLUS) fatherPlus++;
        if (f === STATUS.BONUS) fatherBonus++;
        const mIsBasis = m === STATUS.BASIS || m === STATUS.MUTTERSCHUTZ;
        if (mIsBasis && f === STATUS.BASIS) simultaneousBasisMonths++;
        if (i >= 14) {
          if (m === STATUS.BASIS || m === STATUS.MUTTERSCHUTZ)
            errors.push(t.errBasisAfter14M(MONTHS_LABEL[i]));
          if (f === STATUS.BASIS)
            errors.push(t.errBasisAfter14F(MONTHS_LABEL[i]));
        }
      }

      const totalBudget = motherBasis + fatherBasis + (motherPlus + fatherPlus) * 0.5;
      if (totalBudget > 14) errors.push(t.errBudget(totalBudget.toFixed(1)));
      if (motherBasis + motherPlus > 0 && motherBasis + motherPlus < 2) warnings.push(t.warnMinM);
      if (fatherBasis + fatherPlus > 0 && fatherBasis + fatherPlus < 2) warnings.push(t.warnMinF);
      if (motherBasis > 12) errors.push(t.errMaxBasisM);
      if (fatherBasis > 12) errors.push(t.errMaxBasisF);
      if (simultaneousBasisMonths > 1) errors.push(t.errSimultaneous(simultaneousBasisMonths));
      if (motherBonus > 0 || fatherBonus > 0) {
        if (motherBonus < 2 || motherBonus > 4) warnings.push(t.warnBonusM(motherBonus));
        if (fatherBonus < 2 || fatherBonus > 4) warnings.push(t.warnBonusF(fatherBonus));
        for (let i = 0; i < 24; i++) {
          if ((mother[i] === STATUS.BONUS) !== (father[i] === STATUS.BONUS)) {
            warnings.push(t.warnBonusSync(MONTHS_LABEL[i]));
            break;
          }
        }
      }
      return { warnings, errors, totalBudget, motherBasis, fatherBasis, motherPlus, fatherPlus, motherBonus, fatherBonus };
    }

    const cycleStatus = (current, isMother, monthIndex) => {
      if (isMother && monthIndex < 2) return current === STATUS.MUTTERSCHUTZ ? STATUS.NONE : STATUS.MUTTERSCHUTZ;
      const order = [STATUS.NONE, STATUS.BASIS, STATUS.PLUS, STATUS.BONUS];
      return order[(order.indexOf(current) + 1) % order.length];
    };

    function ElterngeldPlaner() {
      const [motherNet, setMotherNet] = useState(2500);
      const [fatherNet, setFatherNet] = useState(2500);
      const [mother, setMother] = useState(() => PRESETS.maximum.mother.slice());
      const [father, setFather] = useState(() => PRESETS.maximum.father.slice());
      const [showHelp, setShowHelp] = useState(false);

      const motherEG = useMemo(() => calcElterngeld(motherNet), [motherNet]);
      const fatherEG = useMemo(() => calcElterngeld(fatherNet), [fatherNet]);

      const handleCellClick = useCallback((who, index) => {
        if (who === "mother") {
          setMother(prev => { const next = [...prev]; next[index] = cycleStatus(prev[index], true, index); return next; });
        } else {
          setFather(prev => { const next = [...prev]; next[index] = cycleStatus(prev[index], false, index); return next; });
        }
      }, []);

      const loadPreset = useCallback((key) => {
        setMother(PRESETS[key].mother.slice());
        setFather(PRESETS[key].father.slice());
      }, []);

      const resetAll = useCallback(() => {
        setMother(Array(24).fill(STATUS.NONE));
        setFather(Array(24).fill(STATUS.NONE));
      }, []);

      const validation = useMemo(() => validate(mother, father), [mother, father]);

      const financials = useMemo(() => {
        let motherTotal = 0, fatherTotal = 0, simultaneousMonths = 0, lastActiveMonth = 0;
        const monthlyDetail = [];
        for (let i = 0; i < 24; i++) {
          let mAmount = 0, fAmount = 0;
          const m = mother[i], f = father[i];
          if (m === STATUS.MUTTERSCHUTZ) mAmount = motherNet;
          else if (m === STATUS.BASIS) mAmount = motherEG.basis;
          else if (m === STATUS.PLUS || m === STATUS.BONUS) mAmount = motherEG.plus;
          if (f === STATUS.BASIS) fAmount = fatherEG.basis;
          else if (f === STATUS.PLUS || f === STATUS.BONUS) fAmount = fatherEG.plus;
          motherTotal += mAmount; fatherTotal += fAmount;
          if (m !== STATUS.NONE && f !== STATUS.NONE) simultaneousMonths++;
          if (m !== STATUS.NONE || f !== STATUS.NONE) lastActiveMonth = i + 1;
          monthlyDetail.push({ month: i + 1, mAmount, fAmount, total: mAmount + fAmount });
        }
        return { motherTotal, fatherTotal, total: motherTotal + fatherTotal, simultaneousMonths, lastActiveMonth, monthlyDetail };
      }, [mother, father, motherNet, fatherNet, motherEG, fatherEG]);

      return (
        <div style={{
          fontFamily: "'IBM Plex Sans', 'SF Pro Display', -apple-system, sans-serif",
          maxWidth: 1152, margin: "0 auto", padding: "24px 16px",
          color: "#1a1a2e",
        }}>
          <div style={{ marginBottom: 32 }}>
            <h1 style={{ fontSize: 28, fontWeight: 700, margin: 0, letterSpacing: "-0.5px", color: "#1a1a2e" }}>
              {t.h1}
            </h1>
            <p style={{ margin: "6px 0 0", fontSize: 14, color: "#666", lineHeight: 1.5 }}>
              {t.instructions}
            </p>
            <button onClick={() => setShowHelp(!showHelp)} style={{
              marginTop: 8, background: "none", border: "1px solid #ccc", borderRadius: 6,
              padding: "4px 12px", fontSize: 12, color: "#666", cursor: "pointer",
            }}>
              {showHelp ? t.helpHide : t.helpShow}
            </button>
            {showHelp && (
              <div style={{
                marginTop: 12, padding: 16, background: "#fff", borderRadius: 8,
                border: "1px solid #e0dfd8", fontSize: 13, lineHeight: 1.7, color: "#444",
              }}>
                {t.helpContent.map(([term, body], i) => (
                  <span key={i}><strong>{term}</strong> {body}<br/></span>
                ))}
              </div>
            )}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
            {[[t.mother, motherNet, setMotherNet, motherEG], [t.father, fatherNet, setFatherNet, fatherEG]].map(([label, net, setNet, eg]) => (
              <div key={label} style={{ background: "#fff", borderRadius: 10, padding: 16, border: "1px solid #e0dfd8" }}>
                <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#888", marginBottom: 6 }}>
                  {label} – {t.egNet}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <input type="range" min={1000} max={5000} step={50} value={net}
                    onChange={e => setNet(Number(e.target.value))} style={{ flex: 1 }}/>
                  <span style={{ fontSize: 18, fontWeight: 600, fontVariantNumeric: "tabular-nums", minWidth: 70, textAlign: "right" }}>
                    {net.toLocaleString("de-DE")} €
                  </span>
                </div>
                <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>
                  → Basis: {eg.basis.toLocaleString("de-DE")} € · Plus: {eg.plus.toLocaleString("de-DE")} €
                  {eg.basis === 1800 && <span style={{ color: "#059669", fontWeight: 600 }}> (Cap)</span>}
                </div>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            {Object.entries(PRESETS).map(([key, p]) => (
              <button key={key} onClick={() => loadPreset(key)} style={{
                background: "#fff", border: "1px solid #d0cfc8", borderRadius: 8,
                padding: "8px 14px", fontSize: 12, cursor: "pointer", textAlign: "left",
                lineHeight: 1.4, flex: "1 1 180px", color: "#1a1a2e",
              }}>
                <div style={{ fontWeight: 700 }}>{p.name}</div>
              </button>
            ))}
            <button onClick={resetAll} style={{
              background: "#fff", border: "1px solid #d0cfc8", borderRadius: 8,
              padding: "8px 14px", fontSize: 12, cursor: "pointer", minWidth: 80, color: "#1a1a2e",
            }}>{t.resetBtn}</button>
          </div>

          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e0dfd8", overflow: "hidden", marginBottom: 24 }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 700 }}>
                <thead>
                  <tr>
                    <th style={{
                      padding: "10px 12px", textAlign: "left", fontSize: 11, textTransform: "uppercase",
                      letterSpacing: 1, color: "#888", borderBottom: "2px solid #e0dfd8", background: "#fafaf7",
                      position: "sticky", left: 0, zIndex: 1, minWidth: 70,
                    }}>{t.monthHeader}</th>
                    {MONTHS_LABEL.map((label, i) => (
                      <th key={i} style={{
                        padding: "10px 4px", textAlign: "center", fontSize: 10, fontWeight: 600,
                        color: i < 14 ? "#1a1a2e" : "#aaa", borderBottom: "2px solid #e0dfd8",
                        background: "#fafaf7", minWidth: 38, borderLeft: i === 14 ? "2px dashed #ccc" : "none",
                      }}>
                        {label}
                        {i < 2 && <div style={{ fontSize: 8, color: "#dc2626", fontWeight: 400 }}>MuSch</div>}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[["mother", mother, motherEG, motherNet], ["father", father, fatherEG, null]].map(([who, plan, eg, net]) => (
                    <tr key={who}>
                      <td style={{
                        padding: "6px 12px", fontSize: 12, fontWeight: 600,
                        background: "#fafaf7", position: "sticky", left: 0, zIndex: 1, borderBottom: "1px solid #eee",
                      }}>{who === "mother" ? t.mother : t.father}</td>
                      {plan.map((status, i) => {
                        const colors = STATUS_COLORS[status];
                        return (
                          <td key={i} onClick={() => handleCellClick(who, i)} style={{
                            padding: 2, textAlign: "center", cursor: "pointer",
                            borderLeft: i === 14 ? "2px dashed #ccc" : "none", borderBottom: "1px solid #eee",
                          }}>
                            <div style={{
                              background: colors.bg, color: colors.text,
                              border: `1.5px solid ${status === STATUS.NONE ? "#ddd" : colors.border}`,
                              borderRadius: 5, padding: "6px 2px", fontSize: 10, fontWeight: 600,
                              userSelect: "none", lineHeight: 1.2,
                            }}>
                              {STATUS_LABELS[status]}
                              {status !== STATUS.NONE && (
                                <div style={{ fontSize: 9, fontWeight: 400, opacity: 0.85, marginTop: 1 }}>
                                  {status === STATUS.MUTTERSCHUTZ ? `${net.toLocaleString("de-DE")}€`
                                    : status === STATUS.BASIS ? `${eg.basis.toLocaleString("de-DE")}€`
                                    : `${eg.plus.toLocaleString("de-DE")}€`}
                                </div>
                              )}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                  <tr>
                    <td style={{
                      padding: "6px 12px", fontSize: 11, fontWeight: 600, color: "#888",
                      background: "#fafaf7", position: "sticky", left: 0, zIndex: 1,
                    }}>{t.sigmaMonth}</td>
                    {financials.monthlyDetail.map((d, i) => (
                      <td key={i} style={{
                        padding: "6px 2px", textAlign: "center", fontSize: 9,
                        color: d.total > 0 ? "#1a1a2e" : "#ccc", fontWeight: d.total > 0 ? 600 : 400,
                        borderLeft: i === 14 ? "2px dashed #ccc" : "none",
                      }}>
                        {d.total > 0 ? `${(d.total / 1000).toFixed(1)}k` : "—"}
                      </td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          {(validation.errors.length > 0 || validation.warnings.length > 0) && (
            <div style={{ marginBottom: 24 }}>
              {validation.errors.map((e, i) => (
                <div key={`e${i}`} style={{
                  background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 8,
                  padding: "10px 14px", marginBottom: 6, fontSize: 13, color: "#991b1b",
                  display: "flex", alignItems: "center", gap: 8,
                }}>⛔ {e}</div>
              ))}
              {validation.warnings.map((w, i) => (
                <div key={`w${i}`} style={{
                  background: "#fffbeb", border: "1px solid #fcd34d", borderRadius: 8,
                  padding: "10px 14px", marginBottom: 6, fontSize: 13, color: "#92400e",
                  display: "flex", alignItems: "center", gap: 8,
                }}>⚠️ {w}</div>
              ))}
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12, marginBottom: 24 }}>
            {[
              { label: t.statTotal, value: `${financials.total.toLocaleString("de-DE")} €`, sub: t.statTotalSub(financials.motherTotal.toLocaleString("de-DE"), financials.fatherTotal.toLocaleString("de-DE")), accent: "#1a1a2e" },
              { label: t.statDuration, value: t.statDurationVal(financials.lastActiveMonth), sub: t.statDurationSub(financials.lastActiveMonth), accent: "#2563eb" },
              { label: t.statShared, value: `${financials.simultaneousMonths}`, sub: t.statSharedSub, accent: "#059669" },
              { label: t.statBudget, value: `${validation.totalBudget.toFixed(1)} / 14`, sub: t.statBudgetSub((14 - validation.totalBudget).toFixed(1)), accent: validation.totalBudget > 14 ? "#dc2626" : "#7c3aed" },
            ].map((card, i) => (
              <div key={i} style={{
                background: "#fff", borderRadius: 10, padding: 16, border: "1px solid #e0dfd8",
                borderTop: `3px solid ${card.accent}`,
              }}>
                <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#888", marginBottom: 6 }}>{card.label}</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: card.accent, fontVariantNumeric: "tabular-nums" }}>{card.value}</div>
                <div style={{ fontSize: 11, color: "#999", marginTop: 4, lineHeight: 1.4 }}>{card.sub}</div>
              </div>
            ))}
          </div>

          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e0dfd8", padding: 20, marginBottom: 24 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#888", marginBottom: 16 }}>
              {t.chartTitle}
            </div>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 120 }}>
              {financials.monthlyDetail.map((d, i) => {
                const maxTotal = Math.max(...financials.monthlyDetail.map(x => x.total), 1);
                const mH = d.total > 0 ? (d.mAmount / maxTotal) * 100 : 0;
                const fH = d.total > 0 ? (d.fAmount / maxTotal) * 100 : 0;
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
                    <div style={{ display: "flex", flexDirection: "column", justifyContent: "flex-end", width: "100%", height: "100%" }}>
                      <div style={{
                        background: mother[i] === STATUS.MUTTERSCHUTZ ? "#dc2626" : mother[i] === STATUS.BASIS ? "#2563eb" : mother[i] === STATUS.BONUS ? "#059669" : "#7c3aed",
                        height: `${mH}%`, borderRadius: "3px 3px 0 0", opacity: d.mAmount > 0 ? 1 : 0,
                      }} />
                      <div style={{
                        background: father[i] === STATUS.BASIS ? "#93c5fd" : father[i] === STATUS.BONUS ? "#6ee7b7" : "#c4b5fd",
                        height: `${fH}%`, borderRadius: "0 0 3px 3px", opacity: d.fAmount > 0 ? 1 : 0,
                      }} />
                    </div>
                    <div style={{ fontSize: 8, color: "#aaa", marginTop: 3 }}>{i + 1}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 12, fontSize: 11, color: "#666", flexWrap: "wrap" }}>
              {t.legendItems.map(([bg,lbl])=>(
                <span key={lbl}><span style={{ display:"inline-block",width:10,height:10,background:bg,borderRadius:2,marginRight:4,verticalAlign:"middle" }}/>{lbl}</span>
              ))}
            </div>
          </div>

          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e0dfd8", padding: 20 }}>
            <div style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: "#888", marginBottom: 12 }}>
              {t.budgetTitle}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, fontSize: 13 }}>
              <div>
                <div style={{ fontWeight: 600, marginBottom: 6 }}>{t.mother}</div>
                <div style={{ color: "#555", lineHeight: 1.8 }}>
                  {t.budgetBasisMusch} {validation.motherBasis} {t.budgetMonths} = {validation.motherBasis} {t.budgetBm}<br/>
                  {t.budgetPlus} {validation.motherPlus} {t.budgetMonths} = {(validation.motherPlus * 0.5).toFixed(1)} {t.budgetBm}<br/>
                  {t.budgetBonus} {validation.motherBonus} {t.budgetMonths} {t.budgetExtra}
                </div>
              </div>
              <div>
                <div style={{ fontWeight: 600, marginBottom: 6 }}>{t.father}</div>
                <div style={{ color: "#555", lineHeight: 1.8 }}>
                  {t.budgetBasisMusch} {validation.fatherBasis} {t.budgetMonths} = {validation.fatherBasis} {t.budgetBm}<br/>
                  {t.budgetPlus} {validation.fatherPlus} {t.budgetMonths} = {(validation.fatherPlus * 0.5).toFixed(1)} {t.budgetBm}<br/>
                  {t.budgetBonus} {validation.fatherBonus} {t.budgetMonths} {t.budgetExtra}
                </div>
              </div>
            </div>
            <div style={{
              marginTop: 12, padding: "10px 14px", background: "#f8f7f4", borderRadius: 8,
              fontSize: 13, fontWeight: 600, color: validation.totalBudget > 14 ? "#dc2626" : "#1a1a2e",
            }}>
              {t.budgetTotal(validation.totalBudget.toFixed(1))}
              <div style={{ marginTop: 6, height: 8, background: "#e5e5e0", borderRadius: 4, overflow: "hidden" }}>
                <div style={{
                  width: `${Math.min(100, (validation.totalBudget / 14) * 100)}%`, height: "100%",
                  background: validation.totalBudget > 14 ? "linear-gradient(90deg, #dc2626, #ef4444)"
                    : validation.totalBudget > 12 ? "linear-gradient(90deg, #f59e0b, #fbbf24)"
                    : "linear-gradient(90deg, #2563eb, #3b82f6)",
                  borderRadius: 4,
                }} />
              </div>
            </div>
          </div>

          <div style={{ marginTop: 24, fontSize: 11, color: "#aaa", lineHeight: 1.6, textAlign: "center" }}>
            {t.disclaimer[0]}<br/>{t.disclaimer[1]}<br/>{t.disclaimer[2]}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ElterngeldPlaner />);
  </script>

  <footer class="container">
    <small>© 2026 Alexander Alber · <a href="/">alber.me</a></small>
  </footer>
</body>
</html>
