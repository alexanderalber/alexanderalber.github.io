  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    // ─── MATH ────────────────────────────────────────────────────────────────
    function erf(x) {
      const t = 1 / (1 + 0.3275911 * Math.abs(x));
      const p = t * (0.254829592 + t * (-0.284496736 + t * (1.421413741 + t * (-1.453152027 + t * 1.061405429))));
      const r = 1 - p * Math.exp(-x * x);
      return x >= 0 ? r : -r;
    }
    const normCDF = (x, mu = 0, sigma = 1) => 0.5 * (1 + erf((x - mu) / (sigma * Math.SQRT2)));
    const normPDF = (x, mu = 0, sigma = 1) =>
      Math.exp(-0.5 * ((x - mu) / sigma) ** 2) / (sigma * Math.sqrt(2 * Math.PI));

    function normQuantile(p, mu = 0, sigma = 1) {
      // Acklam's rational approximation – accurate to ~9 significant digits
      const a = [-3.969683028665376e1, 2.209460984245205e2, -2.759285104469687e2,
                  1.383577518672690e2, -3.066479806614716e1,  2.506628277459239];
      const b = [-5.447609879822406e1, 1.615858368580409e2, -1.556989798598866e2,
                  6.680131188771972e1, -1.328068155288572e1];
      const c = [-7.784894002430293e-3, -3.223964580411365e-1, -2.400758277161838,
                 -2.549732539343734,     4.374664141464968,     2.938163982698783];
      const d = [7.784695709041462e-3, 3.224671290700398e-1, 2.445134137142996, 3.754408661907416];
      const pLow = 0.02425, pHigh = 1 - pLow;
      let q;
      if (p < pLow) {
        q = Math.sqrt(-2 * Math.log(p));
        q = (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5]) /
            ((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
      } else if (p <= pHigh) {
        q = p - 0.5;
        const r2 = q * q;
        q = (((((a[0]*r2+a[1])*r2+a[2])*r2+a[3])*r2+a[4])*r2+a[5]) * q /
            (((((b[0]*r2+b[1])*r2+b[2])*r2+b[3])*r2+b[4])*r2+1);
      } else {
        q = Math.sqrt(-2 * Math.log(1 - p));
        q = -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5]) /
             ((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
      }
      return mu + sigma * q;
    }

    // ─── DATE UTILS ──────────────────────────────────────────────────────────
    const addDays = (base, n) => {
      const r = new Date(base); r.setDate(r.getDate() + Math.round(n)); return r;
    };
    const daysDiff = (a, b) => Math.round((b - a) / 86400000);
    const fmtShort = d => d.toLocaleDateString('de-DE', { day: '2-digit', month: 'short' });
    const fmtFull  = d => d.toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });

    // ─── SKEW-NORMAL MATH ────────────────────────────────────────────────────
    // Empirical shape from Smith 2001 (KM, spontaneous onset, n=1514):
    // Bowley skewness = (Q3+Q1−2·Q2)/(Q3−Q1) = (+4+(−6))/10 = −0.2  →  α ≈ −2
    const SKEW_ALPHA = -2;

    // Owen's T via 8-point Gauss-Legendre quadrature on [0, |a|]
    function owensT(h, a) {
      if (a === 0) return 0;
      const sgn = a < 0 ? -1 : 1;
      const A   = Math.abs(a);
      const GL_N = [0.9602898564975363, 0.7966664774136267,
                    0.5255324099163290, 0.1834346424956498];
      const GL_W = [0.1012285362903763, 0.2223810344533745,
                    0.3137066458778873, 0.3626837833783620];
      let s = 0;
      for (let i = 0; i < 4; i++) {
        for (const nd of [GL_N[i], -GL_N[i]]) {
          const t = A / 2 * nd + A / 2;
          s += GL_W[i] * Math.exp(-0.5 * h * h * (1 + t * t)) / (1 + t * t);
        }
      }
      return sgn * A / (4 * Math.PI) * s;
    }

    const skewPDF = (x, xi, omega, alpha) => {
      const z = (x - xi) / omega;
      return 2 / omega * normPDF(z) * normCDF(alpha * z);
    };
    const skewCDF = (x, xi, omega, alpha) => {
      const z = (x - xi) / omega;
      return normCDF(z) - 2 * owensT(z, alpha);
    };

    // Given desired sigma (std-dev) and alpha, return {xi, omega} so that
    // Var = sigma² and Median = 0.
    function skewParams(sigma, alpha) {
      const delta = alpha / Math.sqrt(1 + alpha * alpha);
      const omega = sigma / Math.sqrt(1 - 2 * delta * delta / Math.PI);
      // bisect for xi: skewCDF(0; xi, omega, alpha) = 0.5
      let lo = -6 * sigma, hi = 6 * sigma;
      for (let i = 0; i < 56; i++) {
        const mid = (lo + hi) / 2;
        if (skewCDF(0, mid, omega, alpha) > 0.5) lo = mid; else hi = mid;
      }
      return { xi: (lo + hi) / 2, omega };
    }

    function skewQuantile(p, xi, omega, alpha) {
      let lo = xi - 10 * omega, hi = xi + 10 * omega;
      for (let i = 0; i < 60; i++) {
        const mid = (lo + hi) / 2;
        if (skewCDF(mid, xi, omega, alpha) < p) lo = mid; else hi = mid;
      }
      return (lo + hi) / 2;
    }

    // ─── MODEL ───────────────────────────────────────────────────────────────
    function computeModel({ method, lmp, cycleLength, usEdd, usWeek, transferDate, embryoAge,
                            parity, priorPTB, height, bmi, ethnicity, fetalSex, conceptionMethod,
                            distType }) {
      let baseEdd, sigmaBase, naegeleEdd = null;

      if (method === 'lmp') {
        if (!lmp) return null;
        const lmpDate = new Date(lmp + 'T12:00:00');
        baseEdd   = addDays(lmpDate, 283 + (cycleLength - 28));
        naegeleEdd = addDays(lmpDate, 280);
        sigmaBase  = 12.5;
      } else if (method === 'us') {
        if (!usEdd) return null;
        baseEdd   = new Date(usEdd + 'T12:00:00');
        sigmaBase = usWeek <= 13 ? 10.5 : usWeek <= 20 ? 11.5 : 12.5;
      } else { // ivf
        if (!transferDate) return null;
        baseEdd   = addDays(new Date(transferDate + 'T12:00:00'), 266 - embryoAge);
        sigmaBase = 10.0;
      }

      // Systematic shifts (on EDD)
      let shift = 0;
      if (parity === 0)  shift += 1.0;
      if (parity >= 2)   shift -= 0.5;
      if (priorPTB)      shift -= 3.0;
      shift += (height - 168) * 0.2;
      shift += (bmi - 22) * 0.12;
      if (ethnicity === 'black') shift -= 3.5;
      if (ethnicity === 'asian') shift -= 2.0;
      if (fetalSex === 'male')   shift += 0.8;
      if (fetalSex === 'female') shift -= 0.8;
      if (conceptionMethod === 'ivf' && method !== 'ivf') shift -= 3.0;

      const eddModel = addDays(baseEdd, shift);

      // Sigma corrections
      let sigma = sigmaBase;
      if (parity === 0) sigma += 0.5;
      if (priorPTB)     sigma += 2.0;

      // Distribution helpers — swap between normal and skew-normal
      let distPDF, distCDF, distQuantile, meanDays, modeDays;
      if (distType === 'skew') {
        const { xi, omega } = skewParams(sigma, SKEW_ALPHA);
        distPDF      = x => skewPDF(x, xi, omega, SKEW_ALPHA);
        distCDF      = x => skewCDF(x, xi, omega, SKEW_ALPHA);
        distQuantile = p => skewQuantile(p, xi, omega, SKEW_ALPHA);
        const delta  = SKEW_ALPHA / Math.sqrt(1 + SKEW_ALPHA * SKEW_ALPHA);
        meanDays     = Math.round(xi + omega * delta * Math.sqrt(2 / Math.PI));
        // mode via scan
        let maxP = -1;
        modeDays = 0;
        for (let d = -42; d <= 28; d += 0.1) {
          const v = distPDF(d); if (v > maxP) { maxP = v; modeDays = d; }
        }
        modeDays = Math.round(modeDays);
      } else {
        distPDF      = x => normPDF(x, 0, sigma);
        distCDF      = x => normCDF(x, 0, sigma);
        distQuantile = p => normQuantile(p, 0, sigma);
        meanDays = 0;
        modeDays = 0;
      }

      // Risk outputs
      const pPreterm  = priorPTB ? 0.30 : distCDF(-21);
      const pPostterm = 1 - distCDF(14);
      const pByEdd7   = distCDF(7);

      // Percentiles
      const PCT = [0.05, 0.10, 0.25, 0.50, 0.75, 0.90, 0.95];
      const percentiles = PCT.map(p => {
        const days = distQuantile(p);
        return { p, days, date: addDays(eddModel, days), label: `P${Math.round(p * 100)}` };
      });

      const p10d       = distQuantile(0.10);
      const p90d       = distQuantile(0.90);
      const windowDays = Math.round(p90d - p10d);

      // Naegele delta relative to eddModel (naegele - model; negative = naegele is earlier)
      const naegeleD       = naegeleEdd ? daysDiff(eddModel, naegeleEdd) : null;
      const modelVsNaegele = naegeleEdd ? -naegeleD : null; // positive = model later than Naegele

      // Chart data: d = -42..+28
      const chartData = [];
      for (let i = 0; i < 71; i++) {
        const d = i - 42;
        chartData.push({
          d,
          pdf:  distPDF(d),
          cdf:  distCDF(d),
          date: fmtShort(addDays(eddModel, d)),
          wk:   (40 + d / 7).toFixed(1),
        });
      }

      return {
        eddModel, sigma, sigmaBase, naegeleEdd, naegeleD, modelVsNaegale: modelVsNaegele,
        pPreterm, pPostterm, pByEdd7, percentiles, windowDays, p10d, p90d, chartData,
        meanDays, modeDays,
      };
    }

    // ─── SVG CHART ───────────────────────────────────────────────────────────
    const W  = 760, H = 255;
    const ML = 6, MR = 20, MT = 18, MB = 46;
    const plotW = W - ML - MR, plotH = H - MT - MB;
    const yBot = MT + plotH;

    const ZONES = [
      { x1: -42, x2: -21, fill: 'rgba(220,60,60,.07)',  label: 'Frühgeburt',  lx: -31 },
      { x1: -21, x2:  -7, fill: 'rgba(210,130,30,.07)', label: 'Early term',  lx: -14 },
      { x1:  -7, x2:   7, fill: 'rgba(30,150,60,.08)',  label: 'Full term',   lx:   0 },
      { x1:   7, x2:  14, fill: 'rgba(210,160,30,.07)', label: 'Late',        lx:  10.5 },
      { x1:  14, x2:  28, fill: 'rgba(220,60,60,.05)',  label: 'Post-term',   lx:  21 },
    ];
    const ZONE_COLORS = ['#dc6868','#c07830','#1a9640','#c09030','#dc6868'];
    const TICKS = [-35,-28,-21,-14,-7,0,7,14,21];

    const xSvg = d => ML + ((d + 42) / 70) * plotW;

    function Chart({ model, tooltip, chartMode, onMouseMove, onMouseLeave, svgRef }) {
      const maxPDF  = Math.max(...model.chartData.map(p => p.pdf));
      const ySvgPDF = pdf => yBot - (pdf / maxPDF) * plotH;
      const ySvgCDF = cdf => yBot - cdf * plotH;

      const showPDF = chartMode === 'pdf' || chartMode === 'both';
      const showCDF = chartMode === 'cdf' || chartMode === 'both';

      const pdfPts  = model.chartData.map(({ d, pdf }) => `${xSvg(d).toFixed(1)},${ySvgPDF(pdf).toFixed(1)}`);
      const areaPth = `M ${xSvg(-42)},${yBot} L ${pdfPts.join(' L ')} L ${xSvg(28)},${yBot} Z`;
      const linePdfPth = `M ${pdfPts.join(' L ')}`;

      const cdfPts  = model.chartData.map(({ d, cdf }) => `${xSvg(d).toFixed(1)},${ySvgCDF(cdf).toFixed(1)}`);
      const lineCdfPth = `M ${cdfPts.join(' L ')}`;

      const p10x = xSvg(model.p10d);
      const p90x = xSvg(model.p90d);
      const p25d = normQuantile(0.25, 0, model.sigma);
      const p75d = normQuantile(0.75, 0, model.sigma);
      const p25x = xSvg(p25d);
      const p75x = xSvg(p75d);

      const etX = xSvg(0);

      // CDF y-axis labels (only in cdf/both mode)
      const cdfYLabels = [0, 0.25, 0.5, 0.75, 1.0];

      return (
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} width="100%"
             style={{ display: 'block', cursor: 'crosshair' }}
             onMouseMove={onMouseMove} onMouseLeave={onMouseLeave}>

          {/* Zone backgrounds */}
          {ZONES.map(z => (
            <rect key={z.label}
              x={xSvg(z.x1)} y={MT}
              width={xSvg(z.x2) - xSvg(z.x1)} height={plotH}
              fill={z.fill} />
          ))}

          {/* P10–P90 band */}
          <rect x={p10x} y={MT} width={p90x - p10x} height={plotH}
                fill="rgba(37,99,235,.05)" />

          {/* PDF area + line */}
          {showPDF && <>
            <path d={areaPth} fill="rgba(37,99,235,.18)" />
            <path d={linePdfPth} fill="none" stroke="rgba(37,99,235,.8)" strokeWidth="1.5" />
          </>}

          {/* CDF line */}
          {showCDF && <>
            {/* horizontal guide lines at 25/50/75% */}
            {[0.25, 0.5, 0.75].map(v => (
              <line key={v} x1={ML} y1={ySvgCDF(v)} x2={W - MR} y2={ySvgCDF(v)}
                    stroke="rgba(234,88,12,.12)" strokeWidth="1" strokeDasharray="4,3" />
            ))}
            <path d={lineCdfPth} fill="none" stroke="rgba(234,88,12,.85)" strokeWidth="2" />
            {/* y-axis labels on right side */}
            {cdfYLabels.map(v => (
              <text key={v} x={W - MR + 3} y={ySvgCDF(v) + 4}
                    fontSize="9" fill="rgba(234,88,12,.7)" fontFamily="system-ui,sans-serif">
                {v === 0 ? '' : `${Math.round(v * 100)}%`}
              </text>
            ))}
          </>}

          {/* P25/P75 – dashed (only PDF mode) */}
          {showPDF && !showCDF && <>
            <line x1={p25x} y1={MT} x2={p25x} y2={yBot}
                  stroke="rgba(37,99,235,.3)" strokeWidth="1" strokeDasharray="3,3" />
            <line x1={p75x} y1={MT} x2={p75x} y2={yBot}
                  stroke="rgba(37,99,235,.3)" strokeWidth="1" strokeDasharray="3,3" />
          </>}

          {/* P10/P90 – solid */}
          <line x1={p10x} y1={MT} x2={p10x} y2={yBot}
                stroke="rgba(37,99,235,.5)" strokeWidth="1" />
          <line x1={p90x} y1={MT} x2={p90x} y2={yBot}
                stroke="rgba(37,99,235,.5)" strokeWidth="1" />

          {/* ET dashed reference */}
          <line x1={etX} y1={MT} x2={etX} y2={yBot}
                stroke="#0f172a" strokeWidth="1.5" strokeDasharray="4,3" />
          <text x={etX} y={MT - 4} textAnchor="middle"
                fontSize="10" fill="#0f172a" fontFamily="system-ui,sans-serif">ET</text>

          {/* Naegele line (LMP only, if differs) */}
          {model.naegeleD != null && model.naegeleD !== 0 &&
           model.naegeleD >= -42 && model.naegeleD <= 28 && (
            <>
              <line x1={xSvg(model.naegeleD)} y1={MT} x2={xSvg(model.naegeleD)} y2={yBot}
                    stroke="#d97706" strokeWidth="1" strokeDasharray="3,3" />
              <text x={xSvg(model.naegeleD)} y={MT - 4} textAnchor="middle"
                    fontSize="9" fill="#d97706" fontFamily="system-ui,sans-serif">N</text>
            </>
          )}

          {/* X axis */}
          <line x1={ML} y1={yBot} x2={W - MR} y2={yBot}
                stroke="#e2e8f0" strokeWidth="1" />

          {/* X ticks */}
          {TICKS.map(d => (
            <g key={d} transform={`translate(${xSvg(d)},${yBot})`}>
              <line y2={4} stroke="#cbd5e1" strokeWidth="1" />
              <text y={15} textAnchor="middle" fontSize="10"
                    fill="#64748b" fontFamily="system-ui,sans-serif">
                {d === 0 ? '' : `${40 + Math.round(d / 7)}w`}
              </text>
              <text y={25} textAnchor="middle" fontSize="9"
                    fill="#94a3b8" fontFamily="system-ui,sans-serif">
                {d === 0 ? '' : (d > 0 ? `+${d}` : `${d}`)}
              </text>
            </g>
          ))}

          {/* Zone labels */}
          {ZONES.map((z, i) => (
            <text key={z.label} x={xSvg(z.lx)} y={H - 5}
                  textAnchor="middle" fontSize="9"
                  fill={ZONE_COLORS[i]} fontFamily="system-ui,sans-serif">
              {z.label}
            </text>
          ))}

          {/* Tooltip */}
          {tooltip && (() => {
            const tx   = xSvg(tooltip.d);
            const ty   = showCDF ? ySvgCDF(tooltip.cdf) : ySvgPDF(tooltip.pdf);
            const left = tx > W * 0.58;
            const bx   = left ? tx - 108 : tx + 8;
            const boxH = chartMode === 'both' ? 62 : 50;
            return (
              <g>
                <line x1={tx} y1={MT} x2={tx} y2={yBot}
                      stroke="#94a3b8" strokeWidth="1" />
                <circle cx={tx} cy={ty} r={3}
                        fill={showCDF && !showPDF ? 'rgba(234,88,12,.9)' : '#2563eb'} />
                {showPDF && showCDF && (
                  <circle cx={tx} cy={ySvgPDF(tooltip.pdf)} r={3} fill="#2563eb" />
                )}
                <rect x={bx} y={MT + 6} width={100} height={boxH} rx={4}
                      fill="#0f172a" stroke="#334155" strokeWidth="1" />
                <text x={bx + 50} y={MT + 20} textAnchor="middle"
                      fontSize="11" fill="white" fontFamily="system-ui,sans-serif">
                  {tooltip.date}
                </text>
                <text x={bx + 50} y={MT + 33} textAnchor="middle"
                      fontSize="10" fill="#94a3b8" fontFamily="system-ui,sans-serif">
                  SSW {tooltip.wk}
                </text>
                {showPDF && (
                  <text x={bx + 50} y={MT + 46} textAnchor="middle"
                        fontSize="10" fill="rgba(170,200,255,.8)" fontFamily="monospace">
                    {(tooltip.pdf * 100).toFixed(2)}% / Tag
                  </text>
                )}
                {showCDF && (
                  <text x={bx + 50} y={MT + (showPDF ? 58 : 46)} textAnchor="middle"
                        fontSize="10" fill="rgba(253,186,116,.85)" fontFamily="monospace">
                    kum. {(tooltip.cdf * 100).toFixed(1)}%
                  </text>
                )}
              </g>
            );
          })()}
        </svg>
      );
    }

    // ─── TOGGLE GROUP ────────────────────────────────────────────────────────
    function TG({ options, value, onChange }) {
      return (
        <div className="gt-tg">
          {options.map(o => (
            <button key={String(o.value)} onClick={() => onChange(o.value)}
                    className={String(value) === String(o.value) ? 'active' : ''}>
              {o.label}
            </button>
          ))}
        </div>
      );
    }

    // ─── DATE INPUT ──────────────────────────────────────────────────────────
    function DateInput({ value, onChange }) {
      const hiddenRef = useRef(null);
      const { useState: useLS, useEffect } = React;

      const split = v => v ? v.split('-') : ['', '', ''];
      const [[yyyy, mm, dd], setParts] = useLS(() => split(value));

      // sync when native picker selects a date
      useEffect(() => { setParts(split(value)); }, [value]);

      const emit = ([y, m, d]) => {
        if (y.length === 4 && m && d)
          onChange({ target: { value: `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}` } });
        else
          onChange({ target: { value: '' } });
      };

      const setP = (i, raw) => {
        const v = raw.replace(/\D/g, '').slice(0, i === 0 ? 4 : 2);
        const next = [yyyy, mm, dd]; next[i] = v;
        setParts(next); emit(next);
      };

      const inp = { type: 'text', inputMode: 'numeric',
        style: { border: '1px solid #e2e8f0', borderRadius: 6, padding: '1px 0', height: '28px', boxSizing: 'border-box',
                 textAlign: 'center', color: '#0f172a', background: 'white',
                 fontFamily: 'inherit', fontSize: '.85rem' } };

      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
          <input {...inp} placeholder="TT"   maxLength={2} value={dd}   style={{ ...inp.style, width: 36 }} onChange={e => setP(2, e.target.value)} />
          <span style={{ color: '#cbd5e1' }}>.</span>
          <input {...inp} placeholder="MM"   maxLength={2} value={mm}   style={{ ...inp.style, width: 36 }} onChange={e => setP(1, e.target.value)} />
          <span style={{ color: '#cbd5e1' }}>.</span>
          <input {...inp} placeholder="JJJJ" maxLength={4} value={yyyy} style={{ ...inp.style, width: 52 }} onChange={e => setP(0, e.target.value)} />
          <button type="button" title="Kalender öffnen"
                  onClick={() => hiddenRef.current?.showPicker()}
                  style={{ padding: '3px 7px', borderRadius: 6, border: '1px solid #e2e8f0',
                           background: 'white', cursor: 'pointer', fontSize: 15, lineHeight: 1 }}>
            📅
          </button>
          <input ref={hiddenRef} type="date" value={value} onChange={onChange}
                 style={{ position: 'absolute', opacity: 0, pointerEvents: 'none', width: 1, height: 1 }} />
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [method,           setMethod]           = useState('lmp');
      const [lmp,              setLmp]              = useState('');
      const [cycleLength,      setCycleLength]      = useState(28);
      const [usEdd,            setUsEdd]            = useState('');
      const [usWeek,           setUsWeek]           = useState(12);
      const [transferDate,     setTransferDate]     = useState('');
      const [embryoAge,        setEmbryoAge]        = useState(5);
      const [parity,           setParity]           = useState(0);
      const [priorPTB,         setPriorPTB]         = useState(false);
      const [height,           setHeight]           = useState(168);
      const [bmi,              setBmi]              = useState(22);
      const [ethnicity,        setEthnicity]        = useState('none');
      const [fetalSex,         setFetalSex]         = useState('?');
      const [conceptionMethod, setConceptionMethod] = useState('natural');
      const [tooltip,          setTooltip]          = useState(null);
      const [chartMode,        setChartMode]        = useState('pdf');
      const [distType,         setDistType]         = useState('skew');
      const svgRef = useRef(null);

      const model = useMemo(() => computeModel({
        method, lmp, cycleLength, usEdd, usWeek, transferDate, embryoAge,
        parity, priorPTB, height, bmi, ethnicity, fetalSex, conceptionMethod, distType,
      }), [method, lmp, cycleLength, usEdd, usWeek, transferDate, embryoAge,
           parity, priorPTB, height, bmi, ethnicity, fetalSex, conceptionMethod, distType]);

      function handleMouseMove(e) {
        if (!svgRef.current || !model) return;
        const rect = svgRef.current.getBoundingClientRect();
        const svgX = (e.clientX - rect.left) * (W / rect.width);
        const rawD = (svgX - ML) / plotW * 70 - 42;
        const d    = Math.max(-42, Math.min(28, Math.round(rawD)));
        const pt   = model.chartData.find(p => p.d === d);
        if (pt) setTooltip(pt);
      }

      const usAcc = usWeek <= 13 ? '✓✓ sehr genau' : usWeek <= 20 ? '✓ genau' : '△ eingeschränkt';

      return (
        <div className="gt-wrap">
        <div className="gt-inner">
<div style={{ background: 'white', borderRadius: 12, border: '1px solid #e2e8f0', padding: '18px 24px', marginBottom: 16 }}>
            <h1 className="gt-h1">Geburtstermin-Verteilung</h1>
            <p className="gt-sub-head">Wahrscheinlichkeitsverteilung des Geburtstermins</p>

            {/* Method tabs */}
            <div className="gt-method-tabs" style={{ marginBottom: 0 }}>
              {[['lmp','LMP'],['us','Ultraschall'],['ivf','IVF / ET']].map(([m, lbl]) => (
                <button key={m} onClick={() => setMethod(m)} className={method === m ? 'active' : ''}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          <div className="gt-grid">

            {/* ── INPUT PANEL ──────────────────────────────────────── */}
            <div className="gt-panel">
              {/* Method-specific inputs */}
              {method === 'lmp' && (<>
                <div className="gt-ig">
                  <label>Erster Tag letzte Periode (LMP)</label>
                  <DateInput value={lmp} onChange={e => setLmp(e.target.value)} />
                </div>
                <div className="gt-ig">
                  <label>Zykluslänge: <strong>{cycleLength} Tage</strong></label>
                  <div className="gt-slider-row">
                    <span className="bound">21</span>
                    <input type="range" min={21} max={40} value={cycleLength}
                           onChange={e => setCycleLength(+e.target.value)} />
                    <span className="bound r">40</span>
                  </div>
                </div>
              </>)}

              {method === 'us' && (<>
                <div className="gt-ig">
                  <label>ET laut Ultraschall</label>
                  <DateInput value={usEdd} onChange={e => setUsEdd(e.target.value)} />
                </div>
                <div className="gt-ig">
                  <label>SSW des Ultraschalls: <strong>{usWeek}</strong> — {usAcc}</label>
                  <div className="gt-slider-row">
                    <span className="bound">7</span>
                    <input type="range" min={7} max={35} value={usWeek}
                           onChange={e => setUsWeek(+e.target.value)} />
                    <span className="bound r">35</span>
                  </div>
                </div>
              </>)}

              {method === 'ivf' && (<>
                <div className="gt-ig">
                  <label>Transfer-Datum</label>
                  <DateInput value={transferDate} onChange={e => setTransferDate(e.target.value)} />
                </div>
                <div className="gt-ig">
                  <label>Embryo-Alter bei Transfer</label>
                  <TG options={[{value:3,label:'Tag 3'},{value:5,label:'Tag 5'},{value:6,label:'Tag 6'}]}
                      value={embryoAge} onChange={setEmbryoAge} />
                </div>
              </>)}

              <div className="gt-sec">Geburtsverlauf</div>

              <div className="gt-ig">
                <label>Parität (Anzahl vorheriger Geburten)</label>
                <TG options={[{value:0,label:'0'},{value:1,label:'1'},{value:2,label:'≥ 2'}]}
                    value={parity} onChange={setParity} />
              </div>

              <div className="gt-ig">
                <label>Frühere Frühgeburt (&lt; 37w)</label>
                <TG options={[{value:false,label:'Nein'},{value:true,label:'Ja'}]}
                    value={priorPTB} onChange={setPriorPTB} />
              </div>

              <div className="gt-sec">Weitere Faktoren</div>

              <div>
                  <div className="gt-ig">
                    <label>Körpergröße: <strong>{height} cm</strong></label>
                    <div className="gt-slider-row">
                      <span className="bound">145</span>
                      <input type="range" min={145} max={195} value={height}
                             onChange={e => setHeight(+e.target.value)} />
                      <span className="bound r">195</span>
                    </div>
                  </div>
                  <div className="gt-ig">
                    <label>BMI: <strong>{bmi}</strong></label>
                    <div className="gt-slider-row">
                      <span className="bound">16</span>
                      <input type="range" min={16} max={45} value={bmi}
                             onChange={e => setBmi(+e.target.value)} />
                      <span className="bound r">45</span>
                    </div>
                  </div>
                  <div className="gt-ig">
                    <label>Ethnizität</label>
                    <select value={ethnicity} onChange={e => setEthnicity(e.target.value)}>
                      <option value="none">nicht angegeben</option>
                      <option value="white">weiß-europäisch</option>
                      <option value="black">schwarz-afrikanisch</option>
                      <option value="asian">asiatisch</option>
                    </select>
                  </div>
                  <div className="gt-ig">
                    <label>Fetales Geschlecht</label>
                    <TG options={[{value:'?',label:'?'},{value:'male',label:'♂'},{value:'female',label:'♀'}]}
                        value={fetalSex} onChange={setFetalSex} />
                  </div>
                  {method !== 'ivf' && (
                    <div className="gt-ig">
                      <label>Konzeptionsmethode</label>
                      <TG options={[{value:'natural',label:'natürlich'},{value:'ivf',label:'IVF / ICSI'}]}
                          value={conceptionMethod} onChange={setConceptionMethod} />
                    </div>
                  )}
                </div>
            </div>

            {/* ── RESULTS PANEL ────────────────────────────────────── */}
            <div className="gt-panel">
              {!model ? (
                <p style={{ color: '#94a3b8', paddingTop: '.5rem' }}>
                  ← Datum eingeben, um die Verteilung zu berechnen.
                </p>
              ) : (<>

                {/* Stats Cards */}
                <div className="gt-stats">
                  <div className="gt-card">
                    <div className="gt-label">Modell-ET (Median)</div>
                    <div className="gt-val">{fmtFull(model.eddModel)}</div>
                    <div className="gt-sub">
                      Ø {fmtShort(addDays(model.eddModel, model.meanDays))}
                      {' · '}Mode {fmtShort(addDays(model.eddModel, model.modeDays))}
                    </div>
                    <div className="gt-sub">σ = {model.sigma.toFixed(1)} Tage</div>
                  </div>

                  <div className="gt-card">
                    <div className="gt-label">80 %-Fenster</div>
                    <div className="gt-val" style={{ fontSize: '.9rem' }}>
                      {fmtShort(model.percentiles[1].date)} – {fmtShort(model.percentiles[5].date)}
                    </div>
                    <div className="gt-sub">{model.windowDays} Tage breit (P10 – P90)</div>
                  </div>

                  <div className="gt-card">
                    <div className="gt-label">Naegele-ET</div>
                    {model.naegeleEdd ? (<>
                      <div className="gt-val" style={{ fontWeight: 400 }}>{fmtFull(model.naegeleEdd)}</div>
                      <div className="gt-sub">
                        {model.modelVsNaegale === 0
                          ? 'identisch'
                          : model.modelVsNaegale > 0
                            ? `Modell +${model.modelVsNaegale}d später`
                            : `Modell ${model.modelVsNaegale}d früher`}
                      </div>
                      <div className="gt-sub" style={{ fontSize: '.66rem' }}>LMP + 280d, 28d-Zyklus</div>
                    </>) : (<>
                      <div className="gt-val" style={{ color: 'var(--pico-primary)' }}>exakt ✓✓</div>
                      <div className="gt-sub">Konzeptionsdatum bekannt</div>
                    </>)}
                  </div>
                </div>

                {/* Chart */}
                <div className="gt-chart-wrap">
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 8 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: '.73rem', color: '#64748b', minWidth: 72 }}>Verteilung:</span>
                      <div className="gt-tg">
                        {[['normal','Normalverteilung'],['skew','Skew-Normal (empirisch)']].map(([v, l]) => (
                          <button key={v} onClick={() => setDistType(v)}
                                  className={distType === v ? 'active' : ''}>
                            {l}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontSize: '.73rem', color: '#64748b', minWidth: 72 }}>Ansicht:</span>
                      <div className="gt-tg" style={{ maxWidth: 240 }}>
                        {[['pdf','Dichte'],['cdf','Kumulativ'],['both','Beide']].map(([v, l]) => (
                          <button key={v} onClick={() => setChartMode(v)}
                                  className={chartMode === v ? 'active' : ''}>
                            {l}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                  <Chart model={model} tooltip={tooltip} chartMode={chartMode}
                         onMouseMove={handleMouseMove} onMouseLeave={() => setTooltip(null)}
                         svgRef={svgRef} />
                </div>

                {/* Percentile Table */}
                <table className="gt-pct">
                  <thead>
                    <tr>
                      {model.percentiles.map(p => (
                        <th key={p.p} className={p.p === 0.5 ? 'p50' : ''}>{p.label}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="">
                      {model.percentiles.map(p => (
                        <td key={p.p} className={p.p === 0.5 ? 'p50' : ''}>{fmtShort(p.date)}</td>
                      ))}
                    </tr>
                    <tr>
                      {model.percentiles.map(p => (
                        <td key={p.p} className={p.p === 0.5 ? 'p50' : ''}
                            style={{ color: 'var(--pico-muted-color)', fontSize: '.68rem' }}>
                          {p.days >= 0 ? `+${Math.round(p.days)}d` : `${Math.round(p.days)}d`}
                        </td>
                      ))}
                    </tr>
                  </tbody>
                </table>

                {/* Risk Cards */}
                <div className="gt-risks">
                  <div className={`gt-card ${model.pPreterm > 0.15 ? 'risk-red' : model.pPreterm > 0.06 ? 'risk-yellow' : ''}`}>
                    <div className="gt-label">P(Frühgeburt &lt; 37w)</div>
                    <div className="gt-val" style={{
                      fontWeight: 400,
                      color: model.pPreterm > 0.15 ? 'rgba(220,90,90,1)'
                           : model.pPreterm > 0.06 ? 'rgba(210,160,50,1)' : '#1f2937'
                    }}>
                      {(model.pPreterm * 100).toFixed(1)} %
                    </div>
                    {model.pPreterm === 0.30 && (
                      <div className="gt-sub">Rezidivrisiko (Meta-Analyse)</div>
                    )}
                  </div>

                  <div className="gt-card">
                    <div className="gt-label">P(Geburt ≤ ET + 7d)</div>
                    <div className="gt-val" style={{fontWeight:400}}>{(model.pByEdd7 * 100).toFixed(1)} %</div>
                    <div className="gt-sub">bis SSW 41+0</div>
                  </div>

                  <div className={`gt-card ${model.pPostterm > 0.10 ? 'risk-yellow' : ''}`}>
                    <div className="gt-label">P(≥ 42w Post-term)</div>
                    <div className="gt-val" style={{
                      fontWeight: 400,
                      color: model.pPostterm > 0.10 ? 'rgba(210,160,50,1)' : '#1f2937'
                    }}>
                      {(model.pPostterm * 100).toFixed(1)} %
                    </div>
                    <div className="gt-sub">ab SSW 42+0</div>
                  </div>
                </div>

                {/* Caveats */}
                <div className="gt-caveat">
                  <strong>Modellgrenzen</strong>
                  <ol>
                    <li><strong>Verteilungsform (Normalverteilung):</strong> Vereinfachung. Die echte Verteilung ist linksschief – längerer Frühgeburts-Tail, kürzerer Post-term-Tail.</li>
                    <li><strong>Verteilungsform (Skew-Normal, empirisch):</strong> Der Shape-Parameter α = −2 wurde aus den Kaplan-Meier-Quantilen von Smith 2001 (n = 1 514, nur spontaner Geburtsbeginn, zensierte Einleitungen) gefittet. Die Schiefe gilt als konstant über alle Subgruppen; nur Median und Varianz werden individuell angepasst. Frühgeburts-Komponente (Mischmodell) und tagesweise Rohdaten stünden für ein vollständigeres Fit zur Verfügung, sind aber nicht in publizierten Tabellen zugänglich.</li>
                    <li><strong>Klinische Interventionen:</strong> Einleitungen ab 41+0 SSW schneiden den rechten Tail in der Realität ab. Beide Kurven zeigen das unintervenierte biologische Modell.</li>
                    <li><strong>Prior PTB:</strong> Das 30 %-Rezidivrisiko ist ein Populationsmittelwert (Meta-Analyse). Individuelle Risiken variieren nach Gestationsalter, Mechanismus (PPROM vs. PTL) und Anzahl vorangegangener PTBs.</li>
                    <li><strong>Ethnizitäts-Effekte</strong> spiegeln strukturelle Faktoren wider (Stress, Versorgung), keine biologische Konstante.</li>
                    <li><strong>LMP-Methode</strong> setzt korrektes Erinnern des Datums und einen regelmäßigen Zyklus voraus.</li>
                  </ol>
                </div>
                <div className="gt-sources">
                  Quellen: Smith 2001 (n = 1 514, Hum Reprod) · Mongelli 1996 (n ≈ 17 000, AJOG) ·
                  Olsen &amp; Clausen 1998 (Naegele-Korrektur +3,3 d) · Myklestad 2013 / HUNT (n ≈ 40 000, Körpergröße) ·
                  Patel 2004 (n = 122 000, IJE, Ethnizität) · Denison 2008 (BJOG, n=186.087): +0.12d pro BMI-Einheit (linear, Baseline BMI 22) ·
                  Divon 2002 (n = 656 000, AJOG, Geschlecht) · Phillips 2017 (BMJ Open, Meta-Analyse PTB-Rezidiv) ·
                  Wang 2000 (Hum Reprod, IVF) · ACOG Committee Opinion 700 (2017).
                </div>

              </>)}
            </div>
          </div>
        </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
