      },
      {
        id: 'vitamink', type: 'single',
        label: { de: 'Vitamin-K-Gabe', en: 'Vitamin K' },
        options: [
          { id: 'vitamink.im', label: { de: 'Intramuskulär (i.m.)', en: 'Intramuscular (i.m.)' }, evidence: 'tbd' },
          { id: 'vitamink.oral', label: { de: 'Oral', en: 'Oral' }, evidence: 'tbd' },
          { id: 'vitamink.refuse', label: { de: 'Ablehnen', en: 'Decline' }, evidence: 'tbd' },
        ],
      },
      {
        id: 'placenta', type: 'single',
        label: { de: 'Plazenta (3. Phase)', en: 'Placenta (3rd stage)' },
        options: [
          { id: 'placenta.active', label: { de: 'Aktives Management', en: 'Active management' }, evidence: 'tbd' },
          { id: 'placenta.physiological', label: { de: 'Physiologisch', en: 'Physiological' }, evidence: 'tbd' },
        ],
      },
      {
        id: 'support', type: 'multi',
        label: { de: 'Begleitpersonen', en: 'Support persons' },
        options: [
          { id: 'support.partner', label: { de: 'Partner:in', en: 'Partner' } },
          { id: 'support.doula', label: { de: 'Doula', en: 'Doula' }, evidence: 'moderate',
            effect: { de: 'Kontinuierliche Unterstützung: tendenziell kürzere Geburt, weniger Interventionen.', en: 'Continuous support: tendency toward shorter labour, fewer interventions.' },
            detail: { de: 'Kontinuierliche 1:1-Unterstützung während der Geburt ist mit kürzerer Geburtsdauer, weniger Schmerzmittelbedarf und weniger operativen Geburten assoziiert.',
                      en: 'Continuous one-to-one support during labour is associated with shorter labour, less analgesia use and fewer operative births.',
                      source: 'Bohren et al., Cochrane' } },
          { id: 'support.family', label: { de: 'Familie', en: 'Family' } },
        ],
      },
    ];

    // ─── CONSTRAINTS ───────────────────────────────────────────────────────────
    const CONSTRAINTS = [
      { type: 'hard', if: 'place.home', blocks: 'pain.pda',
        reason: { de: 'PDA ist außerklinisch nicht verfügbar (Anästhesie-Team / Monitoring nötig).', en: 'Epidural is not available outside a clinic (needs anaesthesia team / monitoring).' } },
      { type: 'hard', if: 'place.geburtshaus', blocks: 'pain.pda',
        reason: { de: 'PDA ist im Geburtshaus nicht verfügbar (Anästhesie-Team / Monitoring nötig).', en: 'Epidural is not available in a birth centre (needs anaesthesia team / monitoring).' } },
      { type: 'hard', if: 'water.delivery', blocks: 'pain.pda',
        reason: { de: 'Mit PDA wird man aus Sicherheitsgründen aus der Wanne geholt (kein Stehen/Bewegen).', en: 'With an epidural you are taken out of the pool for safety (no standing/moving).' } },
      { type: 'hard', if: 'place.home', blocks: 'monitoring.continuous',
        reason: { de: 'Außerklinisch wird standardmäßig intermittierend auskultiert; Dauer-CTG ist klinisch.', en: 'Out of hospital, intermittent auscultation is standard; continuous CTG is clinical.' } },
      { type: 'hard', if: 'place.geburtshaus', blocks: 'monitoring.continuous',
        reason: { de: 'Im Geburtshaus wird intermittierend auskultiert; Dauer-CTG ist klinisch.', en: 'In a birth centre intermittent auscultation is used; continuous CTG is clinical.' } },
      { type: 'hard', if: 'water.delivery', blocks: 'monitoring.continuous',
        reason: { de: 'Konventionelles Dauer-CTG ist im Wasser nicht möglich.', en: 'Conventional continuous CTG is not possible in water.' } },
      { type: 'hard', if: 'place.home', blocks: 'induction.augmentation',
        reason: { de: 'Augmentation mit Oxytocin erfordert klinisches Monitoring.', en: 'Augmentation with oxytocin requires clinical monitoring.' } },
      { type: 'hard', if: 'place.geburtshaus', blocks: 'induction.augmentation',
        reason: { de: 'Augmentation mit Oxytocin erfordert klinisches Monitoring.', en: 'Augmentation with oxytocin requires clinical monitoring.' } },
      { type: 'hard', if: 'water.delivery', blocks: 'induction.augmentation',
        reason: { de: 'Oxytocin-Augmentation erfordert Dauer-CTG und ist in der Wanne nicht praktikabel.', en: 'Oxytocin augmentation requires continuous CTG and is not practicable in the pool.' } },
      { type: 'soft', if: 'pain.pda', blocks: 'position.upright',
        reason: { de: 'Motorblock kann aufrechte Positionen einschränken — Walking-Epidural ggf. möglich.', en: 'Motor block can limit upright positions — a walking epidural may be possible.' } },
      { type: 'soft', if: 'pain.pda', blocks: 'position.stool',
        reason: { de: 'Motorblock kann den Gebärhocker einschränken — Walking-Epidural ggf. möglich.', en: 'Motor block can limit use of a birth stool — a walking epidural may be possible.' } },
      { type: 'soft', if: 'pain.pda', blocks: 'position.free',
        reason: { de: 'Freie Positionswahl ist unter PDA eingeschränkt — Walking-Epidural ggf. möglich.', en: 'Free positioning is limited under an epidural — a walking epidural may be possible.' } },
    ];

    // ─── LOOKUPS ───────────────────────────────────────────────────────────────
    const OPT = {};
    const OPT_AXIS = {};
    AXES.forEach(ax => ax.options.forEach(o => { OPT[o.id] = o; OPT_AXIS[o.id] = ax; }));

    const emptySelections = () => {
      const s = {};
      AXES.forEach(ax => { s[ax.id] = ax.type === 'multi' ? [] : null; });
      return s;
    };
    const activeIds = sel => {
      const ids = [];
      AXES.forEach(ax => {
        const v = sel[ax.id];
        if (ax.type === 'multi') (v || []).forEach(x => ids.push(x));
        else if (v) ids.push(v);
      });
      return ids;
    };
    const removeOpt = (sel, optId) => {
      const ax = OPT_AXIS[optId];
      if (ax.type === 'multi') sel[ax.id] = (sel[ax.id] || []).filter(x => x !== optId);
      else if (sel[ax.id] === optId) sel[ax.id] = null;
    };

    // Resolve hard-constraint conflicts; `keep` is the just-clicked option (wins ties).
    function resolve(sel, keep) {
      const toasts = [];
      for (let i = 0; i < 30; i++) {
        const active = activeIds(sel);
        const viol = CONSTRAINTS.find(c => c.type === 'hard'
          && active.includes(c.if) && active.includes(c.blocks));
        if (!viol) break;
        const dropId = viol.blocks === keep ? viol.if : viol.blocks;
        removeOpt(sel, dropId);
        toasts.push({ optId: dropId, reason: viol.reason });
      }
      return toasts;
    }

    // ─── STRINGS (chrome) ──────────────────────────────────────────────────────
    const S = {
      de: {
        h1: 'Geburtsentscheidungs-Explorer',
        sub: 'Wähle deine Präferenzen — inkompatible Optionen werden live gesperrt und begründet.',
        disc: '<strong>Vorbereitungshilfe, kein medizinischer Rat.</strong> Geburten sind dynamisch; medizinische Umstände überschreiben jede Präferenz. Evidenzangaben sind vereinfachte Zusammenfassungen publizierter Studien und ersetzen keine individuelle Beratung. Ein Geburtsplan ist „an approach to labor, rather than a term for a specific outcome" (Wagner & Gunning, 2006).',
        parity: 'Parität', primi: 'Erstgebärende', multi: 'Mehrgebärende',
        legendTitle: 'Evidenz',
        multiHint: 'Mehrfachauswahl',
        blockedBy: 'Gesperrt:',
        evidence: 'Evidenz:',
        srcPrefix: 'Quelle: ',
        toastDeact: 'deaktiviert',
        outTitle: 'Generierter Geburtsplan',
        outHint: 'Gesprächsvorlage für Hebamme/Ärzt:in — kopieren und anpassen.',
        outEmpty: 'Noch keine Auswahl getroffen. Wähle oben Optionen aus.',
        copy: 'Als Text kopieren', copied: '✓ Kopiert',
        statusOk: '✓ Konsistenter Plan — alle gewählten Optionen sind miteinander vereinbar.',
        statusEmpty: 'Wähle Optionen, um einen Plan zu erzeugen.',
        qTitle: 'Offene Fragen fürs Gespräch',
        qWalking: 'Bewegungsfreiheit unter PDA klären — ist eine Walking-Epidural (Niedrigdosis) möglich?',
        qTransfer: 'Verlegungskriterien und Entfernung/Fahrzeit zur nächsten Klinik besprechen.',
        qWater: 'Ablauf beim Verlassen der Wanne im Notfall mit der Hebamme durchgehen.',
        qVitk: 'Vitamin-K-Prophylaxe: Risiko von Vitamin-K-Mangelblutungen (VKDB) mit dem Kinderarzt besprechen.',
        qTbd: tbd => `Zu folgenden Punkten ist die Studienlage hier noch nicht aufbereitet (v2) — aktiv erfragen: ${tbd}.`,
        planIntro: 'Ich wünsche mir, sofern keine medizinische Indikation dagegenspricht:',
        planDisc: 'Mir ist bewusst, dass medizinische Umstände jede Präferenz überschreiben können.',
        caveatTitle: 'Modell- & Inhaltsgrenzen',
        caveats: [
          '<strong>Keine Diagnostik, keine Empfehlung.</strong> Das Tool bildet Präferenzen und ihre organisatorischen/physischen Abhängigkeiten ab — es bewertet nicht, was für dich richtig ist.',
          '<strong>Constraints</strong> sind organisatorisch/physisch begründete Ausschlüsse (z. B. PDA nur in der Klinik), keine Wertung der Optionen.',
          '<strong>„In Prüfung" (grau):</strong> Für spätes Abnabeln, Dammschnitt, Gebärposition, Vitamin K und Plazenta-Management ist die Evidenz hier noch nicht aufbereitet. Bewusst keine Zahlen statt geratener Werte.',
          '<strong>Parität</strong> wirkt nur auf die Geburtsort-Bewertung (Erst- vs. Mehrgebärende), nicht auf die übrigen Achsen.',
          '<strong>Evidenz-Ampel</strong> fasst Studienqualität grob zusammen; „umstritten" markiert echte Fachkontroversen mit gegenläufigen Studien.',
        ],
        sources: 'Quellen: Anim-Somuah et al., Cochrane 2011 (PDA, ~10.000) · Modern-LEA Review, AJOG 2023 (Niedrigdosis-PDA) · Cluett & Burns, Cochrane 2018 (Wasser) · McKinney et al., AJOG 2024 · Birthplace (UK) · DGGG/BVF-Stellungnahme 2011 · Bovbjerg & Cheyney 2025 (Oregon State) · Alfirevic et al., Cochrane (EFM) · Bohren et al., Cochrane (kontinuierliche Unterstützung) · Moore et al., Cochrane (Haut-an-Haut) · Wagner & Gunning 2006 (Geburtsplan-Framing).',
        reset: 'Zurücksetzen',
      },
      en: {
        h1: 'Birth Decisions Explorer',
        sub: 'Pick your preferences — incompatible options are locked and explained live.',
        disc: '<strong>A preparation aid, not medical advice.</strong> Births are dynamic; medical circumstances override any preference. Evidence notes are simplified summaries of published studies and do not replace individual counselling. A birth plan is “an approach to labor, rather than a term for a specific outcome” (Wagner & Gunning, 2006).',
        parity: 'Parity', primi: 'First birth', multi: 'Multiparous',
        legendTitle: 'Evidence',
        multiHint: 'multiple choice',
        blockedBy: 'Locked:',
        evidence: 'Evidence:',
        srcPrefix: 'Source: ',
        toastDeact: 'deactivated',
        outTitle: 'Generated birth plan',
        outHint: 'A talking-point draft for your midwife/doctor — copy and adapt.',
        outEmpty: 'No selection yet. Pick options above.',
        copy: 'Copy as text', copied: '✓ Copied',
        statusOk: '✓ Consistent plan — all selected options are compatible with each other.',
        statusEmpty: 'Select options to generate a plan.',
        qTitle: 'Open questions for the conversation',
        qWalking: 'Clarify freedom of movement under an epidural — is a low-dose walking epidural possible?',
        qTransfer: 'Discuss transfer criteria and distance/travel time to the nearest clinic.',
        qWater: 'Go through the procedure for leaving the pool in an emergency with your midwife.',
        qVitk: 'Vitamin K prophylaxis: discuss the risk of vitamin K deficiency bleeding (VKDB) with the paediatrician.',
        qTbd: tbd => `The evidence for these points is not yet compiled here (v2) — ask about them directly: ${tbd}.`,
        planIntro: 'Unless a medical indication argues against it, I would like:',
        planDisc: 'I understand that medical circumstances may override any preference.',
        caveatTitle: 'Model & content limitations',
        caveats: [
          '<strong>No diagnosis, no recommendation.</strong> The tool maps preferences and their organisational/physical dependencies — it does not judge what is right for you.',
          '<strong>Constraints</strong> are organisationally/physically grounded exclusions (e.g. epidural only in a clinic), not a judgement of the options.',
          '<strong>“Under review” (grey):</strong> For delayed cord clamping, episiotomy, birthing position, vitamin K and placenta management the evidence is not yet compiled here. Deliberately no numbers rather than guessed values.',
          '<strong>Parity</strong> only affects the place-of-birth assessment (first vs. subsequent birth), not the other axes.',
          '<strong>The evidence rating</strong> summarises study quality coarsely; “contested” marks genuine professional controversies with conflicting studies.',
        ],
        sources: 'Sources: Anim-Somuah et al., Cochrane 2011 (epidural, ~10,000) · Modern-LEA Review, AJOG 2023 (low-dose epidural) · Cluett & Burns, Cochrane 2018 (water) · McKinney et al., AJOG 2024 · Birthplace (UK) · DGGG/BVF statement 2011 · Bovbjerg & Cheyney 2025 (Oregon State) · Alfirevic et al., Cochrane (EFM) · Bohren et al., Cochrane (continuous support) · Moore et al., Cochrane (skin-to-skin) · Wagner & Gunning 2006 (birth-plan framing).',
        reset: 'Reset',
      },
    };
    const t = S[lang] || S.de;

    // ─── COMPONENTS ────────────────────────────────────────────────────────────
    function Dot({ level }) {
      if (!level) return null;
      return <span className="bd-dot" style={{ background: EVI[level].color }}
                   title={`${t.evidence} ${tr(EVI[level].label)}`} />;
    }

    function Legend() {
      return (
        <div className="bd-legend">
          <span className="lbl" style={{ textTransform: 'uppercase', letterSpacing: '.05em' }}>{t.legendTitle}:</span>
          {['high', 'moderate', 'low', 'contested', 'tbd'].map(k => (
            <span className="item" key={k}>
              <span className="bd-dot" style={{ background: EVI[k].color }} />{tr(EVI[k].label)}
            </span>
          ))}
        </div>
      );
    }

    function OptionCard({ opt, axis, selected, blocked, soft, parity, expanded, onToggle, onInfo }) {
      const hardReason = blocked && blocked.reason;
      const softReason = soft && soft.reason;
      const cls = ['bd-opt'];
      if (selected) cls.push('sel');
      if (soft) cls.push('soft');
      if (hardReason) cls.push('blocked');
      const hasDetail = !!opt.detail;
      const parNote = axis.id === 'place' && opt.parityNote ? opt.parityNote[parity] : null;
      return (
        <div className={cls.join(' ')}
             onClick={() => { if (!hardReason) onToggle(axis, opt.id); }}>
          <div className="bd-opt-top">
            {hardReason && <span className="bd-lock" title={tr(hardReason)}>🔒</span>}
            <Dot level={opt.evidence} />
            <span className="bd-opt-label">{tr(opt.label)}</span>
            {hasDetail && (
              <button className="bd-info" title="Details"
                      onClick={e => { e.stopPropagation(); onInfo(opt.id); }}>ⓘ</button>
            )}
          </div>
          {opt.effect && <div className="bd-opt-effect">{tr(opt.effect)}</div>}
          {parNote && <div className="bd-parnote">{tr(parNote)}</div>}
          {hardReason && <div className="bd-warn"><strong>{t.blockedBy}</strong> {tr(hardReason)}</div>}
          {softReason && !hardReason && <div className="bd-warn">⚠ {tr(softReason)}</div>}
          {hasDetail && expanded && (
            <div className="bd-detail" onClick={e => e.stopPropagation()}>
              {tr(opt.detail)}
              {opt.detail.source && <span className="src">{t.srcPrefix}{opt.detail.source}</span>}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [sel, setSel] = useState(emptySelections);
      const [parity, setParity] = useState('multi');
      const [expanded, setExpanded] = useState({});
      const [toasts, setToasts] = useState([]);
      const [copied, setCopied] = useState(false);
      const toastTimer = useRef(null);

      // derived constraint maps from current selections.
      // Hard constraints are mutual incompatibilities → grey out both directions:
      // if either endpoint is active, the other endpoint is locked (unless it too is active).
      const { hardMap, softMap } = useMemo(() => {
        const activeSet = new Set(activeIds(sel));
        const hardMap = {}, softMap = {};
        CONSTRAINTS.forEach(c => {
          if (c.type === 'hard') {
            if (activeSet.has(c.if) && !activeSet.has(c.blocks) && !hardMap[c.blocks]) hardMap[c.blocks] = c;
            if (activeSet.has(c.blocks) && !activeSet.has(c.if) && !hardMap[c.if]) hardMap[c.if] = c;
          } else {
            if (activeSet.has(c.if) && !softMap[c.blocks]) softMap[c.blocks] = c;
          }
        });
        return { hardMap, softMap };
      }, [sel]);

      function pushToasts(list) {
        if (!list.length) return;
        const stamped = list.map((x, i) => ({ ...x, key: Date.now() + '-' + i }));
        setToasts(stamped);
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToasts([]), 4200);
      }

      function onToggle(axis, optId) {
        setCopied(false);
        const next = {};
        AXES.forEach(ax => { next[ax.id] = ax.type === 'multi' ? [...(sel[ax.id] || [])] : sel[ax.id]; });
        // toggle
        if (axis.type === 'multi') {
          const arr = next[axis.id];
          if (arr.includes(optId)) {
            next[axis.id] = arr.filter(x => x !== optId);
          } else if (OPT[optId].exclusive) {
            next[axis.id] = [optId];                                  // "none" replaces everything
          } else {
            next[axis.id] = [...arr.filter(x => !OPT[x].exclusive), optId]; // adding a real option drops "none"
          }
        } else {
          next[axis.id] = next[axis.id] === optId ? null : optId;
        }
        const selecting = axis.type === 'multi'
          ? next[axis.id].includes(optId) : next[axis.id] === optId;
        const dropped = resolve(next, selecting ? optId : null);
        setSel(next);
        pushToasts(dropped);
      }

      function onInfo(optId) {
        setExpanded(e => ({ ...e, [optId]: !e[optId] }));
      }

      function reset() {
        setSel(emptySelections());
        setToasts([]); setCopied(false);
      }

      // plan rows
      const planRows = AXES.map(ax => {
        const v = sel[ax.id];
        const ids = ax.type === 'multi' ? (v || []) : (v ? [v] : []);
        if (!ids.length) return null;
        return { axis: ax, labels: ids.map(id => tr(OPT[id].label)) };
      }).filter(Boolean);

      const hasSelection = planRows.length > 0;

      // open questions
      const active = activeIds(sel);
      const questions = [];
      const pdaPos = active.includes('pain.pda') &&
        ['position.upright', 'position.stool', 'position.free', 'position.allfours'].some(p => active.includes(p));
      if (pdaPos) questions.push(t.qWalking);
      if (active.includes('place.home') || active.includes('place.geburtshaus')) questions.push(t.qTransfer);
      if (active.includes('water.delivery')) questions.push(t.qWater);
      if (active.includes('vitamink.refuse')) questions.push(t.qVitk);
      const tbdSelected = planRows
        .filter(r => r.axis.options.some(o => active.includes(o.id) && o.evidence === 'tbd'))
        .map(r => tr(r.axis.label));
      if (tbdSelected.length) questions.push(t.qTbd(tbdSelected.join(', ')));

      function copyPlan() {
        const lines = [t.planIntro, ''];
        planRows.forEach(r => lines.push(`• ${tr(r.axis.label)}: ${r.labels.join(', ')}`));
        lines.push('', t.planDisc);
        if (questions.length) {
          lines.push('', t.qTitle + ':');
          questions.forEach(q => lines.push(`- ${q}`));
        }
        const txt = lines.join('\n');
        navigator.clipboard?.writeText(txt).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      return (
        <div className="bd-wrap">
          <div className="bd-inner">
            <div className="bd-head">
              <h1 className="bd-h1">{t.h1}</h1>
              <p className="bd-sub-head">{t.sub}</p>
              <div className="bd-disc" dangerouslySetInnerHTML={{ __html: t.disc }} />
              <div className="bd-toolbar">
                <div>
                  <span className="lbl">{t.parity}</span>
                  <div className="bd-tg">
                    {[['primi', t.primi], ['multi', t.multi]].map(([v, l]) => (
                      <button key={v} className={parity === v ? 'active' : ''}
                              onClick={() => setParity(v)}>{l}</button>
                    ))}
                  </div>
                </div>
                <Legend />
                <div style={{ marginLeft: 'auto' }}>
                  <div className="bd-tg"><button onClick={reset}>{t.reset}</button></div>
                </div>
              </div>
            </div>

            {AXES.map(ax => (
              <div className="bd-axis" key={ax.id}>
                <div className="bd-axis-head">
                  <span className="bd-axis-title">{tr(ax.label)}</span>
                  {ax.type === 'multi' && <span className="bd-axis-multi">{t.multiHint}</span>}
                </div>
                <div className="bd-opts">
                  {ax.options.map(opt => {
                    const isSel = ax.type === 'multi'
                      ? (sel[ax.id] || []).includes(opt.id) : sel[ax.id] === opt.id;
                    return (
                      <OptionCard key={opt.id} opt={opt} axis={ax}
                        selected={isSel}
                        blocked={hardMap[opt.id]}
                        soft={softMap[opt.id]}
                        parity={parity}
                        expanded={expanded[opt.id]}
                        onToggle={onToggle} onInfo={onInfo} />
                    );
                  })}
                </div>
              </div>
            ))}

            <div className="bd-out">
              <h2>{t.outTitle}</h2>
              <p className="hint">{t.outHint}</p>
              {hasSelection ? (
                <>
                  <div className="bd-plan">
                    {planRows.map(r => (
                      <div className="bd-plan-row" key={r.axis.id}>
                        <span className="k">{tr(r.axis.label)}</span>
                        <span className="v">{r.labels.join(', ')}</span>
                      </div>
                    ))}
                  </div>
                  <button className="bd-copy" onClick={copyPlan}>{copied ? t.copied : t.copy}</button>
                  <div className="bd-status ok">{t.statusOk}</div>
                  {questions.length > 0 && (
                    <div className="bd-questions">
                      <div className="qt">{t.qTitle}</div>
                      <ul>{questions.map((q, i) => <li key={i}>{q}</li>)}</ul>
                    </div>
                  )}
                </>
              ) : (
                <p className="bd-plan-empty">{t.outEmpty}</p>
              )}
            </div>

            <div className="bd-caveat">
              <strong>{t.caveatTitle}</strong>
              <ol>{t.caveats.map((c, i) => <li key={i} dangerouslySetInnerHTML={{ __html: c }} />)}</ol>
              <div className="bd-sources">{t.sources}</div>
            </div>
          </div>

          {toasts.length > 0 && (
            <div className="bd-toasts">
              {toasts.map(to => (
                <div className="bd-toast" key={to.key}>
                  <strong>{tr(OPT[to.optId].label)}</strong> {t.toastDeact} — {tr(to.reason)}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
