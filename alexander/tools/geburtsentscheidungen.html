  <script type="text/babel">
    const { useState, useMemo, useRef } = React;
    const lang = localStorage.getItem('lang') || 'de';
    const tr = o => (o ? (o[lang] ?? o.de ?? '') : '');

    // ─── EVIDENCE LEVELS ───────────────────────────────────────────────────────
    const EVI = {
      high:      { label: { de: 'hoch', en: 'high' },           color: '#16a34a' },
      moderate:  { label: { de: 'moderat', en: 'moderate' },    color: '#d97706' },

      contested: { label: { de: 'umstritten', en: 'contested' },color: '#7c3aed' },
      tbd:       { label: { de: 'in Prüfung', en: 'under review' }, color: '#94a3b8' },
    };

    // ─── DATA: AXES + OPTIONS ──────────────────────────────────────────────────
    // Effect chips and details are backed by cited sources (see footer). evidence: 'tbd' = under review (currently unused after v2).
    const AXES = [
      {
        id: 'place', type: 'single',
        label: { de: 'Geburtsort', en: 'Place of birth' },
        options: [
          { id: 'place.clinic', label: { de: 'Klinik', en: 'Hospital' }, evidence: 'high',
            effect: { de: 'Volle Infrastruktur: PDA, Sectio, Neonatologie sofort verfügbar.', en: 'Full infrastructure: epidural, C-section, neonatology immediately available.' } },
          { id: 'place.belegkreisssaal', label: { de: 'Hebammen-Kreißsaal (Beleg)', en: 'Midwife-led unit (in clinic)' }, evidence: 'moderate',
            effect: { de: '1:1-Hebammenbetreuung, klinisches Backup im Haus.', en: '1:1 midwifery care, clinical backup in the same building.' } },
          { id: 'place.geburtshaus', label: { de: 'Geburtshaus', en: 'Birth centre' }, evidence: 'contested',
            effect: { de: 'Außerklinisch, hebammengeleitet; Verlegung bei Komplikationen.', en: 'Out-of-hospital, midwife-led; transfer if complications arise.' },
            parityNote: {
              primi: { de: 'Erste Geburt: erhöhte Verlegungsrate, weniger Sicherheitsdaten.', en: 'First birth: higher transfer rate, less safety data.' },
              multi: { de: 'Weitere Geburt, Niedrigrisiko: mehrere Metaanalysen zeigen vergleichbare Sicherheit.', en: 'Later birth, low-risk: several meta-analyses show comparable safety.' } },
            detail: { de: 'Bei weiteren Geburten mit Niedrigrisiko zeigen mehrere Metaanalysen vergleichbare Sicherheit zur Klinik. Eine US-Studie 2025 (>110.000 außerklinische Niedrigrisiko-Geburten) fand keinen Sicherheitsunterschied Hausgeburt vs. Geburtshaus. Bei der ersten Geburt: deutlich höhere Verlegungsrate.',
                      en: 'For low-risk later births several meta-analyses show comparable safety to hospital. A 2025 US study (>110,000 out-of-hospital low-risk births) found no safety difference between home and birth centre. First births: markedly higher transfer rate.',
                      source: 'Birthplace (UK) · DGGG/BVF 2011 · Bovbjerg & Cheyney 2025 (Oregon State)' } },
          { id: 'place.home', label: { de: 'Hausgeburt', en: 'Home birth' }, evidence: 'contested',
            effect: { de: 'Zuhause, hebammengeleitet; Verlegung bei Komplikationen.', en: 'At home, midwife-led; transfer if complications arise.' },
            parityNote: {
              primi: { de: 'Erste Geburt: ~45 % Verlegung; schwere kindl. Komplikationen 9,3 vs. 5,3 / 1.000 (Haus vs. Klinik).', en: 'First birth: ~45 % transfer; serious neonatal complications 9.3 vs. 5.3 / 1,000 (home vs. hospital).' },
              multi: { de: 'Weitere Geburt: ~12 % Verlegung; mehrere Metaanalysen → vergleichbare Sicherheit.', en: 'Later birth: ~12 % transfer; several meta-analyses → comparable safety.' } },
            detail: { de: 'Die UK-Birthplace-Studie: 45 % bei erster Geburt mit geplanter Hausgeburt verlegt, bei weiteren Geburten ~12 %. DGGG/BVF: schwere kindliche Komplikationen 9,3 vs. 5,3 pro 1.000 (Haus vs. Klinik). Gegenposition: Bovbjerg & Cheyney 2025 → kein Sicherheitsunterschied bei Niedrigrisiko. Ob erste oder weitere Geburt ist der entscheidende Faktor.',
                      en: 'UK Birthplace study: 45 % of first births with a planned home birth were transferred, later births ~12 %. DGGG/BVF: serious neonatal complications 9.3 vs. 5.3 per 1,000 (home vs. hospital). Counterpoint: Bovbjerg & Cheyney 2025 → no safety difference for low-risk. Whether it is a first or a later birth is the key factor.',
                      source: 'Birthplace (UK) · DGGG/BVF 2011 · Bovbjerg & Cheyney 2025' } },
        ],
      },
      {
        id: 'pain', type: 'multi',
        label: { de: 'Schmerzmanagement', en: 'Pain management' },
        options: [
          { id: 'pain.none', label: { de: 'Keine Schmerzmittel', en: 'No pain medication' }, exclusive: true },
          { id: 'pain.nonpharm', label: { de: 'Nicht-medikamentös', en: 'Non-pharmacological' }, evidence: 'low',
            effect: { de: 'Atmung, Bewegung, TENS, Akupressur; bescheidene/uneinheitliche Evidenz, keine Nebenwirkungen.', en: 'Breathing, movement, TENS, acupressure; modest/inconsistent evidence, no side effects.' } },
          { id: 'pain.nitrous', label: { de: 'Lachgas', en: 'Nitrous oxide' }, evidence: 'moderate',
            effect: { de: 'Selbst dosierbar, schnell reversibel; mildere Linderung als PDA, gutes Sicherheitsprofil.', en: 'Self-administered, quickly reversible; milder relief than epidural, good safety profile.' } },
          { id: 'pain.opioid', label: { de: 'Opioide', en: 'Opioids' }, evidence: 'low',
            effect: { de: 'Begrenzte Wirkung; sedierend, plazentagängig (mögliche kindliche Atemdämpfung).', en: 'Limited efficacy; sedating, crosses the placenta (possible neonatal respiratory depression).' } },
          { id: 'pain.pda', label: { de: 'PDA (Periduralanästhesie)', en: 'Epidural' }, evidence: 'high',
            effect: { de: 'Wirksamste Linderung; 2. Phase +~14 min; kein erhöhtes Sectio-Risiko.', en: 'Most effective relief; 2nd stage +~14 min; no increased C-section risk.' },
            detail: { de: 'Wirksamste Schmerzlinderung (Cochrane, ~10.000 Frauen). 2. Phase im Schnitt +~14 min, 1. Phase +~30 min. Kein erhöhtes Kaiserschnittrisiko (RR 1,10; 95 % CI 0,97–1,25, n.s.). Wichtige Nuance: ältere Daten zeigten mehr instrumentelle Geburten (RR ~1,42), moderne Niedrigdosis-PDAs (Studien seit ~2005) zeigen keinen signifikanten Unterschied mehr.',
                      en: 'Most effective pain relief (Cochrane, ~10,000 women). 2nd stage on average +~14 min, 1st stage +~30 min. No increased C-section risk (RR 1.10; 95 % CI 0.97–1.25, n.s.). Important nuance: older data showed more instrumental births (RR ~1.42), but modern low-dose epidurals (studies since ~2005) show no significant difference any more.',
                      source: 'Anim-Somuah et al., Cochrane 2011 · Modern-LEA Review, AJOG 2023' } },
        ],
      },
      {
        id: 'water', type: 'single',
        label: { de: 'Wassernutzung', en: 'Use of water' },
        options: [
          { id: 'water.none', label: { de: 'Keine', en: 'None' } },
          { id: 'water.firststage', label: { de: 'Eröffnungsphase', en: 'First stage (labour)' }, evidence: 'moderate',
            effect: { de: 'Gute Evidenz für Schmerzlinderung, tendenziell kürzere Geburt.', en: 'Good evidence for pain relief, tendency toward shorter labour.' },
            detail: { de: 'Wasser in der Eröffnungsphase hat gute Evidenz für Schmerzlinderung und ist mit tendenziell kürzerer Geburt assoziiert. Klar zu trennen von der Wassergeburt (Austreibung im Wasser).',
                      en: 'Water during the first stage has good evidence for pain relief and is associated with a tendency toward shorter labour. To be clearly distinguished from waterbirth (delivery in water).',
                      source: 'Cluett & Burns, Cochrane 2018' } },
          { id: 'water.delivery', label: { de: 'Wassergeburt (Austreibung)', en: 'Waterbirth (delivery)' }, evidence: 'low',
            effect: { de: 'Begrenzte RCT-Evidenz; beobachtend keine erhöhten mütterl./kindl. Risiken.', en: 'Limited RCT evidence; observational data show no increased maternal/neonatal risk.' },
            detail: { de: 'Cochrane 2018: begrenzte Evidenz, keine signifikanten Unterschiede bei mütterlichen/neonatalen Outcomes, kein Hinweis auf erhöhtes kindliches Risiko; RCT-Evidenz fehlt jedoch weitgehend (Datenlage überwiegend beobachtend).',
                      en: 'Cochrane 2018: limited evidence, no significant differences in maternal/neonatal outcomes, no indication of increased neonatal risk; however RCT evidence is largely lacking (mostly observational data).',
                      source: 'Cluett & Burns, Cochrane 2018 · McKinney et al., AJOG 2024' } },
        ],
      },
      {
        id: 'position', type: 'multi',
        label: { de: 'Gebärposition', en: 'Birthing position' },
        options: [
          { id: 'position.lying', label: { de: 'Liegend', en: 'Lying down' }, evidence: 'low', exclusive: true,
            effect: { de: 'Rückenlage als Vergleichsbasis; ohne PDA längere Austreibung und mehr Dammschnitte als aufrechte Positionen.', en: 'Supine as the comparator; without an epidural a longer second stage and more episiotomies than upright positions.' },
            detail: { de: 'Cochrane (ohne PDA): Rückenlage ist mit längerer Austreibungsphase, mehr Dammschnitten und mehr vaginal-operativen Geburten assoziiert als aufrechte Positionen, bei durchweg niedriger Studienqualität. Möglicher Vorteil: tendenziell geringerer Blutverlust und weniger Dammrisse 2. Grades.',
                      en: 'Cochrane (no epidural): supine is associated with a longer second stage, more episiotomies and more assisted births than upright positions, with consistently low study quality. Possible trade-off: a tendency to less blood loss and fewer 2nd-degree tears.',
                      source: 'Gupta et al., Cochrane 2017 (19 Studien, 5811 Frauen)' } },
          { id: 'position.upright', label: { de: 'Aufrecht', en: 'Upright' }, evidence: 'low',
            effect: { de: 'Ohne PDA: ~6 min kürzere Austreibung, weniger Dammschnitte & vaginal-op. Geburten; aber mehr Blutverlust >500 ml.', en: 'Without an epidural: ~6 min shorter second stage, fewer episiotomies & assisted births; but more blood loss >500 mL.' },
            detail: { de: 'Cochrane 2017 (19 Studien, 5811 Frauen ohne PDA): aufrechte Haltung verkürzt die Austreibung um ~6 min (v. a. bei der ersten Geburt), senkt Dammschnitt- und vaginal-operative Geburtsraten. Gegenüber steht erhöhter Blutverlust >500 ml und evtl. mehr Dammrisse 2. Grades. Evidenz insgesamt niedriger Qualität.',
                      en: 'Cochrane 2017 (19 trials, 5,811 women without epidural): upright posture shortens the second stage by ~6 min (mainly first births) and lowers episiotomy and assisted-birth rates. Against this: increased blood loss >500 mL and possibly more 2nd-degree tears. Overall low-quality evidence.',
                      source: 'Gupta et al., Cochrane 2017' } },
          { id: 'position.allfours', label: { de: 'Vierfüßler', en: 'Hands and knees' }, evidence: 'low',
            effect: { de: 'Mobile/aufrechte Position; Vorteile tendenziell wie „aufrecht" (niedrige Evidenzqualität).', en: 'Mobile/upright position; benefits broadly as for “upright” (low-quality evidence).' } },
          { id: 'position.stool', label: { de: 'Gebärhocker', en: 'Birth stool' }, evidence: 'low',
            effect: { de: 'Aufrechte Position; mögliche Vorteile wie „aufrecht", tendenziell mehr Blutverlust >500 ml.', en: 'Upright position; possible benefits as for “upright”, tendency to more blood loss >500 mL.' } },
          { id: 'position.free', label: { de: 'Frei wählbar', en: 'Freely chosen' }, evidence: 'low',
            effect: { de: 'Positionswechsel nach Gefühl; aufrechte/mobile Positionen sind tendenziell vorteilhaft (ohne PDA).', en: 'Change position intuitively; upright/mobile positions tend to be beneficial (without an epidural).' } },
        ],
      },
      {
        id: 'monitoring', type: 'single',
        label: { de: 'Überwachung', en: 'Monitoring' },
        options: [
          { id: 'monitoring.intermittent', label: { de: 'Intermittierend', en: 'Intermittent' }, evidence: 'moderate',

          '<strong>The evidence rating</strong> summarises study quality coarsely; “contested” marks genuine professional controversies with conflicting studies.',
        ],
        sources: 'Sources: Anim-Somuah et al., Cochrane 2011 (epidural, ~10,000) · Modern-LEA Review, AJOG 2023 (low-dose epidural) · Cluett & Burns, Cochrane 2018 (water) · McKinney et al., AJOG 2024 · Birthplace (UK) · DGGG/BVF statement 2011 · Bovbjerg & Cheyney 2025 (Oregon State) · Alfirevic et al., Cochrane (EFM) · Gupta et al., Cochrane 2017 (birthing position) · Jiang et al., Cochrane 2017 & FIGO 2019 (episiotomy) · McDonald et al., Cochrane / WHO 2014 / ACOG 684 (cord clamping) · AAP 2022 (vitamin K) · Begley et al., Cochrane 2019 (placenta) · Wei & Bugg, Cochrane 2013 (augmentation) · Bohren et al., Cochrane (continuous support) · Moore et al., Cochrane (skin-to-skin) · Wagner & Gunning 2006 (birth-plan framing).',
        reset: 'Reset',
      },
    };
    const t = S[lang] || S.de;

    // ─── COMPONENTS ────────────────────────────────────────────────────────────
    function EviTag({ level }) {
      if (!level) return null;
      return <span className="bd-evi">{t.evidence} {tr(EVI[level].label)}</span>;
    }

    function Legend() {
      return <div className="bd-legend">{t.legendNote}</div>;
    }

    function OptionCard({ opt, axis, selected, blocked, soft, parity, expanded, onToggle, onInfo }) {
      const hardReason = blocked && blocked.reason;
      const softReason = soft && soft.reason;
      const cls = ['bd-opt'];
      if (selected) cls.push('sel');
      if (soft) cls.push('soft');
      if (hardReason) cls.push('blocked');
      const hasDetail = !!opt.detail;
      const parNote = axis.id === 'place' && opt.parityNote ? opt.parityNote[parity] : null;
      return (
        <div className={cls.join(' ')}
             onClick={() => { if (!hardReason) onToggle(axis, opt.id); }}>
          <div className="bd-opt-top">
            {hardReason && <span className="bd-lock" title={tr(hardReason)}>🔒</span>}
            <span className="bd-opt-label">{tr(opt.label)}</span>
            {hasDetail && (
              <button className="bd-info" title="Details"
                      onClick={e => { e.stopPropagation(); onInfo(opt.id); }}>ⓘ</button>
            )}
          </div>
          <EviTag level={opt.evidence} />
          {opt.effect && <div className="bd-opt-effect">{tr(opt.effect)}</div>}
          {parNote && <div className="bd-parnote">{tr(parNote)}</div>}
          {hardReason && <div className="bd-warn"><strong>{t.blockedBy}</strong> {tr(hardReason)}</div>}
          {softReason && !hardReason && <div className="bd-warn">⚠ {tr(softReason)}</div>}
          {hasDetail && expanded && (
            <div className="bd-detail" onClick={e => e.stopPropagation()}>
              {tr(opt.detail)}
              {opt.detail.source && <span className="src">{t.srcPrefix}{opt.detail.source}</span>}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [sel, setSel] = useState(emptySelections);
      const [parity, setParity] = useState('multi');
      const [expanded, setExpanded] = useState({});
      const [toasts, setToasts] = useState([]);
      const [copied, setCopied] = useState(false);
      const toastTimer = useRef(null);

      // derived constraint maps from current selections.
      // Hard constraints are mutual incompatibilities → grey out both directions:
      // if either endpoint is active, the other endpoint is locked (unless it too is active).
      const { hardMap, softMap } = useMemo(() => {
        const activeSet = new Set(activeIds(sel));
        const hardMap = {}, softMap = {};
        CONSTRAINTS.forEach(c => {
          if (c.type === 'hard') {
            if (activeSet.has(c.if) && !activeSet.has(c.blocks) && !hardMap[c.blocks]) hardMap[c.blocks] = c;
            if (activeSet.has(c.blocks) && !activeSet.has(c.if) && !hardMap[c.if]) hardMap[c.if] = c;
          } else {
            if (activeSet.has(c.if) && !softMap[c.blocks]) softMap[c.blocks] = c;
          }
        });
        return { hardMap, softMap };
      }, [sel]);

      function pushToasts(list) {
        if (!list.length) return;
        const stamped = list.map((x, i) => ({ ...x, key: Date.now() + '-' + i }));
        setToasts(stamped);
        if (toastTimer.current) clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToasts([]), 4200);
      }

      function onToggle(axis, optId) {
        setCopied(false);
        const next = {};
        AXES.forEach(ax => { next[ax.id] = ax.type === 'multi' ? [...(sel[ax.id] || [])] : sel[ax.id]; });
        // toggle
        if (axis.type === 'multi') {
          const arr = next[axis.id];
          if (arr.includes(optId)) {
            next[axis.id] = arr.filter(x => x !== optId);
          } else if (OPT[optId].exclusive) {
            next[axis.id] = [optId];                                  // "none" replaces everything
          } else {
            next[axis.id] = [...arr.filter(x => !OPT[x].exclusive), optId]; // adding a real option drops "none"
          }
        } else {
          next[axis.id] = next[axis.id] === optId ? null : optId;
        }
        const selecting = axis.type === 'multi'
          ? next[axis.id].includes(optId) : next[axis.id] === optId;
        const dropped = resolve(next, selecting ? optId : null);
        setSel(next);
        pushToasts(dropped);
      }

      function onInfo(optId) {
        setExpanded(e => ({ ...e, [optId]: !e[optId] }));
      }

      function reset() {
        setSel(emptySelections());
        setToasts([]); setCopied(false);
      }

      // plan rows
      const planRows = AXES.map(ax => {
        const v = sel[ax.id];
        const ids = ax.type === 'multi' ? (v || []) : (v ? [v] : []);
        if (!ids.length) return null;
        return { axis: ax, labels: ids.map(id => tr(OPT[id].label)) };
      }).filter(Boolean);

      const hasSelection = planRows.length > 0;

      // open questions
      const active = activeIds(sel);
      const questions = [];
      const pdaPos = active.includes('pain.pda') &&
        ['position.upright', 'position.stool', 'position.free', 'position.allfours'].some(p => active.includes(p));
      if (pdaPos) questions.push(t.qWalking);
      if (active.includes('place.home') || active.includes('place.geburtshaus')) questions.push(t.qTransfer);
      if (active.includes('water.delivery')) questions.push(t.qWater);
      if (active.includes('vitamink.refuse')) questions.push(t.qVitk);
      const tbdSelected = planRows
        .filter(r => r.axis.options.some(o => active.includes(o.id) && o.evidence === 'tbd'))
        .map(r => tr(r.axis.label));
      if (tbdSelected.length) questions.push(t.qTbd(tbdSelected.join(', ')));

      function copyPlan() {
        const lines = [t.planIntro, ''];
        planRows.forEach(r => lines.push(`• ${tr(r.axis.label)}: ${r.labels.join(', ')}`));
        lines.push('', t.planDisc);
        if (questions.length) {
          lines.push('', t.qTitle + ':');
          questions.forEach(q => lines.push(`- ${q}`));
        }
        const txt = lines.join('\n');
        navigator.clipboard?.writeText(txt).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      return (
        <div className="bd-wrap">
          <div className="bd-inner">
            <div className="bd-head">
              <h1 className="bd-h1">{t.h1}</h1>
              <p className="bd-sub-head">{t.sub}</p>
              <div className="bd-disc" dangerouslySetInnerHTML={{ __html: t.disc }} />
              <div className="bd-toolbar">
                <div>
                  <span className="lbl">{t.parity}</span>
                  <div className="bd-tg">
                    {[['primi', t.primi], ['multi', t.multi]].map(([v, l]) => (
                      <button key={v} className={parity === v ? 'active' : ''}
                              onClick={() => setParity(v)}>{l}</button>
                    ))}
                  </div>
                </div>
                <Legend />
                <div style={{ marginLeft: 'auto' }}>
                  <div className="bd-tg"><button onClick={reset}>{t.reset}</button></div>
                </div>
              </div>
            </div>

            {AXES.map(ax => (
              <div className="bd-axis" key={ax.id}>
                <div className="bd-axis-head">
                  <span className="bd-axis-title">{tr(ax.label)}</span>
                  {ax.type === 'multi' && <span className="bd-axis-multi">{t.multiHint}</span>}
                </div>
                <div className="bd-opts">
                  {ax.options.map(opt => {
                    const isSel = ax.type === 'multi'
                      ? (sel[ax.id] || []).includes(opt.id) : sel[ax.id] === opt.id;
                    return (
                      <OptionCard key={opt.id} opt={opt} axis={ax}
                        selected={isSel}
                        blocked={hardMap[opt.id]}
                        soft={softMap[opt.id]}
                        parity={parity}
                        expanded={expanded[opt.id]}
                        onToggle={onToggle} onInfo={onInfo} />
                    );
                  })}
                </div>
              </div>
            ))}

            <div className="bd-out">
              <h2>{t.outTitle}</h2>
              <p className="hint">{t.outHint}</p>
              {hasSelection ? (
                <>
                  <div className="bd-plan">
                    {planRows.map(r => (
                      <div className="bd-plan-row" key={r.axis.id}>
                        <span className="k">{tr(r.axis.label)}</span>
                        <span className="v">{r.labels.join(', ')}</span>
                      </div>
                    ))}
                  </div>
                  <button className="bd-copy" onClick={copyPlan}>{copied ? t.copied : t.copy}</button>
                  <div className="bd-status ok">{t.statusOk}</div>
                  {questions.length > 0 && (
                    <div className="bd-questions">
                      <div className="qt">{t.qTitle}</div>
                      <ul>{questions.map((q, i) => <li key={i}>{q}</li>)}</ul>
                    </div>
                  )}
                </>
              ) : (
                <p className="bd-plan-empty">{t.outEmpty}</p>
              )}
            </div>

            <div className="bd-caveat">
              <strong>{t.caveatTitle}</strong>
              <ol>{t.caveats.map((c, i) => <li key={i} dangerouslySetInnerHTML={{ __html: c }} />)}</ol>
              <div className="bd-sources">{t.sources}</div>
            </div>
          </div>

          {toasts.length > 0 && (
            <div className="bd-toasts">
              {toasts.map(to => (
                <div className="bd-toast" key={to.key}>
                  <strong>{tr(OPT[to.optId].label)}</strong> {t.toastDeact}: {tr(to.reason)}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
